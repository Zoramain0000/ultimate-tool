<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Philip Zone | Mistral Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --accent:#00f0ff;
  --text:#e5e7eb;
  --text-muted:#a0a0a0;
  --glow: 0 0 10px rgba(0, 240, 255, 0.7);
}
*{box-sizing:border-box}
html,body{
  margin:0;height:100%;
  font-family:Segoe UI,system-ui,sans-serif;
  background:transparent;color:var(--text);
  overflow:hidden;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(5,10,25,0.8);
  z-index:-2;
}
#bgVideo{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  object-fit:cover;
  z-index:-1;
  opacity:0.3;
}
header{
  padding:15px 20px;
  background:rgba(10,15,30,0.85);
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(0,240,255,0.3);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  position:relative;
  z-index:10;
  flex-direction: column;
}
header h1{
  margin:0;font-size:1.6rem;color:var(--accent);
  text-shadow:var(--glow);
  letter-spacing:1px;
  background:linear-gradient(to right, var(--accent), #00a2ff, #7b00ff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  font-weight:800;
}
header span{
  background:rgba(0,30,40,0.7);
  padding:4px 12px;
  border-radius:20px;
  border:1px solid rgba(0,240,255,0.4);
  font-weight:600;
}
main{
  height:calc(100% - 60px);
  display:flex;flex-direction:column;
  backdrop-filter:blur(10px);
  background:rgba(5,10,25,0.75);
  position:relative;
  z-index:5;
}
#chat{
  flex:1;overflow-y:auto;padding:20px;
  background:rgba(0,5,15,0.6);
}
.msg{
  max-width:75%;margin-bottom:16px;padding:12px 16px;
  border-radius:12px;line-height:1.5;white-space:pre-wrap;
  background:rgba(15,25,45,0.7);
  border:1px solid rgba(0,240,255,0.15);
  animation:fadeIn 0.3s ease-out;
}
.user{
  background:rgba(0,40,50,0.8);
  margin-left:auto;
  border:1px solid rgba(0,240,255,0.4);
  border-radius:12px 2px 12px 12px;
}
.bot{
  background:rgba(20,30,50,0.85);
  border:1px solid rgba(0,100,120,0.3);
  border-radius:2px 12px 12px 12px;
}
#inputBar{
  display:flex;gap:10px;padding:15px;
  background:rgba(10,20,40,0.85);
  border-top:1px solid rgba(0,240,255,0.25);
}
#input{
  flex:1;padding:14px 18px;
  background:rgba(5,15,30,0.7);
  border:1px solid rgba(0,240,255,0.3);
  border-radius:10px;
  color:var(--text);
}
button{
  padding:14px 22px;
  background:linear-gradient(120deg, rgba(0,240,255,0.9), rgba(0,180,255,0.85));
  color:#000;font-weight:800;border:none;border-radius:10px;
  cursor:pointer;transition:all 0.2s;
}
button:hover{ transform:scale(1.03); box-shadow:0 0 15px rgba(0,240,255,0.9); }
footer{
  font-size:.75rem;text-align:center;color:var(--text-muted);
  padding:8px;background:rgba(5,15,30,0.8);
}
.status-indicator{
  display:inline-block;width:8px;height:8px;
  background:#00f0ff;border-radius:50%;
  margin-right:5px;animation:pulse 2s infinite;
}
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
@keyframes fadeIn{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.command-list{
  background:rgba(0,30,40,0.8);
  padding:12px;
  border-radius:8px;
  border-left:3px solid var(--accent);
  margin-bottom:12px;
}

/* Live Clock and Counter */
.live-clock-counter {
  display: flex;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 10px;
  font-size: 0.9rem;
  color: var(--accent);
  text-shadow: var(--glow);
}
.live-clock, .live-counter, .live-location {
  background: rgba(0, 30, 40, 0.7);
  padding: 5px 10px;
  border-radius: 10px;
  border: 1px solid rgba(0, 240, 255, 0.4);
  margin: 0 5px;
}

/* Sidebar Styles */
#sidebar{
  position:fixed;
  top:0;left:-250px;
  width:250px;height:100%;
  background:rgba(5,10,25,0.9);
  border-right:1px solid rgba(0,240,255,0.2);
  z-index:20;
  transition:left 0.3s ease;
  padding-top:60px;
}
#sidebar.open{
  left:0;
}
#sidebar ul{
  list-style:none;padding:0;margin:0;
}
#sidebar li{
  padding:12px 20px;
  border-bottom:1px solid rgba(0,240,255,0.1);
}
#sidebar a{
  color:var(--text);
  text-decoration:none;
  display:flex;align-items:center;gap:10px;
}
#sidebar a:hover{
  color:var(--accent);
}
#menuToggle{
  position:fixed;top:15px;left:15px;
  background:rgba(0,30,40,0.7);
  border:1px solid rgba(0,240,255,0.4);
  border-radius:50%;
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:21;
}
#menuToggle:hover{
  background:rgba(0,40,50,0.8);
}
.copy-button {
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--accent);
  border: none;
  border-radius: 4px;
  cursor: pointer;
  color: #000;
  font-weight: bold;
}

/* Terminal Modal */
.terminal-modal {
  display: none;
  position: fixed;
  z-index: 100;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.8);
  overflow: auto;
}

.terminal-content {
  background-color: #1a1a1a;
  margin: 5% auto;
  padding: 20px;
  border: 1px solid #00f0ff;
  border-radius: 8px;
  width: 80%;
  max-height: 80vh;
  overflow-y: auto;
  font-family: monospace;
  color: #00f0ff;
  white-space: pre-wrap;
}

.terminal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  border-bottom: 1px solid #00f0ff;
  padding-bottom: 10px;
}

.close-terminal {
  color: #00f0ff;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
}

.close-terminal:hover {
  color: #fff;
}
</style>
</head>
<body>

<video autoplay muted loop id="bgVideo">
  <source src="tools/io/ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>

<div id="terminalModal" class="terminal-modal">
  <div class="terminal-content">
    <div class="terminal-header">
      <h2>Traceroute Terminal Log</h2>
      <span class="close-terminal" onclick="closeTerminal()">&times;</span>
    </div>
    <div id="terminalLog"></div>
  </div>
</div>

<div id="sidebar">
  <ul>
    <li><a href="intro.html"><span>🏠</span>Refresh</a></li>
    <li><a href="tools/intro.html"><span>📂</span>Pro-Tools - 180 tools</a></li>
    <li><a href="tools/Gateway.html"><span>📂</span>Zerodays Pro - 98 tools </a></li>
  </ul>
</div>

<div id="menuToggle" onclick="toggleSidebar()">☰</div>

<header>
  <div class="live-clock-counter">
    <div class="live-location" id="liveLocation">Detecting location...</div>
    <div class="live-clock" id="liveClock">Loading...</div>
    <div class="live-counter">Messages: <span id="messageCounter">0</span></div>
  </div>
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
    <h1>Philip Zone</h1>
    <div>
      <span>Mistral AI</span>
    </div>
  </div>
</header>

<main>
  <div id="chat"></div>
  <div id="inputBar">
    <input id="input" placeholder="Ask anything or type /help for commands..." autocomplete="off">
    <button onclick="send()">Send</button>
  </div>
</main>

<footer>
  ⚠️ FRONTEND API KEYS ARE INSECURE • Educational Use Only
</footer>

<script>
/**
 * CONFIGURATION
 */
const API_KEY = "KSjPuGvklvOdcpoAujOOgFqphxWpD2rT";
const MODEL = "mistral-small-latest";

const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const terminalModal = document.getElementById("terminalModal");
const terminalLog = document.getElementById("terminalLog");
const liveClock = document.getElementById("liveClock");
const liveLocation = document.getElementById("liveLocation");
const messageCounter = document.getElementById("messageCounter");
let conversation = [];
let messageCount = 0;
let userCountry = "Philippines";
let userTimeZone = "Asia/Manila";

// Toggle Sidebar
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("open");
}

// Close Terminal Modal
function closeTerminal() {
  terminalModal.style.display = "none";
}

// Show Terminal Modal
function showTerminal(log) {
  terminalLog.textContent = log;
  terminalModal.style.display = "block";
}

// Update Live Clock
function updateLiveClock() {
  const now = new Date();
  const options = {
    timeZone: userTimeZone,
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  };
  liveClock.textContent = now.toLocaleString('en-US', options);
  setTimeout(updateLiveClock, 1000);
}

// Function to copy text to clipboard
function copyToClipboard(text) {
  navigator.clipboard.writeText(text)
    .then(() => alert("Copied to clipboard!"))
    .catch(err => console.error("Failed to copy: ", err));
}

// Function to get local time and date
function getLocalTimeDate() {
  return new Date().toLocaleString('en-US', { timeZone: userTimeZone });
}

// Function to detect user's country and timezone
async function detectUserLocation() {
  try {
    const response = await fetch('https://ipapi.co/json/');
    const data = await response.json();
    userCountry = data.country_name || "Philippines";
    userTimeZone = data.timezone || "Asia/Manila";
    liveLocation.textContent = `${userCountry} (${userTimeZone})`;
    updateLiveClock();
  } catch (error) {
    console.error("Failed to detect location:", error);
    liveLocation.textContent = "Philippines (Asia/Manila)";
    updateLiveClock();
  }
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || !API_KEY) return;

  inputEl.value = "";
  addMsg(text, "user");
  messageCount++;
  messageCounter.textContent = messageCount;

  // Handle commands
  if (text.startsWith("/")) {
    handleCommand(text);
    return;
  }

  // Add to local history
  conversation.push({ role: "user", content: text });

  // Thinking Indicator
  const thinkingDiv = document.createElement("div");
  thinkingDiv.className = "msg bot";
  thinkingDiv.innerHTML = '<span class="status-indicator"></span>Philip is processing...';
  chatEl.appendChild(thinkingDiv);
  chatEl.scrollTop = chatEl.scrollHeight;

  try {
    const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: conversation,
      })
    });

    chatEl.removeChild(thinkingDiv);

    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.error?.message || "Check your API Key or Network");
    }

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "I couldn't generate a response.";

    addTypingMsg(reply);

    // Add bot response to history
    conversation.push({ role: "assistant", content: reply });

  } catch (err) {
    if (chatEl.contains(thinkingDiv)) chatEl.removeChild(thinkingDiv);
    addMsg(`⚠️ API Error: ${err.message}`, "bot");
  }
}

async function fetchIPInfo(ip) {
  const response = await fetch(`https://ipapi.co/${ip}/json/`);
  if (!response.ok) throw new Error("Failed to fetch IP info");
  return await response.json();
}

async function fetchTracert(target, hopCount = 999, selectedCountries = null) {
  const createdDateTime = getLocalTimeDate();

  const mockHops = Array.from({ length: hopCount }, (_, i) => {
    const country = selectedCountries ?
      selectedCountries[i % selectedCountries.length] :
      countries[Math.floor(Math.random() * countries.length)];

    return {
      hop: i + 1,
      ip: `${Math.floor(Math.random() * 255) + 1}.${Math.floor(Math.random() * 255) + 1}.${Math.floor(Math.random() * 255) + 1}.${Math.floor(Math.random() * 255) + 1}`,
      port: Math.floor(Math.random() * 65535) + 1,
      rtt: `${(Math.random() * 1000).toFixed(3)} ms`,
      location: country
    };
  });

  return { hops: mockHops, createdDateTime };
}

async function fetchDictionary(word) {
  const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
  if (!response.ok) throw new Error("Word not found");
  return await response.json();
}

async function fetchWikipedia(query) {
  const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
  const response = await fetch(url);
  if (!response.ok) throw new Error("Failed to fetch Wikipedia results");
  const data = await response.json();
  return data.query.search;
}

function downloadTracert(hops, target, createdDateTime) {
  const csvContent = "data:text/csv;charset=utf-8,"
    + "Hop,IP,Port,RTT,Location\n"
    + hops.map(hop => `${hop.hop},${hop.ip},${hop.port},${hop.rtt},${hop.location}`).join("\n");
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", `tracert_${target}_${createdDateTime.replace(/[^a-z0-9]/gi, '_')}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function handleCommand(cmd) {
  const div = document.createElement("div");
  div.className = "msg bot command-list";

  if (cmd === "/help" || cmd === "/commands") {
    div.innerHTML = `
      <strong>Available Commands:</strong><br>
      <ul>
        <li><strong>/help</strong> - Show this help message.</li>
        <li><strong>/clear</strong> - Clear the chat history.</li>
        <li><strong>/time</strong> - Show your local time and date.</li>
        <li><strong>/about</strong> - About Philip Zone.</li>
        <li><strong>/menu</strong> - Toggle sidebar menu.</li>
        <li><strong>/ip [IP]</strong> - Track IP geolocation.</li>
        <li><strong>/tracert [target] [hops] [countries]</strong> - Simulate traceroute (999 hops by default, 10,000 max). Use "all" for all countries or list specific countries separated by commas.</li>
        <li><strong>/dict [word]</strong> - Look up a word in the dictionary.</li>
        <li><strong>/wiki [query]</strong> - Search Wikipedia.</li>
      </ul>
    `;
  } else if (cmd === "/clear") {
    conversation = [];
    chatEl.innerHTML = "";
    messageCount = 0;
    messageCounter.textContent = messageCount;
    div.textContent = "Chat history cleared!";
  } else if (cmd === "/time") {
    const localTimeDate = getLocalTimeDate();
    div.innerHTML = `
      <strong>Your Local Time and Date (${userCountry}):</strong><br>
      ${localTimeDate}
      <button class="copy-button" onclick="copyToClipboard('${localTimeDate}')">Copy</button>
    `;
  } else if (cmd === "/about") {
    div.textContent = "Philip Zone is a powerful AI assistant powered by Mistral AI, designed to be direct, technical, and helpful.";
  } else if (cmd === "/menu") {
    toggleSidebar();
    div.textContent = "Sidebar toggled!";
  } else if (cmd.startsWith("/ip ")) {
    const ip = cmd.split(" ")[1];
    div.innerHTML = '<span class="status-indicator"></span>Fetching IP info...';
    chatEl.appendChild(div);
    fetchIPInfo(ip)
      .then(data => {
        div.innerHTML = `
          <strong>IP Info for ${ip}:</strong><br>
          <pre>${JSON.stringify(data, null, 2)}</pre>
          <button class="copy-button" onclick="copyToClipboard('${JSON.stringify(data, null, 2)}')">Copy</button>
        `;
      })
      .catch(err => {
        div.textContent = `Error: ${err.message}`;
      });
    return;
  } else if (cmd.startsWith("/tracert ")) {
    const parts = cmd.split(" ").slice(1);
    const target = parts[0];
    const hopCount = parts[1] ? Math.min(parseInt(parts[1]), 10000) : 999;
    let selectedCountries = null;

    if (parts[2]) {
      if (parts[2].toLowerCase() === "all") {
        selectedCountries = countries;
      } else {
        selectedCountries = parts[2].split(",").map(country => country.trim());
      }
    }

    div.innerHTML = `<span class="status-indicator"></span>Running traceroute (${hopCount} hops, ${selectedCountries ? "selected countries" : "random countries"})...`;
    chatEl.appendChild(div);

    fetchTracert(target, hopCount, selectedCountries)
      .then(({ hops, createdDateTime }) => {
        const hopsText = hops.map(hop => `${hop.hop}: ${hop.ip}:${hop.port} (${hop.rtt}) - ${hop.location}`).join("\n");
        const terminalOutput = `
Traceroute to ${target}
Created: ${createdDateTime}
Total hops: ${hopCount}

${hopsText}
        `;

        showTerminal(terminalOutput);

        if (hopCount <= 999) {
          div.innerHTML = `
            <strong>Traceroute to ${target} (${hopCount} hops, ${selectedCountries ? "selected countries" : "random countries"})</strong><br>
            <strong>Created: ${createdDateTime}</strong><br>
            <pre>${hops.slice(0, 20).map(hop => `${hop.hop}: ${hop.ip}:${hop.port} (${hop.rtt}) - ${hop.location}`).join("\n")}</pre>
            <strong>Full results in terminal log.</strong>
            <button class="copy-button" onclick="copyToClipboard('${hopsText}')">Copy</button>
          `;
        } else {
          div.innerHTML = `
            <strong>Traceroute to ${target} (${hopCount} hops, ${selectedCountries ? "selected countries" : "random countries"})</strong><br>
            <strong>Created: ${createdDateTime}</strong><br>
            <p>First 20 hops:</p>
            <pre>${hops.slice(0, 20).map(hop => `${hop.hop}: ${hop.ip}:${hop.port} (${hop.rtt}) - ${hop.location}`).join("\n")}</pre>
            <strong>Full results in terminal log.</strong>
            <button class="copy-button" onclick="copyToClipboard('${hopsText}')">Copy</button>
            <button onclick="downloadTracert(${JSON.stringify(hops)}, '${target}', '${createdDateTime}')" style="margin-top: 10px; padding: 8px 12px; background: var(--accent); border: none; border-radius: 4px; cursor: pointer;">Download Full Tracert</button>
          `;
        }
      })
      .catch(err => {
        div.textContent = `Error: ${err.message}`;
      });
    return;
  } else if (cmd.startsWith("/dict ")) {
    const word = cmd.split(" ").slice(1).join(" ");
    div.innerHTML = '<span class="status-indicator"></span>Looking up word...';
    chatEl.appendChild(div);
    fetchDictionary(word)
      .then(data => {
        const entry = data[0];
        const dictText = `Word: ${word}\nPart of Speech: ${entry.meanings[0].partOfSpeech}\nDefinition: ${entry.meanings[0].definitions[0].definition}`;
        div.innerHTML = `
          <strong>Dictionary: ${word}</strong><br>
          <strong>Part of Speech:</strong> ${entry.meanings[0].partOfSpeech}<br>
          <strong>Definition:</strong> ${entry.meanings[0].definitions[0].definition}
          <button class="copy-button" onclick="copyToClipboard('${dictText}')">Copy</button>
        `;
      })
      .catch(err => {
        div.textContent = `Error: ${err.message}`;
      });
    return;
  } else if (cmd.startsWith("/wiki ")) {
    const query = cmd.split(" ").slice(1).join(" ");
    div.innerHTML = '<span class="status-indicator"></span>Searching Wikipedia...';
    chatEl.appendChild(div);
    fetchWikipedia(query)
      .then(results => {
        if (results.length === 0) {
          div.textContent = "No results found.";
          return;
        }
        const result = results[0];
        div.innerHTML = `
          <strong>Wikipedia: ${result.title}</strong><br>
          <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(result.title)}" target="_blank">Read more</a>
          <button class="copy-button" onclick="copyToClipboard('${result.title}')">Copy Title</button>
        `;
      })
      .catch(err => {
        div.textContent = `Error: ${err.message}`;
      });
    return;
  } else {
    div.textContent = `Unknown command: ${cmd}. Type /help for available commands.`;
  }

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTypingMsg(text) {
  const div = document.createElement("div");
  div.className = "msg bot";
  chatEl.appendChild(div);

  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      div.textContent += text.charAt(i);
      i++;
      chatEl.scrollTop = chatEl.scrollHeight;
    } else {
      clearInterval(interval);
      div.innerHTML = div.innerHTML.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }
  }, 15);
}

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

// Welcome message
window.onload = () => {
  detectUserLocation();
  setTimeout(() => {
    addTypingMsg(`System online. I am Philip Zone, powered by Mistral. Type /help for available commands. How can I assist you today, Developer Zorathedev from Developer Zorathedev? Your local time in ${userCountry} is ${getLocalTimeDate()}.`);
  }, 500);
};
</script>

</body>
</html>
