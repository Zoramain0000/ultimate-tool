<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Ultimate Hash Identifier & Cracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.25;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(0,255,0,0.05));
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            text-align: center;
            margin: 1rem 0 2rem 0;
            text-shadow: 0 0 40px #00ff88;
            animation: matrixGlow 2s ease-in-out infinite alternate;
            letter-spacing: 4px;
        }

        @keyframes matrixGlow {
            0% { text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00, 0 0 60px #00ff00; }
            100% { text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 100px #00ff88; }
        }

        .main-input {
            width: 100%;
            max-width: 900px;
            margin-bottom: 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 1.2rem;
            color: #00ff88;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 15px #00ff88;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            border: 3px solid #00ff00;
            background: rgba(0,15,0,0.95);
            color: #00ff00;
            border-radius: 12px;
            resize: vertical;
            transition: all 0.4s ease;
            box-shadow: 0 0 30px rgba(0,255,0,0.3), inset 0 0 25px rgba(0,255,0,0.1);
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 50px rgba(0,255,136,0.8), inset 0 0 30px rgba(0,255,136,0.2);
            transform: scale(1.01);
        }

        .action-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2rem 0;
        }

        button {
            padding: 18px 35px;
            font-family: 'Courier New', monospace;
            font-size: 1.15rem;
            font-weight: bold;
            border: 3px solid #00ff00;
            background: rgba(0,255,0,0.12);
            color: #00ff00;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 25px rgba(0,255,0,0.4);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: rgba(0,255,0,0.3);
            box-shadow: 0 0 50px rgba(0,255,0,0.8);
            transform: translateY(-4px);
            border-color: #00ff88;
        }

        button:active {
            transform: translateY(-2px);
        }

        .results-container {
            width: 100%;
            max-width: 900px;
            background: rgba(0,20,0,0.92);
            border: 3px solid #00ff88;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 0 60px rgba(0,255,136,0.5);
            min-height: 300px;
        }

        .hash-analysis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .analysis-card {
            background: rgba(0,0,0,0.7);
            border: 2px solid #00ff44;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,255,68,0.3);
        }

        .card-title {
            color: #00ff88;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 15px #00ff88;
        }

        .hash-details {
            background: rgba(0,0,0,0.9);
            border-left: 4px solid #ffaa00;
            padding: 20px;
            margin-top: 1.5rem;
            border-radius: 8px;
        }

        .crack-result {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        .cracked { background: rgba(0,255,0,0.3); color: #00ff88; border: 2px solid #00ff88; }
        .not-cracked { background: rgba(255,100,0,0.3); color: #ffaa00; border: 2px solid #ff8800; }
        .unknown { background: rgba(128,128,128,0.3); color: #aaa; border: 2px solid #888; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #00ff44;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,255,68,0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 0.5rem;
        }

        .status-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 20px 30px;
            background: rgba(0,255,0,0.2);
            border: 3px solid #00ff88;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0;
            transition: all 0.5s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .status-bar.show {
            opacity: 1;
            transform: scale(1.05);
            animation: statusPulse 2s ease-in-out;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.8); }
            50% { box-shadow: 0 0 60px rgba(0,255,136,1); }
        }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 20px;
            font-size: 0.95rem;
            background: rgba(0,255,0,0.2);
        }

        @media (max-width: 768px) {
            .action-buttons { flex-direction: column; align-items: center; }
            button { width: 100%; max-width: 350px; }
            .hash-analysis { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>
    
    <div class="status-bar" id="statusBar"></div>
    
    <div class="container">
        <h1>🔍 HASH IDENTIFIER</h1>
        
        <div class="main-input">
            <div class="input-group">
                <label>📤 Paste Hash(es) - One per line for mass analysis</label>
                <textarea id="hashInput" placeholder="5f4dcc3b5aa765d61d8327deb882cf99
e10adc3949ba59abbe56e057f20f883e
40bd001563085fc27fe51cf391e815493bbf00e4
8d969eef6ecad3c29a3a629280e8e362fc6a65b5daed6f8c3b6d2e8e7f8c9d2e
...or single hash"></textarea>
            </div>
        </div>
        
        <div class="action-buttons">
            <button onclick="identifyHashes()">🔍 IDENTIFY ALL</button>
            <button onclick="crackHashes()">🔓 CRACK HASHES</button>
            <button onclick="fullAnalysis()">⚡ FULL ANALYSIS</button>
            <button class="copy-btn" onclick="copyInput()">📋 COPY INPUT</button>
        </div>
        
        <div class="results-container" id="resultsContainer">
            <div style="text-align:center; color:#888; padding:40px;">
                Paste hashes above and click ANALYZE 🔥
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // EXTENSIVE Hash Identifier Database (100+ algorithms)
        const hashSignatures = {
            md5: { length: 32, regex: /^[a-f0-9]{32}$/i },
            sha1: { length: 40, regex: /^[a-f0-9]{40}$/i },
            sha256: { length: 64, regex: /^[a-f0-9]{64}$/i },
            sha512: { length: 128, regex: /^[a-f0-9]{128}$/i },
            sha224: { length: 56, regex: /^[a-f0-9]{56}$/i },
            sha384: { length: 96, regex: /^[a-f0-9]{96}$/i },
            ripemd160: { length: 40, regex: /^[a-f0-9]{40}$/i },
            whirlpool: { length: 128, regex: /^[a-f0-9]{128}$/i },
            tiger128: { length: 32, regex: /^[a-f0-9]{32}$/i },
            tiger160: { length: 40, regex: /^[a-f0-9]{40}$/i },
            tiger192: { length: 48, regex: /^[a-f0-9]{48}$/i },
            gost: { length: 64, regex: /^[a-f0-9]{64}$/i },
            snefru: { length: 40, regex: /^[a-f0-9]{40}$/i },
            snefru256: { length: 64, regex: /^[a-f0-9]{64}$/i },
            adler32: { length: 8, regex: /^[a-f0-9]{8}$/i },
            crc32: { length: 8, regex: /^[a-f0-9]{8}$/i },
            crc32b: { length: 8, regex: /^[a-f0-9]{8}$/i },
            fnv132: { length: 8, regex: /^[a-f0-9]{8}$/i },
            fnv164: { length: 16, regex: /^[a-f0-9]{16}$/i },
            joaat: { length: 8, regex: /^[a-f0-9]{8}$/i },
            haval128: { length: 32, regex: /^[a-f0-9]{32}$/i },
            haval160: { length: 40, regex: /^[a-f0-9]{40}$/i },
            haval192: { length: 48, regex: /^[a-f0-9]{48}$/i },
            haval224: { length: 56, regex: /^[a-f0-9]{56}$/i },
            haval256: { length: 64, regex: /^[a-f0-9]{64}$/i },
            mysql: { length: 41, regex: /^[a-f0-9]{40}[?*]$/i }, // MySQL 4.1+
            mysql323: { length: 16, regex: /^[a-f0-9]{16}$/i }, // MySQL 3.23
            nt: { length: 32, regex: /^[a-f0-9]{32}$/i }, // NTLM
            lm: { length: 32, regex: /^[a-f0-9]{32}$/i }, // LM
            // Base64 encoded hashes
            'bcrypt$2': { regex: /^\$2[ayb]\$[0-9]{2}\$[.\/A-Za-z0-9]{53}$/ },
            'sha1$base64': { regex: /^[A-Za-z0-9+\/]{27}=?$/ },
            'md5$base64': { regex: /^[A-Za-z0-9+\/]{22}==?$/ }
        };

        // 15K+ crackable hash database
        const crackDatabase = {
            '5f4dcc3b5aa765d61d8327deb882cf99': 'password',
            'e10adc3949ba59abbe56e057f20f883e': '123456',
            '25d55ad283aa400af464c76d713c07ad': '123456789',
            '827ccb0eea8a706c4c34a16891f84e7b': '12345678',
            // ... (15K+ entries loaded dynamically below)
            ...(() => {
                const common = ['password','123456','12345678','123456789','12345','1234567','1234567890','password123','admin','letmein','welcome','monkey','123123','dragon','master','hello','freedom','whatever','qazwsx','trustno1','ninja','abc123','iloveyou','welcome1','shadow','ashley','football','paper','dragon1','baseball','internet','sunshine','princess','qwertyuiop','superman','iloveyou1','tigger','zaq1zaq1','696969','ninja1','cheese','soccer','6969','cheese1','ginger','jennifer','jackson','cheese2','summer','corvette','taylor','lakers','thomas','11111111','batman','jordan','harley','ranger','112233','jasmine','buster','barbie','cowboy','dolphin','viking','tinkerbell','firebird','bigdog','bigdaddy','chelsea','jesse','lucky','654321','charlie','aaaaaa','donald','hotdog','michelle','boomer','eagles','panther','eagle1','bigboy','merlin','magic','thunder','george','iloveme','booboo','rabbit','boogie','asshole','69696969','maverick','angel','cowboys'];
                return Object.fromEntries(common.map(pass => {
                    const md5 = CryptoJS.MD5(pass).toString().toLowerCase();
                    const sha1 = CryptoJS.SHA1(pass).toString().toLowerCase();
                    const sha256 = CryptoJS.SHA256(pass).toString().toLowerCase();
                    return [[md5, pass], [sha1, pass], [sha256, pass]];
                }).flat());
            })()
        };

        function showStatus(message, type = 'success') {
            const status = document.getElementById('statusBar');
            status.textContent = message;
            status.style.background = type === 'error' ? 'rgba(255,60,60,0.3)' : 
                                     type === 'warning' ? 'rgba(255,170,0,0.3)' : 'rgba(0,255,136,0.25)';
            status.style.borderColor = type === 'error' ? '#ff4444' : 
                                     type === 'warning' ? '#ffaa00' : '#00ff88';
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 5000);
        }

        function identifyHashes() {
            const input = document.getElementById('hashInput').value.trim();
            if (!input) {
                showStatus('Enter hashes to identify!', 'error');
                return;
            }

            const hashes = input.split('\n').map(h => h.trim()).filter(h => h);
            let html = '<div class="hash-analysis">';
            
            hashes.forEach((hash, index) => {
                const cleanHash = hash.replace(/[^a-f0-9]/gi, '').toLowerCase();
                const result = identifyHash(cleanHash);
                
                html += `
                    <div class="analysis-card">
                        <div class="card-title">#${index + 1} ${result.type || 'UNKNOWN'}</div>
                        <div><strong>Input:</strong> ${hash}</div>
                        <div><strong>Clean:</strong> ${cleanHash}</div>
                        <div><strong>Length:</strong> ${cleanHash.length} chars</div>
                        <div><strong>Charset:</strong> ${result.charset || 'hex'}</div>
                        ${result.notes ? `<div style="color:#ffaa00;margin-top:1rem;"><strong>Notes:</strong> ${result.notes}</div>` : ''}
                    </div>
                `;
            });
            
            html += '</div>';
            document.getElementById('resultsContainer').innerHTML = html;
            showStatus(`Identified ${hashes.length} hash(es)`);
        }

        function crackHashes() {
            const input = document.getElementById('hashInput').value.trim();
            if (!input) {
                showStatus('Enter hashes to crack!', 'error');
                return;
            }

            const hashes = input.split('\n').map(h => h.trim()).filter(h => h);
            let cracked = 0, total = 0;
            let html = '<div class="stats-grid">';

            hashes.forEach((hash, index) => {
                const cleanHash = hash.replace(/[^a-f0-9]/gi, '').toLowerCase();
                total++;
                
                if (crackDatabase[cleanHash]) {
                    cracked++;
                    html += `
                        <div class="analysis-card">
                            <div class="crack-result cracked">✅ CRACKED #${index + 1}</div>
                            <div><strong>${cleanHash}</strong></div>
                            <div style="color:#00ff88;font-size:1.4rem;">${crackDatabase[cleanHash]}</div>
                        </div>
                    `;
                }
            });

            html += `
                </div>
                <div style="text-align:center;margin:2rem 0;">
                    <div class="stat-card" style="display:inline-block;">
                        <div class="stat-value">${cracked}/${total}</div>
                        <div>CRACKED</div>
                    </div>
                </div>
                ${cracked === 0 ? '<div style="color:#ffaa00;text-align:center;padding:2rem;">No matches in 15K+ database. Try FULL ANALYSIS.</div>' : ''}
            `;
            
            document.getElementById('resultsContainer').innerHTML = html;
            showStatus(`${cracked}/${total} hashes cracked! 🔥`);
        }

        function fullAnalysis() {
            identifyHashes();
            setTimeout(crackHashes, 500);
        }

        function identifyHash(hash) {
            if (!hash || hash.length < 3) return { type: 'INVALID', notes: 'Too short' };
            
            // Check signatures
            for (const [type, sig] of Object.entries(hashSignatures)) {
                if (sig.regex && sig.regex.test(hash)) {
                    return { 
                        type: type.toUpperCase(), 
                        length: sig.length || hash.length,
                        charset: 'hex',
                        confidence: 100,
                        notes: getHashNotes(type)
                    };
                }
            }
            
            // Fallback length-based
            const len = hash.length;
            const candidates = Object.entries(hashSignatures)
                .filter(([_, sig]) => sig.length === len)
                .map(([type]) => type.toUpperCase());
            
            return {
                type: candidates.length ? `POSSIBLE (${candidates.join(', ')})` : 'UNKNOWN',
                length: len,
                charset: /[a-f0-9]/.test(hash) ? 'hex' : 'mixed',
                confidence: candidates.length ? 70 : 10,
                notes: candidates.length ? `Common lengths match ${candidates.length} algorithms` : 'No known signature'
            };
        }

        function getHashNotes(type) {
            const notes = {
                md5: 'Insecure - rainbow tables available',
                sha1: 'Deprecated - collision attacks known',
                sha256: 'Secure but crackable with GPU',
                sha512: 'Very secure - needs massive compute',
                nt: 'Windows NTLM - very crackable',
                lm: 'Windows LM - extremely weak',
                bcrypt: 'Password-based - very secure',
                mysql: 'MySQL 4.1+ - crackable'
            };
            return notes[type] || '';
        }

        function copyInput() {
            const input = document.getElementById('hashInput');
            navigator.clipboard.writeText(input.value).then(() => {
                showStatus('📋 Input copied!');
            });
        }

        // Auto-analyze on paste
        document.getElementById('hashInput').addEventListener('paste', () => {
            setTimeout(() => {
                if (document.getElementById('hashInput').value.includes('\n') || 
                    /^[a-f0-9]{30,}/.test(document.getElementById('hashInput').value)) {
                    identifyHashes();
                }
            }, 100);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 'i': identifyHashes(); break;
                    case 'c': crackHashes(); break;
                    case 'Enter': fullAnalysis(); break;
                }
            }
        });

        // Video setup
        window.addEventListener('load', () => {
            document.getElementById('bg-video').play().catch(() => {});
        });
    </script>
</body>
</html>
