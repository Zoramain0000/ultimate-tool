<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Domain Health Checker</title>

<style>
/* ===== Background Video ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  color: #00ff88;
  overflow-x: hidden;
}

/* Video */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.25) contrast(1.2);
}

/* ===== Main Container ===== */
.container {
  max-width: 800px;
  margin: 3rem auto;
  padding: 2rem;
  background: rgba(0, 0, 0, 0.1);
  border-radius: 15px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 25px rgba(0, 255, 150, 0.3);
}

/* Title */
h1 {
  text-align: center;
  margin-bottom: 1.5rem;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc;
}

/* Input */
input[type="text"] {
  width: 100%;
  padding: 0.9rem;
  border-radius: 8px;
  border: 1px solid #00ff88;
  background: rgba(0, 0, 0, 0.1);
  color: #00ff88;
  margin-bottom: 1rem;
  font-size: 1rem;
  outline: none;
}

/* Button */
button {
  width: 100%;
  padding: 0.9rem;
  background: linear-gradient(45deg, #00ff88, #00ccff);
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  color: black;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px #00ffcc;
}

/* Summary */
.summary-box {
  margin-top: 1rem;
  padding: 1rem;
  border-radius: 8px;
  font-weight: bold;
  text-align: center;
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid #00ff88;
  color: #00ff88;
}

/* Results */
.results {
  margin-top: 2rem;
}

.result-box {
  padding: 1rem;
  background: rgba(0, 0, 0, 0.1);
  border-radius: 10px;
  margin-bottom: 1rem;
  border-left: 4px solid #00ff88;
  transition: 0.3s;
}

.result-box:hover {
  box-shadow: 0 0 12px rgba(0,255,150,0.3);
}

/* Status Colors */
.status {
  font-weight: bold;
  margin: 5px 0;
}

.status.pass { color: #00ff88; }
.status.warn { color: #ffcc00; }
.status.fail { color: #ff4444; }

/* Footer */
footer {
  max-width: 800px;
  margin: 2rem auto;
  padding: 1rem;
  text-align: center;
  color: #00ff88;
  background: rgba(0,0,0,0.1);
  border-radius: 10px;
}

footer a {
  color: #00ccff;
  text-decoration: none;
  margin: 0 6px;
}

footer a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop id="bgVideo">
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>

<div class="container">
  <h1>AI Domain Health Checker</h1>
  <input type="text" id="domainInput" placeholder="Enter a domain (e.g. example.com)" />
  <button onclick="checkDomainHealth()">Check Health</button>
  <div id="summary" class="summary-box" style="display:none;"></div>
  <div class="results" id="results"></div>
</div>

<footer>
  <p>Helpful APIs and Resources:</p>
  <a href="https://whoisxmlapi.com/" target="_blank">WHOIS Lookup</a> |
  <a href="https://api.ssllabs.com/" target="_blank">SSL Checker</a> |
  <a href="https://dns.google/resolve" target="_blank">Google DNS API</a> |
  <a href="https://www.cloudflare.com/dns/" target="_blank">Cloudflare DNS</a>
</footer>

<script>
/* ===== YOUR ORIGINAL JAVASCRIPT — UNCHANGED ===== */
async function checkDomainHealth() {
  const domain = document.getElementById('domainInput').value.trim();
  const resultsContainer = document.getElementById('results');
  const summaryBox = document.getElementById('summary');
  resultsContainer.innerHTML = '';
  summaryBox.style.display = 'none';

  if (!domain) return alert('Please enter a domain.');

  const checks = [];

  try {
    const whoisRes = await fetch(`https://www.whoisxmlapi.com/whoisserver/WhoisService?apiKey=at_OffwFPCV1KBcNU20xSxi6RjDXU&domainName=${domain}&outputFormat=JSON`);
    const whoisData = await whoisRes.json();
    const registered = whoisData.WhoisRecord?.domainName;
    checks.push({
      name: 'WHOIS Status',
      status: registered ? 'pass' : 'fail',
      info: registered ? 'Domain is registered.' : 'Domain is not registered.'
    });
  } catch (e) {
    checks.push({ name: 'WHOIS Status', status: 'warn', info: 'WHOIS check failed.' });
  }

  try {
    const sslRes = await fetch(`https://api.ssllabs.com/api/v3/analyze?host=${domain}`);
    const sslData = await sslRes.json();
    const grade = sslData?.endpoints?.[0]?.grade;
    checks.push({
      name: 'SSL Certificate',
      status: grade ? 'pass' : 'fail',
      info: grade ? `SSL Grade: ${grade}` : 'No SSL grade available.'
    });
  } catch (e) {
    checks.push({ name: 'SSL Certificate', status: 'warn', info: 'SSL check failed or pending.' });
  }

  try {
    const dnsRes = await fetch(`https://dns.google/resolve?name=${domain}&type=A`);
    const dnsData = await dnsRes.json();
    const aRecord = dnsData?.Answer?.[0]?.data;
    checks.push({
      name: 'DNS A Record',
      status: aRecord ? 'pass' : 'fail',
      info: aRecord ? `IP Address: ${aRecord}` : 'No A record found.'
    });
  } catch (e) {
    checks.push({ name: 'DNS A Record', status: 'warn', info: 'DNS check failed.' });
  }

  try {
    const mxRes = await fetch(`https://dns.google/resolve?name=${domain}&type=MX`);
    const mxData = await mxRes.json();
    const mxRecord = mxData?.Answer?.[0]?.data;
    checks.push({
      name: 'MX Records',
      status: mxRecord ? 'pass' : 'fail',
      info: mxRecord ? `MX: ${mxRecord}` : 'No MX records found.'
    });
  } catch (e) {
    checks.push({ name: 'MX Records', status: 'warn', info: 'MX check failed.' });
  }

  try {
    const txtRes = await fetch(`https://dns.google/resolve?name=${domain}&type=TXT`);
    const txtData = await txtRes.json();
    const spfRecord = txtData?.Answer?.find(r => r.data.includes('v=spf1'));
    checks.push({
      name: 'SPF Record',
      status: spfRecord ? 'pass' : 'fail',
      info: spfRecord ? `SPF Record: ${spfRecord.data}` : 'No SPF record found.'
    });
  } catch (e) {
    checks.push({ name: 'SPF Record', status: 'warn', info: 'SPF check failed.' });
  }

  checks.push({ name: 'DKIM', status: 'warn', info: 'DKIM record simulation: not verified.' });
  checks.push({ name: 'DMARC', status: 'fail', info: 'DMARC record simulation: not found.' });

  const score = calculateHealthScore(checks);
  const summaryMsg = `Overall Health Score: ${score}% - ${score >= 90 ? 'Excellent' : score >= 70 ? 'Good' : score >= 50 ? 'Fair' : 'Poor'}`;
  summaryBox.innerText = summaryMsg;
  summaryBox.style.display = 'block';

  checks.forEach(check => {
    const div = document.createElement('div');
    div.classList.add('result-box');
    div.innerHTML = `
      <div><strong>${check.name}</strong></div>
      <div class="status ${check.status}">${check.status.toUpperCase()}</div>
      <div>${check.info}</div>
    `;
    resultsContainer.appendChild(div);
  });
}

function calculateHealthScore(checks) {
  let score = 0;
  checks.forEach(c => {
    if (c.status === 'pass') score += 10;
    if (c.status === 'warn') score += 5;
  });
  return Math.min(Math.round((score / (checks.length * 10)) * 100), 100);
}
</script>

</body>
</html>
