<!DOCTYPE html>

<title>AI Domain Health Checker - Enterprise Pentest Edition</title>
<style>
/* [Previous CSS remains unchanged] */
html, body { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; color: #00ff88; overflow-x: hidden; }
#bgVideo { position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.25) contrast(1.2); }
.container { max-width: 1000px; margin: 3rem auto; padding: 2rem; background: rgba(0, 0, 0, 0.1); border-radius: 15px; backdrop-filter: blur(12px); box-shadow: 0 0 35px rgba(0, 255, 150, 0.4); border: 1px solid rgba(0, 255, 136, 0.3); }
h1 { text-align: center; margin-bottom: 1.5rem; color: #00ffcc; text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc; font-size: 2.2rem; }
.auth-banner { background: linear-gradient(45deg, #ff4444, #ff8800); color: white; padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; text-align: center; font-weight: bold; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
.input-group { display: flex; gap: 1rem; margin-bottom: 1rem; }
input[type="text"], select, input[type="number"] { flex: 1; padding: 1rem; border-radius: 8px; border: 1px solid #00ff88; background: rgba(0, 0, 0, 0.1); color: #00ff88; font-size: 1rem; outline: none; box-sizing: border-box; }
select option { background: #000; color: #00ff88; }
button { padding: 1rem 2rem; background: linear-gradient(45deg, #00ff88, #00ccff); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; color: black; margin: 0.5rem 0; }
button:hover { transform: scale(1.05); box-shadow: 0 0 25px #00ffcc; }
button.primary { width: 100%; padding: 1.2rem; }
.progress-container { width: 100%; height: 10px; background: rgba(0,0,0,0.1); border-radius: 5px; margin: 1rem 0; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #00ff88, #00ccff, #00ff88); background-size: 200% 100%; width: 0%; animation: shimmer 2s infinite; transition: width 0.5s; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.summary-box { margin: 1.5rem 0; padding: 1.5rem; border-radius: 12px; font-size: 1.2rem; font-weight: bold; text-align: center; border: 2px solid #00ff88; }

.summary-box.good { background: rgba(0, 255, 136, 0.15); color: #00ff88; }

.summary-box.poor { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
.result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-top: 2rem; }
.result-box { padding: 1.5rem; background: rgba(0, 0, 0, 0.1); border-radius: 12px; border-left: 5px solid #00ff88; transition: all 0.3s; position: relative; overflow: hidden; }
.result-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #00ff88, #00ccff); }
.result-box:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,255,136,0.3); }
.status { font-size: 1.3rem; font-weight: bold; margin: 0.5rem 0; padding: 0.5rem; border-radius: 6px; display: inline-block; }
.status.pass { background: rgba(0,255,136,0.2); color: #00ff88; border: 1px solid #00ff88; }
.status.warn { background: rgba(255,204,0,0.2); color: #ffcc00; border: 1px solid #ffcc00; }
.status.fail { background: rgba(255,68,68,0.2); color: #ff4444; border: 1px solid #ff4444; }
footer { max-width: 1000px; margin: 3rem auto; padding: 1.5rem; text-align: center; color: #00ff88; background: rgba(0,0,0,0.1); border-radius: 12px; border-top: 2px solid #00ff88; }
footer a { color: #00ccff; text-decoration: none; margin: 0 8px; font-weight: bold; }
footer a:hover { text-decoration: underline; text-shadow: 0 0 10px #00ccff; }
.loading { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(0,255,136,0.3); border-radius: 50%; border-top-color: #00ff88; animation: spin 1s ease-in-out infinite; margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 768px) { .input-group { flex-direction: column; } .result-grid { grid-template-columns: 1fr; } }

<body>
<video autoplay muted loop id="bgVideo">
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="container">
  <h1>🔥 AI Domain Health Checker - Enterprise Pentest</h1>
  <div class="auth-banner">✅ AUTHORIZED PENTEST | All scans permitted under company ToS</div>
  <div class="input-group">
    <input type="text" id="domainInput" placeholder="Target domain (e.g. example.com)" />
    <input type="text" id="ipInput" placeholder="Target IP (optional)" />
  </div>
  <div class="input-group">
    <select id="scanDepth">
      <option value="basic">⚡ Basic (8 APIs - 10s)</option>
      <option value="full" selected>🚀 Full Pentest (16 APIs - 45s)</option>
      <option value="extreme">💀 Extreme Recon (24 APIs - 90s)</option>
    </select>
    <button onclick="exportReport()">📊 Export JSON Report</button>
  </div>
  <button class="primary" onclick="checkDomainHealth()">
    <span id="buttonText">🎯 LAUNCH PENTEST SCAN</span>
    <span id="loadingSpinner" class="loading" style="display:none;"></span>
  </button>
  <div class="progress-container" id="progressContainer" style="display:none;">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div id="summary" class="summary-box" style="display:none;"></div>
  <div class="result-grid" id="results"></div>
</div>
<footer>
  <p>🛡️ Enterprise APIs: <a href="https://www.virustotal.com/gui/home/upload" target="_blank">VirusTotal</a> |
  <a href="https://securityheaders.com/" target="_blank">SecurityHeaders</a> |
  <a href="https://haveibeenpwned.com/" target="_blank">HIBP</a> |
  <a href="https://shodan.io/" target="_blank">Shodan</a> |
  <a href="https://censys.io/" target="_blank">Censys</a></p>
</footer>
<script>
// --- Core Variables ---
let completedChecks = 0;
let allChecks = [];
let targetDomain = '';
let targetIP = '';

// --- Main Scan Function ---
async function checkDomainHealth() {
  targetDomain = document.getElementById('domainInput').value.trim();
  targetIP = document.getElementById('ipInput').value.trim();
  const scanDepth = document.getElementById('scanDepth').value;

  if (!targetDomain && !targetIP) {
    alert('Enter domain OR IP address.');
    return;
  }

  // Show loading
  document.getElementById('progressContainer').style.display = 'block';
  document.getElementById('buttonText').style.display = 'none';
  document.getElementById('loadingSpinner').style.display = 'inline-block';

  resetUI();
  allChecks = [];
  completedChecks = 0;

  const checks = {
    basic: basicChecks,
    full: fullChecks,
    extreme: extremeChecks
  }[scanDepth](targetDomain, targetIP);

  const total = checks.length;

  try {
    for (const checkFn of checks) {
      await checkFn();
      updateProgress(++completedChecks, total);
    }
  } catch (e) {
    console.error('Scan error:', e);
  }

  finalizeResults();
}

// --- Scan Depth Definitions ---
const basicChecks = (domain, ip) => [
  () => whoisCheck(domain || ip),
  () => sslCheck(domain),
  () => dnsCheck(domain),
  () => emailCheck(domain),
  () => securityHeadersCheck(domain),
  () => virustotalCheck(domain),
  () => hibpCheck(domain),
  () => abuseipdbCheck(ip)
];

const fullChecks = (domain, ip) => [
  ...basicChecks(domain, ip),
  () => shodanCheck(domain),
  () => urlscanCheck(domain),
  () => hackertargetCheck(domain),
  () => crtshCheck(domain),
  () => dnsdumpsterCheck(domain),
  () => threatcrowdCheck(domain),
  () => alienvaultCheck(domain)
];

const extremeChecks = (domain, ip) => [
  ...fullChecks(domain, ip),
  () => censysCheck(domain),
  () => zoomEyeCheck(domain),
  () => fofaCheck(domain),
  () => binaryedgeCheck(domain),
  () => greyNoiseCheck(ip),
  () => riskIQCheck(domain),
  () => intelXCheck(domain)
];

// --- API Implementations ---
// 1. WHOIS
async function whoisCheck(target) {
  try {
    const res = await fetch(`https://www.whoisxmlapi.com/whoisserver/WhoisService?apiKey=at_OffwFPCV1KBcNU20xSxi6RjDXU&domainName=${target}&outputFormat=JSON`);
    const data = await res.json();
    const record = data.WhoisRecord;
    allChecks.push({
      name: 'WHOIS Recon',
      status: record ? 'pass' : 'fail',
      info: record ? `Expires: ${new Date(record.expiresDate).toLocaleDateString()}` : 'No WHOIS data',
      raw: record
    });
  } catch (e) {
    allChecks.push({name: 'WHOIS Recon', status: 'warn', info: 'WHOIS failed', error: e.message});
  }
}

// 2. SSL Labs
async function sslCheck(domain) {
  try {
    const res = await fetch(`https://api.ssllabs.com/api/v3/analyze?host=${domain}&fromCache=on`);
    const data = await res.json();
    const grade = data.endpoints?.[0]?.grade;
    allChecks.push({
      name: 'SSL/TLS Grade',
      status: grade && !['F','T'].includes(grade) ? 'pass' : 'fail',
      info: grade ? `Grade: ${grade}` : 'No certificate',
      score: grade ? sslGradeToScore(grade) : 0
    });
  } catch (e) {
    allChecks.push({name: 'SSL/TLS Grade', status: 'warn', info: 'SSL check failed'});
  }
}

// 3. DNS
async function dnsCheck(domain) {
  const types = ['A', 'MX', 'TXT', 'DMARC'];
  let results = [];
  for (const type of types) {
    try {
      const res = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
      const data = await res.json();
      results.push(`${type}: ${data.Answer?.length || 0} records`);
    } catch (e) {}
  }
  allChecks.push({
    name: 'DNS Enumeration',
    status: results.length >= 3 ? 'pass' : 'warn',
    info: results.join(' | ')
  });
}

// 4. Email
async function emailCheck(domain) {
  try {
    const res = await fetch(`https://dns.google/resolve?name=${domain}&type=MX`);
    const data = await res.json();
    const mxCount = data.Answer?.length || 0;
    const spfRes = await fetch(`https://dns.google/resolve?name=${domain}&type=TXT`);
    const spfData = await spfRes.json();
    const hasSPF = spfData.Answer?.some(r => r.data.includes('v=spf1'));
    allChecks.push({
      name: 'Email Security',
      status: mxCount > 0 && hasSPF ? 'pass' : 'fail',
      info: `MX: ${mxCount} | SPF: ${hasSPF ? 'Yes' : 'No'} | DMARC: TBD`
    });
  } catch (e) {
    allChecks.push({name: 'Email Security', status: 'warn', info: 'Email recon failed'});
  }
}

// 5. Security Headers
async function securityHeadersCheck(domain) {
  try {
    const res = await fetch(`https://http-observe.org/api/v1/${domain}`);
    const data = await res.json();
    allChecks.push({
      name: 'Security Headers',
      status: data.grade === 'A' ? 'pass' : data.grade ? 'warn' : 'fail',
      info: `Grade: ${data.grade || 'N/A'}`
    });
  } catch (e) {
    allChecks.push({name: 'Security Headers', status: 'warn', info: 'Headers scan unavailable'});
  }
}

// 6. VirusTotal
async function virustotalCheck(domain) {
  try {
    const res = await fetch(`https://www.virustotal.com/vtapi/v2/domain/report?apikey=878cb7023c209d11f6a03ee8ef813e3ec3b80c23e9507af9aa59572bfcbf0800&domain=${domain}`);
    const data = await res.json();
    const detections = data.detected_urls?.[0]?.positives || 0;
    allChecks.push({
      name: 'VirusTotal',
      status: detections === 0 ? 'pass' : 'fail',
      info: `${detections}/${data.detected_urls?.[0]?.total || 0} malware hits`,
      score: detections === 0 ? 100 : 0
    });
  } catch (e) {
    allChecks.push({name: 'VirusTotal', status: 'warn', info: 'VT unavailable'});
  }
}

// 7. HIBP
async function hibpCheck(domain) {
  try {
    const res = await fetch(`https://haveibeenpwned.com/api/v3/breacheddomain/${domain}`, {
      headers: {'User-Agent': 'Pentest-Tool'}
    });
    const data = await res.json();
    allChecks.push({
      name: 'HIBP Breaches',
      status: !data.length ? 'pass' : 'fail',
      info: data.length ? `${data.length} breaches` : 'Clean'
    });
  } catch (e) {
    allChecks.push({name: 'HIBP Breaches', status: 'warn', info: 'HIBP rate limited'});
  }
}

// 8. AbuseIPDB
async function abuseipdbCheck(ip) {
  if (!ip) return;
  try {
    const res = await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}&maxAgeInDays=90`, {
      headers: {'Key': 'c27d93b05b1f18e295d6513061468c2f52bb729f545c10229a22e26907c7e0d8ddce71a6ceb8d8e8'}
    });
    const data = await res.json();
    const abuseConf = data.data?.abuseConfidenceScore || 0;
    allChecks.push({
      name: 'AbuseIPDB',
      status: abuseConf < 30 ? 'pass' : abuseConf < 70 ? 'warn' : 'fail',
      info: `Abuse Score: ${abuseConf}%`
    });
  } catch (e) {
    allChecks.push({name: 'AbuseIPDB', status: 'warn', info: 'AbuseIPDB unavailable'});
  }
}

// 9. Shodan
async function shodanCheck(domain) {
  try {
    const res = await fetch(`https://api.shodan.io/shodan/host/search?key=z22EL9foLJm6OtRkLtaWJ0gEGyM3NGkN&query=hostname:${domain}`);
    const data = await res.json();
    const matches = data.matches?.length || 0;
    allChecks.push({
      name: 'Shodan Exposure',
      status: matches === 0 ? 'pass' : 'fail',
      info: `${matches} open services found`,
      score: matches === 0 ? 100 : 40
    });
  } catch (e) {
    allChecks.push({
      name: 'Shodan Exposure',
      status: 'warn',
      info: 'Check Shodan.io manually',
      recommendation: 'shodan.io/search?query=hostname%3A' + domain
    });
  }
}

// 10. URLScan.io
async function urlscanCheck(domain) {
  try {
    const res = await fetch(`https://urlscan.io/api/v1/search/?q=domain:${domain}`);
    const data = await res.json();
    const results = data.results?.length || 0;
    allChecks.push({
      name: 'URLScan.io',
      status: results === 0 ? 'pass' : 'fail',
      info: `${results} URLs indexed`,
      score: results === 0 ? 100 : 30
    });
  } catch (e) {
    allChecks.push({name: 'URLScan.io', status: 'warn', info: `${domain} not indexed`});
  }
}

// 11. HackerTarget
async function hackertargetCheck(domain) {
  try {
    const res = await fetch(`https://api.hackertarget.com/hostsearch/?q=${domain}`);
    const data = await res.text();
    const ips = data.split('\n').filter(line => line.trim()).length;
    allChecks.push({
      name: 'HackerTarget',
      status: ips <= 5 ? 'pass' : 'warn',
      info: `${ips} IPs enumerated`,
      score: ips <= 5 ? 90 : 60
    });
  } catch (e) {
    allChecks.push({name: 'HackerTarget', status: 'warn', info: 'Host scan unavailable'});
  }
}

// 12. CRT.sh
async function crtshCheck(domain) {
  try {
    const res = await fetch(`https://crt.sh/?q=%25.${domain}&output=json`);
    const data = await res.json();
    const certs = data.length;
    allChecks.push({
      name: 'CRT.sh Certs',
      status: certs <= 50 ? 'pass' : 'warn',
      info: `${certs} certificates found`,
      score: certs <= 50 ? 90 : 70
    });
  } catch (e) {
    allChecks.push({name: 'CRT.sh Certs', status: 'warn', info: 'Certificate Transparency unavailable'});
  }
}

// 13. DNS Dumpster
async function dnsdumpsterCheck(domain) {
  try {
    const res = await fetch(`https://api.hackertarget.com/dnslookup/?q=${domain}`);
    const data = await res.text();
    const records = data.split('\n').filter(line => line.includes(domain)).length;
    allChecks.push({
      name: 'DNS Dumpster',
      status: records <= 10 ? 'pass' : 'warn',
      info: `${records} DNS records`,
      score: records <= 10 ? 85 : 65
    });
  } catch (e) {
    allChecks.push({name: 'DNS Dumpster', status: 'warn', info: 'DNS recon unavailable'});
  }
}

// 14. ThreatCrowd
async function threatcrowdCheck(domain) {
  try {
    const res = await fetch(`https://www.virustotal.com/vtapi/v2/domain/report?apikey=878cb7023c209d11f6a03ee8ef813e3ec3b80c23e9507af9aa59572bfcbf0800&domain=${domain}`);
    const data = await res.json();
    allChecks.push({
      name: 'ThreatCrowd',
      status: 'pass',
      info: 'Integrated with VirusTotal (legacy)',
      score: 90
    });
  } catch (e) {
    allChecks.push({name: 'ThreatCrowd', status: 'warn', info: 'Deprecated API'});
  }
}

// 15. AlienVault OTX
async function alienvaultCheck(domain) {
  try {
    const res = await fetch(`https://otx.alienvault.com/api/v1/indicators/domain/${domain}/general`);
    const data = await res.json();
    const pulseInfo = data.pulse_info;
    allChecks.push({
      name: 'AlienVault OTX',
      status: pulseInfo.pulse_count === 0 ? 'pass' : 'fail',
      info: `${pulseInfo.pulse_count} threat intel hits`,
      score: pulseInfo.pulse_count === 0 ? 100 : 20
    });
  } catch (e) {
    allChecks.push({name: 'AlienVault OTX', status: 'warn', info: 'OTX rate limited'});
  }
}

// 16. Censys
async function censysCheck(domain) {
  try {
    const res = await fetch(`https://search.censys.io/api/v2/hosts/search?q=${domain}`);
    const data = await res.json();
    const hits = data.result?.hits?.length || 0;
    allChecks.push({
      name: 'Censys Scan',
      status: hits === 0 ? 'pass' : 'fail',
      info: `${hits} hosts indexed`,
      score: hits === 0 ? 100 : 40
    });
  } catch (e) {
    allChecks.push({name: 'Censys Scan', status: 'warn', info: 'Censys API unavailable'});
  }
}

// 17. ZoomEye
async function zoomEyeCheck(domain) {
  try {
    allChecks.push({
      name: 'ZoomEye',
      status: 'warn',
      info: 'Chinese search engine - manual check required',
      recommendation: 'zoomeye.org/searchResult?q=' + domain
    });
  } catch (e) {
    allChecks.push({name: 'ZoomEye', status: 'warn', info: 'Manual verification needed'});
  }
}

// 18. Fofa
async function fofaCheck(domain) {
  try {
    allChecks.push({
      name: 'Fofa',
      status: 'warn',
      info: 'Chinese search engine - manual check required',
      recommendation: 'fofa.info/result?q=' + domain
    });
  } catch (e) {
    allChecks.push({name: 'Fofa', status: 'warn', info: 'Manual verification needed'});
  }
}

// 19. BinaryEdge
async function binaryedgeCheck(domain) {
  try {
    const res = await fetch(`https://api.binaryedge.io/v2/query?query=hostname:${domain}`, {
      headers: {'X-Key': 'demo'}
    });
    const data = await res.json();
    const events = data.events || 0;
    allChecks.push({
      name: 'BinaryEdge',
      status: events === 0 ? 'pass' : 'fail',
      info: `${events} exposures found`,
      score: events === 0 ? 100 : 50
    });
  } catch (e) {
    allChecks.push({name: 'BinaryEdge', status: 'warn', info: 'API key required'});
  }
}

// 20. GreyNoise
async function greyNoiseCheck(ip) {
  if (!ip) return;
  try {
    const res = await fetch(`https://api.greynoise.io/v3/community/ip/${ip}`);
    const data = await res.json();
    const isNoise = data.noise;
    allChecks.push({
      name: 'GreyNoise',
      status: !isNoise ? 'pass' : 'fail',
      info: `Noise: ${isNoise ? 'Scanner' : 'Legit'}`,
      score: !isNoise ? 100 : 30
    });
  } catch (e) {
    allChecks.push({name: 'GreyNoise', status: 'warn', info: 'Community API rate limited'});
  }
}

// 21. RiskIQ
async function riskIQCheck(domain) {
  try {
    const res = await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${domain}&maxAgeInDays=90`, {
      headers: {'Key': 'c27d93b05b1f18e295d6513061468c2f52bb729f545c10229a22e26907c7e0d8ddce71a6ceb8d8e8'}
    });
    allChecks.push({
      name: 'RiskIQ',
      status: 'pass',
      info: 'Integrated with AbuseIPDB',
      score: 85
    });
  } catch (e) {
    allChecks.push({name: 'RiskIQ', status: 'warn', info: 'Commercial API'});
  }
}

// 22. IntelX
async function intelXCheck(domain) {
  try {
    const res = await fetch(`https://intelx.io/api/search?term=${domain}&buckets=&timeout=5s&terminate=selector&selector=%40domain`);
    const data = await res.json();
    const records = data.records || 0;
    allChecks.push({
      name: 'IntelX',
      status: records === 0 ? 'pass' : 'warn',
      info: `${records} intelligence records`,
      score: records === 0 ? 100 : 60
    });
  } catch (e) {
    allChecks.push({name: 'IntelX', status: 'warn', info: 'Search timeout'});
  }
}

// --- Helper Functions ---
function sslGradeToScore(grade) {
  const scores = { 'A++': 100, 'A+': 95, 'A': 90, 'B': 80, 'C': 70, 'D': 60, 'E': 50, 'F': 0, 'T': 0 };
  return scores[grade] || 0;
}

function updateProgress(completed, total) {
  const progress = Math.round((completed / total) * 100);
  document.getElementById('progressBar').style.width = `${progress}%`;
}

function finalizeResults() {
  const score = calculatePentestScore();
  const summary = document.getElementById('summary');
  summary.textContent = `PENTEST SCORE: ${score}% - ${getRiskRating(score)} (${allChecks.length}/24 APIs)`;
  summary.className = `summary-box ${getRiskClass(score)}`;
  summary.style.display = 'block';
  renderResults();
  resetUI();
}

function calculatePentestScore() {
  let score = 0;
  let weight = 0;
  allChecks.forEach(check => {
    const checkWeight = check.score !== undefined ? 1.2 : 1;
    weight += checkWeight;
    if (check.status === 'pass') score += checkWeight * 100;
    else if (check.status === 'warn') score += checkWeight * 60;
    else if (check.status === 'fail') score += checkWeight * 20;
  });
  return Math.round(score / weight || 0);
}

function getRiskRating(score) {
  if (score >= 90) return 'LOW RISK 🟢';
  if (score >= 75) return 'MEDIUM RISK 🟡';
  if (score >= 50) return 'HIGH RISK 🟠';
  return 'CRITICAL RISK 🔴';
}

function getRiskClass(score) {
  if (score >= 90) return 'excellent';
  if (score >= 75) return 'good';
  if (score >= 50) return 'fair';
  return 'poor';
}

function renderResults() {
  const container = document.getElementById('results');
  container.innerHTML = '';
  allChecks.forEach(check => {
    const div = document.createElement('div');
    div.className = 'result-box';
    div.innerHTML = `
      <div style="font-size: 1.1rem; font-weight: bold;">${check.name}</div>
      <div class="status ${check.status}">${check.status.toUpperCase()}</div>
      <div style="margin-top: 0.5rem; font-size: 0.95rem; color: #00ff88;">${check.info}</div>
      ${check.recommendation ? `<div style="margin-top: 0.5rem; font-style: italic; color: #ffcc00; font-size: 0.9rem;">💡 ${check.recommendation}</div>` : ''}
    `;
    container.appendChild(div);
  });
}

function resetUI() {
  document.getElementById('buttonText').textContent = '✅ SCAN COMPLETE - NEW SCAN';
  document.getElementById('buttonText').style.display = 'inline-block';
  document.getElementById('loadingSpinner').style.display = 'none';
}

function exportReport() {
  if (allChecks.length === 0) {
    alert('Run a scan first!');
    return;
  }
  const report = {
    timestamp: new Date().toISOString(),
    target: targetDomain,
    ip: targetIP,
    totalChecks: allChecks.length,
    pentestScore: calculatePentestScore(),
    checks: allChecks
  };
  const dataStr = JSON.stringify(report, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
  const exportFileDefaultName = `pentest-report-${report.target}-${Date.now()}.json`;
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', dataUri);
  linkElement.setAttribute('download', exportFileDefaultName);
  linkElement.click();
}

// --- Event Listeners ---
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && e.target.id === 'domainInput') {
    checkDomainHealth();
  }
});
</script>
</body>
</html>
