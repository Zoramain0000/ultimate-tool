<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • Weak Password Pattern Generator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  color:#d1d1d1;
  overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.35);
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;
  text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{
  font-size:26px;
  letter-spacing:2px;
}

.container{
  max-width:950px;
  margin:30px auto;
  padding:20px;
  background:rgba(0,0,0,0.65);
  border-radius:10px;
  box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.section{margin-bottom:25px;}
.section h2{
  font-size:18px;
  margin-bottom:10px;
  color:#9f9f9f;
  border-left:4px solid #555;
  padding-left:10px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:6px;
  border:1px solid #444;
  background:black;
  color:#fff;
  margin-bottom:10px;
}

button{
  padding:12px 20px;
  background:black;
  border:1px solid #333;
  color:white;
  cursor:pointer;
  border-radius:6px;
  transition:.3s;
}
button:hover{
  background:#111;
  transform:scale(1.05);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  background:rgba(15,15,15,0.9);
  border:1px solid #222;
  border-radius:8px;
  padding:10px;
}

.password{
  font-family:monospace;
  color:#ff7777;
  word-break:break-all;
}

.log{
  background:black;
  padding:12px;
  border-radius:6px;
  font-family:monospace;
  font-size:13px;
  color:#8aff8a;
  max-height:200px;
  overflow:auto;
  border:1px solid #222;
}

.bad{
  color:#ff5555;
  font-weight:bold;
}

footer{
  background:rgba(0,0,0,0.7);
  text-align:center;
  padding:15px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • WEAK PASSWORD PATTERN GENERATOR</h1>
</header>

<div class="container">

  <div class="section">
    <h2>Generation Settings</h2>
    <input id="baseWord" placeholder="Base word (name, keyword, brand)" />
    <select id="pattern">
      <option value="common">Common Passwords</option>
      <option value="keyboard">Keyboard Patterns</option>
      <option value="nameYear">Name + Year</option>
      <option value="numeric">Numeric Only</option>
      <option value="reuse">Reused Variants</option>
      <option value="leet">Weak Leetspeak</option>
    </select>
    <input type="number" id="count" min="1" max="999" value="20" placeholder="Number of passwords" />
    <button onclick="generate()">Generate Weak Passwords</button>
    <button onclick="copyAll()">Copy All</button>
  </div>

  <div class="section">
    <h2>Generated Weak Passwords</h2>
    <div class="grid" id="results"></div>
  </div>

  <div class="section">
    <h2>Activity Log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>
  Educational & ethical use only — Security awareness & testing
</footer>

<script>
const log = msg=>{
  const l=document.getElementById("log");
  l.innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop=l.scrollHeight;
};

const common = ["password","123456","12345678","qwerty","admin","letmein","welcome"];
const keyboard = ["qwerty","asdfgh","zxcvbn","123qwe","1q2w3e"];
const years = ["2024","2023","2022","2021","1990","1995","2000"];

function generate(){
  const base = document.getElementById("baseWord").value || "user";
  const type = document.getElementById("pattern").value;
  const count = parseInt(document.getElementById("count").value);
  const out = document.getElementById("results");
  out.innerHTML="";

  for(let i=0;i<count;i++){
    let p="";
    switch(type){
      case "common":
        p = common[Math.floor(Math.random()*common.length)];
        break;
      case "keyboard":
        p = keyboard[Math.floor(Math.random()*keyboard.length)];
        break;
      case "nameYear":
        p = base + years[Math.floor(Math.random()*years.length)];
        break;
      case "numeric":
        p = Math.floor(100000 + Math.random()*900000).toString();
        break;
      case "reuse":
        p = base + "123";
        break;
      case "leet":
        p = base.replace(/a/g,"@").replace(/e/g,"3").replace(/i/g,"1") + "1";
        break;
    }

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<div class="password">${p}</div><div class="bad">WEAK</div>`;
    out.appendChild(card);
  }

  log(`Generated ${count} weak password patterns (${type}).`);
}

function copyAll(){
  const pw=[...document.querySelectorAll(".password")].map(e=>e.textContent).join("\n");
  navigator.clipboard.writeText(pw);
  log("All passwords copied to clipboard.");
}
</script>

</body>
</html>
