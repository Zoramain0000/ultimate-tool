async function createRowWithRealHostname(hopCount) {
  const entry = generateTraceEntry(hopCount);
  elements.loadingIndicator.textContent = `🔍 Resolving ${entry.hopIp}... (${hopCount}/${BATCH_SIZE})`;
  
  // Get REAL hostname
  entry.hostname = await getRealHostname(entry.hopIp);
  
  const tr = document.createElement('tr');
  tr.className = 'clickable';
  tr.dataset.entry = JSON.stringify(entry);
  
  let statusColor = 'red';
  if (entry.status === 'REACHED') statusColor = '#00ff00';
  if (entry.status === 'TIMEOUT') statusColor = '#ffaa00';
  
  tr.innerHTML = `
    <td style="color:#fff;">${entry.hop}</td>
    <td>${entry.hopIp}</td>
    <td style="color:#00ff88;">${entry.hostname}</td>
    <td style="color:#fff;">${entry.target}</td>
    <td>${entry.region}</td>
    <td>${entry.ttl}</td>
    <td style="color:${entry.latency > 200 ? '#ffaa00' : '#00ff00'}">${entry.latency}</td>
    <td style="color:${statusColor}; font-weight:bold;">${entry.status}</td>
    <td style="color:#00ccff;">${entry.protocol}</td>
    <td style="color:#ffcc00;">${entry.port}</td>
  `;
  
  return { tr, entry };
}

function generateTraceEntry(hopCount) {
  let protocol = elements.protocolSelect.value;
  if (protocol === 'ALL') {
    protocol = protocols[randInt(0, protocols.length - 1)];
  }

  let port = '-';
  const portSetting = elements.portSelect.value;
  if (protocol !== 'ICMP' && protocol !== 'GRE') {
    if (portSetting === 'range1024') port = randInt(1, 1024);
    else if (portSetting === 'range65535') port = randInt(1, 65535);
    else port = randInt(1, 1024);
  }

  return {
    hop: totalLogsGenerated + 1,
    hopIp: generateHopIP(hopCount),
    target: currentTarget,
    region: currentCountry,
    ttl: randInt(1, 64),
    latency: randInt(1, 500) + '.' + randInt(0,9),
    status: (randInt(0, 20) === 0) ? "TIMEOUT" : "REACHED",
    protocol: protocol,
    port: port
  };
}

async function loadMoreLogs() {
  if(totalLogsGenerated >= MAX_LOGS) {
    elements.loadingIndicator.textContent = "Max hops reached.";
    elements.loadingIndicator.hidden = false;
    return;
  }
  
  elements.loadingIndicator.hidden = false;
  
  const fragment = document.createDocumentFragment();
  for(let i = 0; i < BATCH_SIZE && totalLogsGenerated < MAX_LOGS; i++, totalLogsGenerated++) {
    const { tr, entry } = await createRowWithRealHostname(totalLogsGenerated);
    allEntries.push(entry);
    fragment.appendChild(tr);
  }
  
  elements.logBody.appendChild(fragment);
  elements.loadingIndicator.hidden = true;
}

function resetLogs() {
  totalLogsGenerated = 0;
  allEntries = [];
  hostnameCache.clear();
  elements.logBody.innerHTML = '';
  elements.loadingIndicator.hidden = true;
}

function filterLogs() {
  const filter = elements.searchInput.value.toLowerCase();
  [...elements.logBody.children].forEach(tr => {
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(filter) ? "" : "none";
  });
}

// QR Functions
function generateQRImage() {
  if (!currentQRData) return;

  qrCounter++;
  const size = parseInt(elements.qrSizeSelector.value);
  elements.qrDiv.innerHTML = "";
  elements.qrImageContainer.style.width = (size + 20) + 'px'; 
  elements.qrImageContainer.style.height = (size + 20) + 'px';
  
  elements.qrStatus.textContent = `Generating Authentic Hop QR #${qrCounter}...`;
  
  try {
    qrCodeObj = new QRCode(elements.qrDiv, {
      text: currentQRData,
      width: size,
      height: size,
      colorDark : "#000000",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });
    elements.qrStatus.textContent = `✅ Authentic Hop QR #${qrCounter} READY`;
  } catch (e) {
    elements.qrStatus.textContent = "❌ Generation Failed";
  }
}

function showQRModal(entry) {
  currentQRData = `HopID:${entry.hop}\nIP:${entry.hopIp}\nHost:${entry.hostname}\nTGT:${entry.target}\nREG:${entry.region}\nTTL:${entry.ttl}\nLAT:${entry.latency}ms\nSTS:${entry.status}\nPROT:${entry.protocol}\nPORT:${entry.port}`;
  
  elements.qrDetails.textContent = currentQRData;
  
  elements.qrModal.style.display = 'flex';
  setTimeout(() => elements.qrModal.classList.add('active'), 10);
  
  elements.qrModalContent.classList.remove('qr-hidden');
  elements.btnHide.style.display = 'inline-block';
  elements.btnShow.style.display = 'none';
  
  generateQRImage();
}

// EVENT LISTENERS
elements.generateBtn.onclick = async () => {
  const target = elements.targetInput.value.trim();
  if(!target) {
    alert("Please enter a Target IP or Domain to begin generation.");
    return;
  }
  currentTarget = target;
  currentCountry = elements.countrySelect.value;
  resetLogs();
  await loadMoreLogs();
};

elements.logContainer.onscroll = async () => {
  if(!elements.loadingIndicator.hidden || elements.searchInput.value.trim()) return;
  if(elements.logContainer.scrollTop + elements.logContainer.clientHeight >= elements.logContainer.scrollHeight - 50) {
    await loadMoreLogs();
  }
};

// Table Row Click
elements.logBody.addEventListener('click', (e) => {
  const tr = e.target.closest('tr');
  if (tr && tr.classList.contains('clickable')) {
    try {
      const entry = JSON.parse(tr.dataset.entry);
      showQRModal(entry);
    } catch(err) {
      console.error("Failed to parse entry", err);
    }
  }
});

elements.qrSizeSelector.addEventListener('change', generateQRImage);
elements.btnHide.onclick = () => {
  elements.qrModalContent.classList.add('qr-hidden');
  elements.btnHide.style.display = 'none';
  elements.btnShow.style.display = 'inline-block';
};
elements.btnShow.onclick = () => {
  elements.qrModalContent.classList.remove('qr-hidden');
  elements.btnHide.style.display = 'inline-block';
  elements.btnShow.style.display = 'none';
};
elements.btnDownloadQR.onclick = () => {
  const img = elements.qrDiv.querySelector('img');
  if (img) {
    const link = document.createElement('a');
    link.download = `HOP-QR-${Date.now()}.png`;
    link.href = img.src;
    link.click();
  }
};

function closeModal() {
  elements.qrModal.classList.remove('active');
  setTimeout(() => {
    elements.qrModal.style.display = 'none';
    currentQRData = null;
    elements.qrDiv.innerHTML = "";
  }, 300);
}

elements.btnExit.onclick = closeModal;
elements.qrModal.onclick = (e) => {
  if(e.target === elements.qrModal) closeModal();
};

elements.searchInput.oninput = filterLogs;

elements.downloadBtn.onclick = () => {
  const headers = Array.from(document.querySelectorAll('thead th')).map(th => th.textContent).join(',');
  const csv = headers + "\n" + 
    allEntries.map(e => `"${e.hop}","${e.hopIp}","${e.hostname}","${e.target}","${e.region}","${e.ttl}","${e.latency}","${e.status}","${e.protocol}","${e.port}"`).join("\n");
  const link = document.createElement("a");
  link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  link.download = `traceroute-${currentTarget}-${Date.now()}.csv`;
  link.click();
};

// Initialize
populateCountries();
elements.countrySelect.value = 'United States';

})();
</script>
</body>
</html>
