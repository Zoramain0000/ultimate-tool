<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • Advanced Calculator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Courier New',monospace;color:gray;overflow-x:hidden;}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(0.5) contrast(1.1);
}
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.1); /* very light overlay for readability */
  z-index:-1;
}

/* HEADER */
header{
  background:rgba(0,0,0,0.3); /* more transparent */
  padding:18px;text-align:center;border-bottom:1px solid #1f1f1f;
}
header h1{font-size:28px;letter-spacing:2px;color:#d1d1d1;}

/* CONTAINER */
.container{
  max-width:500px;margin:40px auto;padding:20px;
  background:rgba(0,0,0,0.2); /* transparent background */
  border-radius:12px;box-shadow:0 0 35px rgba(0,255,65,0.4);
}

/* SECTION */
.section{margin-bottom:25px;}
.section h2{
  font-size:20px;margin-bottom:15px;color:#d1d1d1;border-left:4px solid #d1d1d1;padding-left:10px;
}

/* DISPLAY */
.display{
  background:rgba(0,0,0,0.15); /* transparent display */
  padding:20px;border-radius:10px;border:1px solid #222;
  font-size:24px;text-align:right;color:#00ff7f;margin-bottom:15px;
  min-height:50px;overflow-x:auto;
}

/* CALCULATOR GRID */
.calc-grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
}

button{
  padding:18px;font-size:20px;border:none;border-radius:8px;cursor:pointer;color:#fff;background:rgba(17,17,17,0.8);
  transition:.3s;
}
button:hover{background:rgba(34,34,34,0.8);transform:scale(1.05);}
button:active{transform:scale(0.98);}
button.operator{background:rgba(51,51,51,0.8);color:#ffcc00;}
button.equal{background:rgba(0,204,51,0.9);color:#000;font-weight:bold;}
button.clear{background:rgba(255,68,68,0.85);color:#fff;grid-column:span 4;}
</style>
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • ADVANCED CALCULATOR</h1>
</header>

<div class="container">

  <div class="section">
    <h2>Calculator</h2>
    <div class="display" id="display">0</div>

    <div class="calc-grid">
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button class="operator" onclick="chooseOperator('/')">÷</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button class="operator" onclick="chooseOperator('*')">×</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button class="operator" onclick="chooseOperator('-')">−</button>

      <button onclick="appendNumber('0')">0</button>
      <button onclick="appendDecimal()">.</button>
      <button class="equal" onclick="calculate()">=</button>
      <button class="operator" onclick="chooseOperator('+')">+</button>

      <button class="clear" onclick="clearDisplay()">CLEAR</button>
    </div>
  </div>

</div>

<script>
let currentInput = '';
let previousInput = '';
let operation = null;

const display = document.getElementById('display');

function appendNumber(number){
  if(currentInput.length >= 12) return;
  if(number === '0' && currentInput === '0') return;
  if(currentInput === '0' && number !== '.') currentInput = '';
  currentInput += number;
  updateDisplay();
}

function appendDecimal(){
  if(!currentInput.includes('.')) currentInput += '.';
  updateDisplay();
}

function chooseOperator(op){
  if(currentInput === '') return;
  if(previousInput !== '') calculate();
  operation = op;
  previousInput = currentInput;
  currentInput = '';
}

function calculate(){
  if(previousInput === '' || currentInput === '' || !operation) return;
  let result = 0;
  const prev = parseFloat(previousInput);
  const current = parseFloat(currentInput);
  switch(operation){
    case '+': result = prev + current; break;
    case '-': result = prev - current; break;
    case '*': result = prev * current; break;
    case '/': result = current === 0 ? 'Error' : prev / current; break;
  }
  currentInput = result.toString();
  operation = null;
  previousInput = '';
  updateDisplay();
}

function clearDisplay(){
  currentInput = '';
  previousInput = '';
  operation = null;
  updateDisplay();
}

function updateDisplay(){
  display.textContent = currentInput || '0';
}
</script>

</body>
</html>
