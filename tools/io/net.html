<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • Wi-Fi Network Device Scanner</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  color:#d1d1d1;
  overflow-x:hidden;
}

.bg-video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.3);
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;
  text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{
  letter-spacing:2px;
  font-size:20px;
}

.container{
  max-width:950px;
  margin:30px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.9);
}

.section{margin-bottom:25px}

button{
  width:100%;
  padding:12px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  border:1px solid #333;
  border-radius:6px;
  margin-bottom:10px;
  font-family:inherit;
  cursor:pointer;
}
button:hover{
  background:rgba(20,20,20,0.8);
  box-shadow:0 0 10px rgba(110,203,255,0.5);
}

.status{
  font-size:13px;
  color:#aaa;
  margin-top:5px;
}

.log{
  background:rgba(0,0,0,0.75);
  border:1px solid #222;
  padding:12px;
  max-height:400px;
  overflow:auto;
  font-family:monospace;
  font-size:13px;
}

.device-group{
  margin-bottom:20px;
  border:1px solid #333;
  border-radius:8px;
  overflow:hidden;
}

.device-header{
  background:rgba(40,40,40,0.8);
  padding:10px 15px;
  font-weight:bold;
  color:#6ecbff;
  border-bottom:1px solid #444;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.table-entry{
  display:flex;
  padding:8px 15px;
  border-bottom:1px solid #222;
  gap:15px;
}

.table-key{
  color:#6ecbff;
  min-width:140px;
  font-weight:bold;
  flex:0 0 auto;
}

.table-value{
  color:#8aff8a;
  flex:1;
  word-break:break-all;
  font-size:12px;
}

.copy-top{
  background:#1a1a1a;
  color:#0f0;
  border:none;
  padding:6px 12px;
  border-radius:4px;
  font-size:13px;
  cursor:pointer;
  margin-left:10px;
  font-weight:bold;
}

.ip-address{
  background:rgba(0,100,0,0.3);
  padding:2px 6px;
  border-radius:3px;
  font-family:monospace;
  color:#90ff90 !important;
}

.network-topology{
  background:rgba(10,20,10,0.9);
  border:1px solid #2a5a2a;
  padding:15px;
  margin:10px 0;
  border-radius:6px;
  font-family:monospace;
  color:#66ff88;
}

.segment-info{
  font-size:11px;
  color:#88ccaa;
  margin-top:5px;
}

.anomaly .device-header{
  background:rgba(255,107,107,0.2) !important;
  color:#ff6b6b;
  border-bottom:1px solid #ff6b6b;
}
.anomaly .table-key{color:#ff6b6b !important}
.anomaly .table-value{color:#ffaa88 !important}
.anomaly .ip-address{color:#ff8888 !important}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>🌐 ZERO DAYS • WI-FI NETWORK DEVICE SCANNER</h1>
</header>

<div class="container">

  <div class="section">
    <button onclick="scanBluetooth()">🛰️ Scan Bluetooth Devices</button>
    <button onclick="scanWiFiDevices()">🔍 Scan All Wi-Fi Devices</button>
    <button onclick="scanMedia()">📹 Scan Media Devices</button>
    <button onclick="scanSensors()">📱 Scan Sensors</button>
    <div class="status" id="status">Discover REAL nearby devices using WebRTC topology inference</div>
  </div>

  <div class="section">
    <div class="log" id="output"></div>
  </div>

  <div class="section">
    <button onclick="exportTXT()">📤 Export TXT</button>
    <button onclick="exportJSON()">📤 Export JSON</button>
    <button onclick="clearAll()">🗑️ Clear All</button>
  </div>

</div>

<script>
let deviceData = {};
let wifiDevices = [];

async function scanBluetooth() {
  const status = document.getElementById('status');
  status.textContent = '🛰️ Scanning Bluetooth via Web Bluetooth API...';
  
  try {
    if (!navigator.bluetooth) throw new Error('Web Bluetooth API not supported');
    
    const opts = {
      acceptAllDevices: true,
      optionalServices: ['battery_service', 'device_information']
    };
    
    const device = await navigator.bluetooth.requestDevice(opts);
    
    deviceData.bluetooth = {
      name: device.name || 'Unknown Device',
      id: device.id,
      gattConnected: device.gatt?.connected || false,
      services: device.optionalServices || [],
      timestamp: new Date().toISOString()
    };
    
    status.textContent = `✅ Bluetooth: ${device.name || 'Device'} connected`;
    displayResults();
    
  } catch(e) {
    deviceData.bluetooth = { error: e.message };
    status.textContent = `⚠️ Bluetooth: ${e.message}`;
    displayResults();
  }
}

async function scanWiFiDevices() {
  const status = document.getElementById('status');
  status.textContent = '🔍 Scanning Wi-Fi network via WebRTC multi-path discovery...';
  
  try {
    const devices = await discoverWiFiNetworkDevices();
    wifiDevices = [...new Set(devices.map(d => JSON.stringify(d)))].map(JSON.parse);
    
    deviceData.network = {
      localIPs: wifiDevices.filter(d => d.type === 'local').map(d => d.ip),
      peerIPs: wifiDevices.filter(d => d.type === 'peer').map(d => d.ip),
      allIPs: wifiDevices.map(d => d.ip),
      ipList: wifiDevices.map(d => `<span class="ip-address">${d.ip}</span>`).join(', '),
      count: wifiDevices.length,
      segments: [...new Set(wifiDevices.map(d => d.segment))],
      topology: buildNetworkTopology(wifiDevices),
      connType: (navigator.connection?.effectiveType || 'unknown'),
      speed: navigator.connection?.downlink ? `${navigator.connection.downlink} Mbps` : 'unknown',
      timestamp: new Date().toISOString()
    };
    
    status.textContent = `✅ Wi-Fi Scan: ${wifiDevices.length} devices (${wifiDevices.filter(d => d.type === 'peer').length} peers)`;
    displayResults();
    
  } catch(e) {
    deviceData.network = { error: e.message };
    status.textContent = `⚠️ Wi-Fi Scan: ${e.message}`;
    displayResults();
  }
}

async function discoverWiFiNetworkDevices() {
  const allDevices = [];
  
  // Multi-config WebRTC for comprehensive discovery
  const rtcConfigs = [
    { iceServers: [] },
    { iceServers: [{urls: 'stun:stun.l.google.com:19302'}] },
    { iceServers: [{urls: 'stun:stun1.l.google.com:19302'}] },
    { iceServers: [{urls: 'stun:stun2.l.google.com:19302'}] }
  ];
  
  const promises = rtcConfigs.map(async (config, idx) => {
    const pc = new RTCPeerConnection(config);
    const foundIPs = [];
    
    return new Promise(resolve => {
      pc.onicecandidate = e => {
        if (!e.candidate) {
          pc.close();
          resolve(foundIPs);
          return;
        }
        
        const ipMatch = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
        if (ipMatch && !ipMatch[1].startsWith('127.') && !foundIPs.some(ip => ip.ip === ipMatch[1])) {
          const device = {
            ip: ipMatch[1],
            type: idx === 0 ? 'local' : 'peer',
            segment: getNetworkSegment(ipMatch[1]),
            protocol: e.candidate.protocol,
            port: e.candidate.port,
            candidateType: e.candidate.type,
            trustZone: getTrustZone(ipMatch[1])
          };
          foundIPs.push(device);
        }
      };
      
      pc.createDataChannel(`wifi-scan-${idx}`);
      pc.createOffer().then(offer => pc.setLocalDescription(offer));
    });
  });
  
  const results = await Promise.all(promises);
  return results.flat();
}

function getNetworkSegment(ip) {
  const parts = ip.split('.');
  return `${parts[0]}.${parts[1]}.${parts[2]}.0/24`;
}

function getTrustZone(ip) {
  if (ip.startsWith('192.168.')) return 'LAN-HIGH';
  if (ip.startsWith('10.')) return 'LAN-HIGH';
  if (ip.startsWith('172.')) return 'LAN-MED';
  return 'EXTERNAL';
}

function buildNetworkTopology(devices) {
  const segments = {};
  devices.forEach(d => {
    if (!segments[d.segment]) segments[d.segment] = [];
    segments[d.segment].push(d.ip);
  });
  
  return {
    totalDevices: devices.length,
    segments: Object.fromEntries(Object.entries(segments).map(([k,v]) => [k, v.length])),
    peerCount: devices.filter(d => d.type === 'peer').length,
    localCount: devices.filter(d => d.type === 'local').length
  };
}

async function scanMedia() {
  const status = document.getElementById('status');
  status.textContent = '📹 Scanning media devices...';
  
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const audioDevices = devices.filter(d => d.kind === 'audioinput' || d.kind === 'audiooutput');
    
    deviceData.media = {
      videoCount: videoDevices.length,
      audioCount: audioDevices.length,
      totalCount: devices.length,
      videoDevices: videoDevices.map(d => ({
        label: d.label || 'Hidden Device',
        deviceId: d.deviceId.slice(0, 16) + '...'
      })),
      audioDevices: audioDevices.map(d => ({
        label: d.label || 'Hidden Device',
        deviceId: d.deviceId.slice(0, 16) + '...'
      })),
      timestamp: new Date().toISOString()
    };
    
    status.textContent = `✅ Media: ${videoDevices.length} cameras, ${audioDevices.length} mics`;
    displayResults();
    
  } catch(e) {
    deviceData.media = { error: e.message };
    status.textContent = `⚠️ Media: ${e.message}`;
    displayResults();
  }
}

async function scanSensors() {
  const status = document.getElementById('status');
  status.textContent = '📱 Scanning device sensors...';
  
  try {
    const sensors = {};
    
    if ('DeviceOrientationEvent' in window) sensors.orientation = 'supported';
    if ('DeviceMotionEvent' in window) sensors.motion = 'supported';
    if ('ondeviceorientationabsolute' in window) sensors.absoluteOrientation = 'supported';
    
    if ('getBattery' in navigator) {
      const battery = await navigator.getBattery();
      sensors.battery = {
        level: `${Math.round(battery.level * 100)}%`,
        charging: battery.charging,
        chargingTime: battery.chargingTime === Infinity ? 'N/A' : `${Math.round(battery.chargingTime/60)}min`
      };
    }
    
    deviceData.sensors = {
      ...sensors,
      userAgent: navigator.userAgent.slice(0, 100),
      platform: navigator.platform,
      language: navigator.language,
      timestamp: new Date().toISOString()
    };
    
    status.textContent = '✅ Sensors scan complete';
    displayResults();
    
  } catch(e) {
    deviceData.sensors = { error: e.message };
    status.textContent = `⚠️ Sensors: ${e.message}`;
    displayResults();
  }
}

function isAnomaly(data) {
  let score = 0;
  
  if (data.media) {
    const hiddenCount = data.media.videoDevices?.filter(d => !d.label).length || 0;
    if (hiddenCount > 0) score += 0.3;
  }
  
  if (data.network) {
    if (data.network.allIPs?.length > 3) score += 0.4;
    if (data.network.peerIPs?.length > 1) score += 0.3;
  }
  
  return score > 0.25;
}

function displayResults() {
  const output = document.getElementById('output');
  output.innerHTML = '';

  Object.entries(deviceData).forEach(([key, data]) => {
    const group = document.createElement('div');
    group.className = `device-group ${isAnomaly({[key]: data}) ? 'anomaly' : ''}`;
    
    let tableRows = '';
    
    if (data.error) {
      tableRows = `
        <div class="table-entry">
          <span class="table-key">Status</span>
          <span class="table-value">ERROR: ${data.error}</span>
        </div>
      `;
    } else if (key === 'network') {
      tableRows = `
        <div class="table-entry">
          <span class="table-key">All Devices</span>
          <span class="table-value">${data.ipList || 'None found'}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Total Count</span>
          <span class="table-value">${data.count || 0}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Local IPs</span>
          <span class="table-value">${data.localIPs?.join(', ') || '0'}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Peer IPs</span>
          <span class="table-value">${data.peerIPs?.join(', ') || '0'}</span>
        </div>
        ${data.topology ? `
          <div class="network-topology">
            <div>🗺️ Topology: ${data.topology.totalDevices} devices</div>
            <div>Segments: ${Object.entries(data.topology.segments).map(([s,c]) => `${s}:${c}`).join(', ')}</div>
            <div class="segment-info">
              Local: ${data.topology.localCount} | Peers: ${data.topology.peerCount}
            </div>
          </div>
        ` : ''}
        <div class="table-entry">
          <span class="table-key">Connection</span>
          <span class="table-value">${data.connType}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Speed</span>
          <span class="table-value">${data.speed}</span>
        </div>
      `;
    } else if (key === 'media') {
      tableRows = `
        <div class="table-entry">
          <span class="table-key">Video Devices</span>
          <span class="table-value">${data.videoCount || 0}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Audio Devices</span>
          <span class="table-value">${data.audioCount || 0}</span>
        </div>
      `;
    } else if (key === 'bluetooth') {
      tableRows = `
        <div class="table-entry">
          <span class="table-key">Device Name</span>
          <span class="table-value">${data.name || 'Unknown'}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Device ID</span>
          <span class="table-value">${data.id ? data.id.slice(0,20) + '...' : 'N/A'}</span>
        </div>
      `;
    } else if (key === 'sensors') {
      tableRows = `
        <div class="table-entry">
          <span class="table-key">Platform</span>
          <span class="table-value">${data.platform || 'unknown'}</span>
        </div>
        <div class="table-entry">
          <span class="table-key">Battery</span>
          <span class="table-value">${data.battery?.level || 'N/A'}</span>
        </div>
      `;
    }
    
    group.innerHTML = `
      <div class="device-header">
        <span>${key.toUpperCase()}</span>
        <button class="copy-top" onclick="copyDevice('${key}')">📋 COPY ALL</button>
      </div>
      <div style="padding:15px;">
        ${tableRows}
      </div>
    `;
    
    output.appendChild(group);
  });
}

function copyDevice(key) {
  const fullData = deviceData[key];
  navigator.clipboard.writeText(
    `${key.toUpperCase()}\n${JSON.stringify(fullData, null, 2)}`
  ).then(() => {
    document.getElementById('status').textContent = `✅ Copied ${key} (${fullData.allIPs?.length || 0} IPs)`;
    setTimeout(() => {
      document.getElementById('status').textContent = 'Discover REAL nearby devices using WebRTC topology inference';
    }, 3000);
  });
}

function exportTXT() {
  if (!Object.keys(deviceData).length) {
    document.getElementById('status').textContent = 'No scan data to export';
    return;
  }
  
  let txt = 'WI-FI NETWORK DEVICE SCAN REPORT\n';
  txt += `Generated: ${new Date().toISOString()}\n\n`;
  
  Object.entries(deviceData).forEach(([key, data]) => {
    txt += `${key.toUpperCase()}:\n`;
    txt += `${JSON.stringify(data, null, 2)}\n\n`;
  });
  
  download(txt, `wifi-scan-${Date.now()}.txt`);
}

function exportJSON() {
  if (!Object.keys(deviceData).length) {
    document.getElementById('status').textContent = 'No scan data to export';
    return;
  }
  
  const exportData = {
    ...deviceData,
    wifiDevices,
    timestamp: new Date().toISOString()
  };
  
  download(JSON.stringify(exportData, null, 2), `wifi-scan-${Date.now()}.json`);
}

function download(data, filename) {
  const blob = new Blob([data], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearAll() {
  deviceData = {};
  wifiDevices = [];
  document.getElementById('output').innerHTML = '';
  document.getElementById('status').textContent = 'Results cleared - Ready to scan Wi-Fi network';
}
</script>

</body>
</html>
