<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • File Metadata Viewer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,Helvetica,sans-serif;color:#d1d1d1;overflow-x:hidden}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:-2;filter:brightness(0.3)
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:-1}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;text-align:center;
  border-bottom:1px solid #1f1f1f
}
header h1{font-size:20px;letter-spacing:2px}

.container{
  max-width:1000px;margin:25px auto;padding:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.9)
}

.section{
  border-left:4px solid #333;
  padding-left:15px;
  margin-bottom:20px
}
.section h2{font-size:16px;color:#9f9f9f;margin-bottom:10px}

input,button{
  width:100%;padding:10px;
  background:black;color:white;
  border:1px solid #333;border-radius:6px;
  margin-bottom:10px
}

button:hover{background:#111;cursor:pointer}

.dropzone{
  border:2px dashed #333;
  padding:20px;text-align:center;
  border-radius:8px;
  font-size:14px;color:#aaa;
  margin-bottom:10px
}

.result{
  background:black;padding:12px;
  border-radius:6px;
  font-family:monospace;
  font-size:13px;color:#8aff8a;
  border:1px solid #222;
  white-space:pre-wrap;
  margin-bottom:12px
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • FILE METADATA VIEWER</h1>
</header>

<div class="container">

<div class="section">
  <h2>Select Files / Folder</h2>
  <input type="file" id="fileInput" multiple webkitdirectory>
  <div class="dropzone" id="dropzone">Drag & Drop Files or Folder Here</div>
  <button id="extractBtn">Extract Metadata</button>
</div>

<div class="section">
  <h2>Analysis Output</h2>
  <div id="output"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<script src="https://cdn.jsdelivr.net/npm/spark-md5/spark-md5.min.js"></script>
<script>
const output=document.getElementById("output");
const fileInput=document.getElementById("fileInput");
const dropzone=document.getElementById("dropzone");
let filesQueue=[];

/* Helpers */
const size=b=>b<1024?b+" B":b<1048576?(b/1024).toFixed(2)+" KB":b<1073741824?(b/1048576).toFixed(2)+" MB":(b/1073741824).toFixed(2)+" GB";

async function sha256File(file){
  const buf=await file.arrayBuffer();
  const hash=await crypto.subtle.digest("SHA-256", buf);
  return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

function md5File(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const md5=SparkMD5.ArrayBuffer.hash(e.target.result);
      res(md5);
    };
    reader.readAsArrayBuffer(file);
  });
}

/* Core analysis */
async function analyzeFile(file){
  let report="";
  let warnings=[];

  report+=`File: ${file.name}\n`;
  report+=`Size: ${size(file.size)}\n`;
  report+=`Type: ${file.type||"Unknown"}\n`;
  report+=`Modified: ${new Date(file.lastModified).toString()}\n`;

  if(file.size===0) warnings.push("Zero-byte file");

  /* Hashes */
  const md5=await md5File(file);
  const sha256=await sha256File(file);
  report+=`MD5: ${md5}\n`;
  report+=`SHA-256: ${sha256}\n`;

  /* EXIF */
  if(file.type.startsWith("image/")){
    await new Promise(res=>{
      EXIF.getData(file,function(){
        const make=EXIF.getTag(this,"Make");
        const model=EXIF.getTag(this,"Model");
        const lens=EXIF.getTag(this,"LensModel");
        const date=EXIF.getTag(this,"DateTimeOriginal");
        const lat=EXIF.getTag(this,"GPSLatitude");
        const lon=EXIF.getTag(this,"GPSLongitude");

        if(!make&&!model) warnings.push("No camera EXIF data");

        report+=`Camera: ${make||"?"} ${model||""}\n`;
        report+=`Lens: ${lens||"Unknown"}\n`;
        report+=`Date Taken: ${date||"Unknown"}\n`;
        report+=`GPS: ${lat&&lon?"Present":"Not found"}\n`;
        res();
      });
    });
  } else {
    report+="EXIF: Not applicable\n";
  }

  /* Anomaly section */
  report+="\nAnomalies:\n";
  if(warnings.length===0) report+="✔ None detected\n";
  else warnings.forEach(w=>report+=`⚠ ${w}\n`);

  const box=document.createElement("div");
  box.className="result";
  box.textContent=report;
  output.appendChild(box);
}

/* Drag & drop handling */
dropzone.ondragover=e=>{e.preventDefault();dropzone.style.borderColor="#0f0"}
dropzone.ondragleave=()=>dropzone.style.borderColor="#333"
dropzone.ondrop=e=>{
  e.preventDefault();
  dropzone.style.borderColor="#333";
  filesQueue=[...e.dataTransfer.files];
  alert(filesQueue.length+" file(s) ready. Click 'Extract Metadata' to analyze.");
}

/* File input selection */
fileInput.onchange=()=>{filesQueue=[...fileInput.files];}

/* Extract button click */
document.getElementById("extractBtn").onclick=()=>{
  if(filesQueue.length===0){alert("No files selected"); return;}
  output.innerHTML="";
  filesQueue.forEach(analyzeFile);
}
</script>
</body>
</html>
