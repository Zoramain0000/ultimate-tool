<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays IP Address Generator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,sans-serif;color:#d1d1d1;overflow-x:hidden;}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(0.3);
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:-1;}

header{
  background:rgba(0,0,0,0.7);padding:18px;text-align:center;border-bottom:1px solid #1f1f1f;
}
header h1{font-size:26px;letter-spacing:2px;}

.container{
  max-width:900px;margin:30px auto;padding:20px;background:rgba(0,0,0,0.65);border-radius:10px;box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.section{margin-bottom:25px;}
.section h2{
  font-size:18px;margin-bottom:10px;color:#9f9f9f;border-left:4px solid #555;padding-left:10px;
}

.button, button{
  padding:12px 20px;
  background:black;border:1px solid #333;color:white;
  cursor:pointer;border-radius:6px;transition:.3s;
}
.button:hover, button:hover{background:#111;transform:scale(1.05);}

input{
  width:100%;padding:10px 12px;border-radius:6px;border:1px solid #555;background:rgba(0,0,0,0.7);color:#fff;margin-bottom:10px;
}

.generated{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:15px;
}

.ip-card{
  background:rgba(15,15,15,0.85);padding:12px;border-radius:8px;border:1px solid #222;text-align:center;font-size:14px;
}

.log{
  background:black;padding:12px;border-radius:6px;font-family:monospace;font-size:13px;color:#8aff8a;max-height:200px;overflow:auto;border:1px solid #222;
}

footer{
  background:rgba(0,0,0,0.7);text-align:center;padding:15px;font-size:13px;color:#777;
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • IP GENERATOR</h1>
</header>

<div class="container">

  <div class="section">
    <h2>Generate Random IPs</h2>
    <label for="count">Number of IPs:</label>
    <input type="number" id="count" value="10" min="1" max="500" />
    <label for="version">IP Version / Class:</label>
    <select id="version">
      <option value="ipv1">IPv1</option>
      <option value="ipv2">IPv2</option>
      <option value="ipv4">IPv4</option>
      <option value="ipv5">IPv5</option>
      <option value="ipv6">IPv6</option>
      <option value="ipv7">IPv7</option>
      <option value="ipv8">IPv8</option>
      <option value="ipv9">IPv9</option>
    </select>
    <button onclick="generateIPs()">Generate IPs</button>
  </div>

  <div class="section">
    <h2>Generated IPs</h2>
    <div class="generated" id="generatedIPs"></div>
  </div>

  <div class="section">
    <h2>Activity Log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>
  Technology information system tools for cyber‑security<br>
  Educational & ethical use only
</footer>

<script>
const log = msg=>{
  const l=document.getElementById("log");
  l.innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop=l.scrollHeight;
};

// Generate a random IPv4-style segment
function randSegment(max=255){return Math.floor(Math.random()*(max+1));}

// IP Generator by version/class
function generateIP(version){
  switch(version){
    case "ipv1": return `${randSegment(1)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    case "ipv2": return `${randSegment(2)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    case "ipv4": return `${randSegment(0,255)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    case "ipv5": return `${randSegment(5)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    case "ipv6": return `${randSegment(0,255)}:${randSegment(0,255)}:${randSegment(0,255)}:${randSegment(0,255)}:${randSegment(0,255)}:${randSegment(0,255)}:${randSegment(0,255)}:${randSegment(0,255)}`;
    case "ipv7": return `${randSegment(7)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    case "ipv8": return `${randSegment(8)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    case "ipv9": return `${randSegment(9)}.${randSegment()}.${randSegment()}.${randSegment()}`;
    default: return `${randSegment()}.${randSegment()}.${randSegment()}.${randSegment()}`;
  }
}

// Generate multiple IPs
function generateIPs(){
  const count=parseInt(document.getElementById("count").value);
  const version=document.getElementById("version").value;
  if(isNaN(count)||count<1){alert("Enter a valid number of IPs.");return;}

  const container=document.getElementById("generatedIPs");
  container.innerHTML="";

  log(`Generating ${count} ${version.toUpperCase()} addresses…`);

  for(let i=0;i<count;i++){
    const ip=generateIP(version);
    const card=document.createElement("div");
    card.className="ip-card";
    card.textContent=ip;
    container.appendChild(card);
    log(`Generated IP: ${ip}`);
  }

  log(`Generation completed.`);
}
</script>

</body>
</html>
