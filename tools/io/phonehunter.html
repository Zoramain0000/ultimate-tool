<html lang="en">

<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

*{margin:0;padding:0;box-sizing:border-box;}
body, html{height:100vh;width:100vw;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);color:#00ff88;font-family:'Courier New',monospace;overflow:hidden;}
#map{height:100%;width:100%;}
.control-panel{position:absolute;top:15px;left:15px;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);padding:20px;border:2px solid #00ff88;border-radius:12px;box-shadow:0 0 30px rgba(0,255,136,0.4);z-index:1000;width:340px;max-height:calc(100vh - 40px);overflow-y:auto;font-size:13px;}
.legend{position:absolute;top:15px;right:15px;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);padding:20px;border:2px solid #ff4488;border-radius:12px;box-shadow:0 0 30px rgba(255,68,136,0.4);z-index:1000;width:280px;font-size:12px;transition:all 0.3s ease;}
.legend.closed{width:50px;height:50px;padding:10px;right:15px;top:15px;}
.legend.closed h4,.legend.closed .legend div:not(:first-child){display:none;}
.legend-toggle{position:absolute;top:5px;right:5px;cursor:pointer;color:#ff4488;font-size:16px;transition:all 0.3s;z-index:1001;}
.legend div{margin:8px 0;display:flex;align-items:center;gap:8px;}
.legend-color{width:14px;height:14px;border-radius:50%;border:1px solid #fff;flex-shrink:0;}
input,select,button{width:100%;padding:12px;margin:8px 0;background:rgba(0,255,136,0.12);border:1px solid #00ff88;color:#00ff88;font-family:monospace;border-radius:6px;font-size:13px;transition:all 0.3s;}
input:focus,select:focus{outline:none;box-shadow:0 0 20px #00ff88;background:rgba(0,255,136,0.2);}
button{background:linear-gradient(135deg,#ff4488,#cc3388);color:#fff;font-weight:bold;cursor:pointer;border:none;}
button:hover{box-shadow:0 0 25px #ff4488;transform:translateY(-1px);}
button:active{transform:translateY(0);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0;}
.stat-item{background:rgba(0,255,136,0.1);padding:12px;border-radius:8px;text-align:center;border:1px solid rgba(0,255,136,0.3);font-size:14px;}
.stat-number{font-size:20px;font-weight:bold;color:#ff88cc;display:block;}
.phone-query{font-size:12px;color:#88ff88;background:rgba(0,0,0,0.5);padding:8px;border-radius:6px;margin:8px 0;}
.leaflet-popup-content{font-family:monospace;color:#00ff88;max-width:320px;}
.carrier-badge{display:inline-block;background:#ff4488;color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold;}
.loading{text-align:center;color:#00ff88;font-style:italic;}
</style>
</head>
<body>
<div id="map"></div>

<div class="control-panel">
  <h3 style="color:#ff88cc;margin:0 0 15px 0;text-align:center;font-size:15px"><i class="fas fa-mobile-alt"></i> PHONE TRACKER</h3>
  <div class="phone-query"><strong>Status:</strong> <span id="currentTarget">READY FOR TRACKING</span></div>
  <div class="stats-grid">
    <div class="stat-item"><span class="stat-number" id="totalNumbers">0</span>Numbers Tracked</div>
    <div class="stat-item"><span class="stat-number" id="activeCount">0</span>Active Carriers</div>
  </div>
  <input id="phoneNumber" type="text" placeholder="+1-555-123-4567 or 5551234567" value="+1-555-123-4567">
  <select id="zoomLevel">
    <option value="2">World</option>
    <option value="4">Continents</option>
    <option value="6" selected>Countries</option>
    <option value="8">Regions</option>
  </select>
  <button onclick="phoneTracker.trackCurrentView()"><i class="fas fa-map-marker-alt"></i> 📱 TRACK NUMBER LOCATION</button>
  <button onclick="phoneTracker.globalBatch()"><i class="fas fa-globe"></i> 🌐 BATCH TRACK NUMBERS</button>
  <button onclick="phoneTracker.clearMap()"><i class="fas fa-trash"></i> CLEAR MAP</button>
</div>

<div class="legend" id="legendPanel">
  <i class="fas fa-eye legend-toggle" onclick="phoneTracker.toggleLegend()" title="Toggle Legend"></i>
  <h4 style="color:#ff88cc;margin:0 0 15px 0;font-size:13px">📍 LOCATION TYPE</h4>
  <div><span class="legend-color" style="background:#ff0055"></span>Home Location</div>
  <div><span class="legend-color" style="background:#ff4444"></span>Work Location</div>
  <div><span class="legend-color" style="background:#ff8800"></span>Roaming</div>
  <div><span class="legend-color" style="background:#00ff88"></span>Active Cell</div>
  <div><span class="legend-color" style="background:#4488ff"></span>Carrier HQ</div>
</div>

  toggleLegend() {
    const legend = document.getElementById('legendPanel');
    if (this.legendOpen) { legend.classList.add('closed'); legend.querySelector('.legend-toggle').className='fas fa-eye-slash legend-toggle'; }
    else { legend.classList.remove('closed'); legend.querySelector('.legend-toggle').className='fas fa-eye legend-toggle'; }
    this.legendOpen = !this.legendOpen;
  }

  initMap() {
    const darkTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19});
    const cyberTiles=L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',{maxZoom:20});
    darkTiles.addTo(this.map);
    L.control.layers({"Dark Cyber":darkTiles,"Cyber Blue":cyberTiles}).addTo(this.map);
    this.map.addLayer(this.markers);
  }

  bindControls() {
    this.map.on('moveend zoomend', () => {
      document.getElementById('currentTarget').textContent = `${document.getElementById('phoneNumber').value} (bbox:${this.getBbox()})`;
    });
  }

  trackCurrentView() {
    const phone=document.getElementById('phoneNumber').value;
    const bbox=this.getBbox();
    this.trackPhone(phone,bbox);
  }

  globalBatch() {
    const batchNumbers=['+1-555-123-4567','+44-20-7946-0958','+33-1-42-66-99-99','+49-30-259-50','+81-3-3501-5111'];
    batchNumbers.forEach((num,i)=>setTimeout(()=>this.trackPhone(num), i*800));
  }

  trackPhone(phone,bbox='') {
    const countryCode = phone.match(/^\+?(\d+)/)?.[1] || '1';
    const carriers = this.carrierDatabase[countryCode] || [{name:'Local Carrier',type:'carrier',lat:20,lon:0}];

    const trackingData = carriers.map(c=>{
      let lat = c.lat + (Math.random()-0.5)*0.5;
      let lon = c.lon + (Math.random()-0.5)*0.5;
      if(bbox){const b=this.parseBbox(bbox);lat=Math.max(b.south,Math.min(b.north,lat)); lon=Math.max(b.west,Math.min(b.east,lon));}
      return {phone:phone,location:{lat,lon,city:c.name,country_name:this.countryNames[countryCode]||'Unknown',region_code:'Metro'},carrier:c.name,type:c.type,ip:this.generateIP(countryCode)};
    });

    this.numbers.push(...trackingData);
    this.renderLocations();
    this.updateStats();
    this.log(`✅ Tracked ${trackingData.length} locations for ${phone}`);
  }

  renderLocations(){
    this.markers.clearLayers();
    const uniqueLocations=this.numbers.filter((loc,index,self)=>index===self.findIndex(l=>l.phone===loc.phone&&Math.abs(l.location.lat-loc.location.lat)<0.01&&Math.abs(l.location.lon-loc.location.lon)<0.01)).slice(-800);
    uniqueLocations.forEach(location=>{
      const latlng=[location.location.lat,location.location.lon];
      const locType=this.getLocationType(location);
      const marker=L.circleMarker(latlng,{radius:8,fillColor:locType.color,color:'#ffffff',weight:2,opacity:1,fillOpacity:0.85});
      marker.bindPopup(this.buildPopup(location,locType));
      this.markers.addLayer(marker);
    });
    if(uniqueLocations.length>0)this.map.fitBounds(this.markers.getBounds().pad(0.1));
  }

  getLocationType(location){const types={home:{color:'#ff0055',label:'HOME LOCATION'},work:{color:'#ff4444',label:'WORK LOCATION'},roaming:{color:'#ff8800',label:'ROAMING'},active:{color:'#00ff88',label:'ACTIVE CELL'},carrier:{color:'#4488ff',label:'CARRIER HQ'}};const typeMap={home:'home',work:'work',active:'active',roaming:'roaming',carrier:'carrier'};return types[typeMap[location.type]||'carrier'];}

  buildPopup(location,locType){return `<div style="font-family:monospace;min-width:300px"><div style="background:${locType.color};color:#fff;padding:10px;border-radius:6px;text-align:center;font-weight:bold;font-size:14px"><span class="carrier-badge">${locType.label}</span></div><div style="margin:12px 0"><strong>📱 Phone:</strong> <code>${location.phone}</code></div><div><strong>📡 Carrier:</strong> ${location.carrier}</div><div><strong>🌐 IP:</strong> ${location.ip}</div><div style="margin-top:12px;font-size:11px;color:#88ff88">📍 ${location.location.city}, ${location.location.country_name}<br>🏠 ${location.location.region_code}</div></div>`;}

  generateIP(countryCode){const ipRanges={'1':'198.51.','44':'203.0.','33':'193.49.','49':'141.42.','81':'133.106.'};return (ipRanges[countryCode]||'10.0.')+(Math.floor(Math.random()*255))+'.'+(Math.floor(Math.random()*255));}

  parseBbox(bbox){const parts=bbox.split(',').map(Number);return {south:parts[0]||-90,west:parts[1]||-180,north:parts[2]||90,east:parts[3]||180};}
  getBbox(){const b=this.map.getBounds();return [b.getSouth(),b.getWest(),b.getNorth(),b.getEast()].join(',');}
  clearMap(){this.markers.clearLayers();this.numbers=[];this.updateStats();this.log('🗑️ Map cleared');}
  updateStats(){this.totalNumbers=this.numbers.length;this.activeCount=this.numbers.filter(n=>n.type!=='carrier').length;document.getElementById('totalNumbers').textContent=this.totalNumbers;document.getElementById('activeCount').textContent=this.activeCount;}
  log(msg){console.log(`[PHONE TRACKER] ${msg}`);}
  welcome(){setTimeout(()=>{this.log('🚀 Phone Tracker initialized - Ready to track numbers globally');document.getElementById('phoneNumber').focus();},500);}
}
