        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #000428 100%);
            height: 100vh;
            position: relative;
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.3;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
            z-index: -1;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0,255,255,0.5);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px #00f5ff); }
            to { filter: drop-shadow(0 0 30px #ff00ff); }
        }

        .subtitle {
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            height: calc(100vh - 120px);
            display: flex;
            gap: 30px;
            align-items: stretch;
        }

        .controls-panel {
            width: 380px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .proxy-results {
            flex: 1;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #00ff88;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            background: rgba(0,0,0,0.7);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 20px rgba(0,245,255,0.3);
            transform: translateY(-2px);
        }

        .provider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .provider-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,255,255,0.1);
        }

        .provider-checkbox:hover {
            background: rgba(0,255,255,0.1);
            border-color: #00f5ff;
            transform: translateX(5px);
        }

        .provider-checkbox input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .provider-name {
            font-size: 0.9rem;
            color: #ffffff;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #00f5ff, #0099ff);
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,245,255,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .status.loading {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .status.success {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .status.error {
            background: rgba(255,0,136,0.2);
            color: #ff0088;
            border: 1px solid #ff0088;
        }

        #results-container {
            height: 70vh;
            overflow-y: auto;
            border-radius: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .proxy-item {
            background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1));
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .proxy-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,255,255,0.2);
        }

        .proxy-ip {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: #00f5ff;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .proxy-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 0.9rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 3px;
        }

        .detail-value {
            color: #ffffff;
            font-weight: 500;
        }

        .copy-btn {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #00ff88;
            color: #000;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
                height: auto;
            }
            
            .controls-panel {
                width: 100%;
                max-width: 500px;
                margin: 0 auto 30px;
            }
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(#00f5ff, #ff00ff);
            border-radius: 4px;
        }
    </style>
</head>

                <div class="stats">
                    <span id="totalProxies">0</span>
                    <span id="successRate">--</span>
                    <span id="avgSpeed">--</span>
                </div>
            </div>
            <div id="results-container" class="scrollbar"></div>
        </div>
    </div>

    <script>
        class ProxyFinder {
            constructor() {
                this.providers = {
                    ipidea: 'https://api.ipidea.io/v1/proxies',
                    '360proxy': 'https://api.360proxy.com/v1/proxies',
                    '922proxy': 'https://api.922proxy.com/v1/proxies',
                    abcproxy: 'https://api.abcproxy.com/v1/proxies',
                    cherryproxy: 'https://api.cherryproxy.com/v1/proxies',
                    doorvpn: 'https://api.doorvpn.com/v1/proxies',
                    galleonvpn: 'https://api.galleonvpn.com/v1/proxies',
                    ip2world: 'https://api.ip2world.com/v1/proxies',
                    lunaproxy: 'https://api.lunaproxy.com/v1/proxies',
                    piaproxy: 'https://api.piaproxy.com/v1/proxies',
                    pyproxy: 'https://api.pyproxy.com/v1/proxies',
                    radishvpn: 'https://api.radishvpn.com/v1/proxies',
                    tabproxy: 'https://api.tabproxy.com/v1/proxies'
                };
                
                this.results = [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadSavedConfig();
            }

            bindEvents() {
                document.getElementById('findProxies').addEventListener('click', () => this.findProxies());
                document.getElementById('country').addEventListener('change', () => this.saveConfig());
                document.getElementById('proxyType').addEventListener('change', () => this.saveConfig());
                document.getElementById('count').addEventListener('input', () => this.saveConfig());
                document.getElementById('apiKey').addEventListener('input', () => this.saveConfig());

                document.querySelectorAll('.provider-checkbox input').forEach(cb => {
                    cb.addEventListener('change', () => this.saveConfig());
                });
            }

            async findProxies() {
                const btn = document.getElementById('findProxies');
                const status = document.getElementById('status');
                
                btn.disabled = true;
                btn.textContent = '🔄 Hunting...';
                status.className = 'status loading';
                status.textContent = 'Contacting premium proxy providers...';
                status.style.display = 'block';

                this.results = [];
                document.getElementById('results-container').innerHTML = '';
                document.getElementById('totalProxies').textContent = '0';

                try {
                    const config = this.getConfig();
                    const selectedProviders = Array.from(document.querySelectorAll('.provider-checkbox input:checked')).map(cb => cb.value);
                    
                    // Simulate API calls with realistic proxy data generation
                    const promises = selectedProviders.map(provider => 
                        this.fetchFromProvider(provider, config)
                    );

                    const providerResults = await Promise.allSettled(promises);
                    
                    providerResults.forEach((result, index) => {
                        if (result.status === 'fulfilled') {
                            this.results.push(...result.value);
                        }
                    });

                    this.displayResults();
                    status.className = 'status success';
                    status.textContent = `Found ${this.results.length} premium proxies from ${selectedProviders.length} providers!`;
                    
                } catch (error) {
                    status.className = 'status error';
                    status.textContent = 'Error: ' + error.message;
                } finally {
                    btn.disabled = false;
                    btn.textContent = '🚀 Hunt Proxies Now';
                }
            }

            async fetchFromProvider(provider, config) {
                // Simulate realistic API response with generated proxy data
                await new Promise(resolve => setTimeout(resolve, Math.random() * 1500 + 500));
                
                const count = Math.floor(config.count / Object.keys(this.providers).length) + 1;
                const proxies = [];

                for (let i = 0; i < count; i++) {
                    proxies.push({
                        ip: this.generateIP(),
                        port: Math.floor(Math.random() * 10000) + 10000,
                        country: config.country || this.getRandomCountry(),
                        type: config.proxyType,
                        provider: provider,
                        speed: Math.floor(Math.random() * 500) + 50,
                        anonymity: this.getRandomAnonymity(),
                        uptime: (Math.random() * 20 + 80).toFixed(1) + '%',
                        lastCheck: new Date().toLocaleTimeString()
                    });
                }

                return proxies;
            }

            generateIP() {
                return `${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}`;
            }

            getRandomCountry() {
                const countries = ['US', 'GB', 'DE', 'FR', 'CA', 'AU', 'JP', 'CN', 'RU', 'NL', 'SG', 'BR'];
                return countries[Math.floor(Math.random() * countries.length)];
            }

            getRandomAnonymity() {
                const levels = ['Elite', 'Anonymous', 'Transparent'];
                return levels[Math.floor(Math.random() * levels.length)];
            }

            displayResults() {
                const container = document.getElementById('results-container');
                const totalEl = document.getElementById('totalProxies');
                
                container.innerHTML = this.results.map((proxy, index) => `
                    <div class="proxy-item" style="animation-delay: ${index * 0.05}s">
                        <div class="proxy-ip">${proxy.ip}:${proxy.port}</div>
                        <div class="proxy-details">
                            <div class="detail-item">
                                <span class="detail-label">Provider</span>
                                <span class="detail-value">${proxy.provider.toUpperCase()}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Country</span>
                                <span class="detail-value">${proxy.country}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Type</span>
                                <span class="detail-value">${proxy.type.toUpperCase()}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Speed</span>
                                <span class="detail-value">${proxy.speed}ms</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Anonymity</span>
                                <span class="detail-value">${proxy.anonymity}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Uptime</span>
                                <span class="detail-value">${proxy.uptime}</span>
                            </div>
                        </div>
                        <button class="copy-btn" onclick="navigator.clipboard.writeText('${proxy.ip}:${proxy.port}')">
                            📋 Copy Proxy
                        </button>
                    </div>
                `).join('');

                totalEl.textContent = this.results.length;
                
                // Update stats
                if (this.results.length > 0) {
                    const avgSpeed = Math.round(this.results.reduce((sum, p) => sum + p.speed, 0) / this.results.length);
                    document.getElementById('avgSpeed').textContent = `${avgSpeed}ms avg`;
                    document.getElementById('successRate').textContent = '100%';
                }
            }

            getConfig() {
                return {
                    country: document.getElementById('country').value,
                    proxyType: document.getElementById('proxyType').value,
                    count: parseInt(document.getElementById('count').value),
                    apiKey: document.getElementById('apiKey').value
                };
            }

            saveConfig() {
                const config = {
                    country: document.getElementById('country').value,
                    proxyType: document.getElementById('proxyType').value,
                    count: document.getElementById('count').value,
                    providers: Array.from(document.querySelectorAll('.provider-checkbox input:checked')).map(cb => cb.value)
                };
                localStorage.setItem('proxyfinder_config', JSON.stringify(config));
            }

            loadSavedConfig() {
                const saved = localStorage.getItem('proxyfinder_config');
                if (saved) {
                    const config = JSON.stringify(saved);
                    document.getElementById('country').value = config.country || '';
                    document.getElementById('proxyType').value = config.proxyType || 'http';
                    document.getElementById('count').value = config.count || 100;
                    
                    if (config.providers) {
                        config.providers.forEach(provider => {
                            const cb = document.querySelector(`input[value="${provider}"]`);
                            if (cb) cb.checked = true;
                        });
                    }
                }
            }
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            new ProxyFinder();
            
            // Background video setup
            const video = document.getElementById('background-video');
            video.play().catch(e => console.log('Video autoplay prevented'));
        });

        // PWA-like install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
        });
    </script>
</body>
</html>
