<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • Cybersecurity Calculators</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  color:#d1d1d1;
  overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.3);
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;
  text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{
  letter-spacing:2px;
  font-size:20px;
}

.container{
  max-width:1200px;
  margin:25px auto;
  padding:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.9);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.section{
  border-left:4px solid #333;
  padding-left:15px;
}

.section h2{
  font-size:16px;
  margin-bottom:10px;
  color:#9f9f9f;
}

input,select,button{
  width:100%;
  padding:10px;
  background:black;
  color:white;
  border:1px solid #333;
  border-radius:6px;
  margin-bottom:8px;
}

button:hover{
  background:#111;
  cursor:pointer;
}

.result{
  background:black;
  padding:10px;
  border-radius:6px;
  font-family:monospace;
  font-size:13px;
  color:#8aff8a;
  border:1px solid #222;
  min-height:38px;
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • CYBERSECURITY CALCULATOR SUITE</h1>
</header>

<div class="container grid">

<!-- 2 -->
<div class="section">
<h2>2. Bandwidth Usage Calculator</h2>
<input id="bwData" placeholder="Total Data (GB)">
<input id="bwHours" placeholder="Time (hours)">
<button onclick="bandwidth()">Calculate</button>
<div class="result" id="bwOut"></div>
</div>

<!-- 3 -->
<div class="section">
<h2>3. Data Transfer Time</h2>
<input id="dtSize" placeholder="Data Size (GB)">
<input id="dtSpeed" placeholder="Speed (Mbps)">
<button onclick="transfer()">Calculate</button>
<div class="result" id="dtOut"></div>
</div>

<!-- 4 -->
<div class="section">
<h2>4. Storage Size Converter</h2>
<input id="stValue" placeholder="Value">
<select id="stUnit">
<option>KB</option><option>MB</option><option>GB</option><option>TB</option>
</select>
<button onclick="storage()">Convert to Bytes</button>
<div class="result" id="stOut"></div>
</div>

<!-- 5 -->
<div class="section">
<h2>5. Risk Assessment Calculator</h2>
<input id="riskLikelihood" placeholder="Likelihood (1–5)">
<input id="riskImpact" placeholder="Impact (1–5)">
<button onclick="risk()">Calculate</button>
<div class="result" id="riskOut"></div>
</div>

<!-- 6 -->
<div class="section">
<h2>6. CVSS Score Calculator</h2>
<input id="cvssImpact" placeholder="Impact (0–10)">
<input id="cvssExploit" placeholder="Exploitability (0–10)">
<button onclick="cvss()">Calculate</button>
<div class="result" id="cvssOut"></div>
</div>

<!-- 7 -->
<div class="section">
<h2>7. Password Entropy Calculator</h2>
<input id="pwLength" placeholder="Password Length">
<input id="pwCharset" placeholder="Charset Size">
<button onclick="entropy()">Calculate</button>
<div class="result" id="pwOut"></div>
</div>

<!-- 8 -->
<div class="section">
<h2>8. Uptime Percentage</h2>
<input id="upTotal" placeholder="Total Time (hours)">
<input id="upDown" placeholder="Downtime (hours)">
<button onclick="uptime()">Calculate</button>
<div class="result" id="upOut"></div>
</div>

<!-- 9 -->
<div class="section">
<h2>9. Network Capacity Planner</h2>
<input id="capUsers" placeholder="Number of Users">
<input id="capMbps" placeholder="Mbps per User">
<button onclick="capacity()">Calculate</button>
<div class="result" id="capOut"></div>
</div>

<!-- 10 -->
<div class="section">
<h2>10. Cybersecurity Readiness Score</h2>
<input id="rdPolicy" placeholder="Policies (0–10)">
<input id="rdTools" placeholder="Security Tools (0–10)">
<input id="rdTraining" placeholder="Training (0–10)">
<button onclick="readiness()">Calculate</button>
<div class="result" id="rdOut"></div>
</div>

</div>

<script>
const n=v=>parseFloat(v)||0;

/* 92 */
function bandwidth(){
  bwOut.textContent=(n(bwData.value)/n(bwHours.value)).toFixed(2)+" GB/hour";
}

/* 93 */
function transfer(){
  dtOut.textContent=((n(dtSize.value)*8192)/(n(dtSpeed.value)*3600)).toFixed(2)+" hours";
}

/* 94 */
function storage(){
  const u={KB:1024,MB:1048576,GB:1073741824,TB:1099511627776};
  stOut.textContent=(n(stValue.value)*u[stUnit.value]).toLocaleString()+" bytes";
}

/* 95 */
function risk(){
  const score=n(riskLikelihood.value)*n(riskImpact.value);
  let level=score>=20?"Critical":score>=12?"High":score>=6?"Medium":"Low";
  riskOut.textContent=`Score: ${score} (${level})`;
}

/* 96 */
function cvss(){
  cvssOut.textContent=((n(cvssImpact.value)+n(cvssExploit.value))/2).toFixed(1)+" / 10";
}

/* 97 */
function entropy(){
  pwOut.textContent=(n(pwLength.value)*Math.log2(n(pwCharset.value))).toFixed(2)+" bits";
}

/* 98 */
function uptime(){
  upOut.textContent=((1-(n(upDown.value)/n(upTotal.value)))*100).toFixed(3)+"%";
}

/* 99 */
function capacity(){
  capOut.textContent=(n(capUsers.value)*n(capMbps.value)).toFixed(2)+" Mbps total";
}

/* 100 */
function readiness(){
  rdOut.textContent=((n(rdPolicy.value)+n(rdTools.value)+n(rdTraining.value))/3).toFixed(1)+" / 10";
}
</script>

</body>
</html>
