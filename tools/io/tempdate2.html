<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • File Timestamp Converter</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,Helvetica,sans-serif;color:#d1d1d1;overflow-x:hidden}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:-2;filter:brightness(0.3);
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:-1}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{font-size:26px;letter-spacing:2px}

.container{
  max-width:800px;margin:30px auto;padding:20px;
  background:rgba(0,0,0,0.65);
  border-radius:10px;
  box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.section{margin-bottom:25px}
.section h2{
  font-size:18px;margin-bottom:10px;
  color:#9f9f9f;border-left:4px solid #555;
  padding-left:10px;
}

input, select{
  width:100%;padding:12px;border-radius:6px;
  border:1px solid #444;background:black;color:#fff;
  margin-bottom:10px;
}

button{
  padding:12px 20px;background:black;
  border:1px solid #333;color:white;
  cursor:pointer;border-radius:6px;
  transition:.3s;
}
button:hover{background:#111;transform:scale(1.05)}

.log{
  background:black;padding:12px;border-radius:6px;
  font-family:monospace;font-size:13px;
  color:#8aff8a;max-height:300px;
  overflow:auto;border:1px solid #222;
}

.copy-btn{
  margin-top:5px;padding:6px 10px;font-size:12px;
  background:#222;border:none;color:#0f0;
  cursor:pointer;border-radius:4px;
}
.copy-btn:hover{background:#333}

footer{
  background:rgba(0,0,0,0.7);
  text-align:center;padding:15px;
  font-size:13px;color:#777;
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • FILE TIMESTAMP CONVERTER</h1>
</header>

<div class="container">

  <div class="section">
    <h2>Enter Timestamp or Date</h2>
    <input id="inputField" placeholder="Unix timestamp (seconds/ms) or date (YYYY-MM-DD HH:MM)">
    <select id="timezoneSelect">
      <option value="local">Local Time</option>
      <option value="UTC">UTC</option>
      <option value="America/New_York">New York</option>
      <option value="Europe/London">London</option>
      <option value="Asia/Manila">Manila</option>
      <option value="Asia/Tokyo">Tokyo</option>
      <option value="Australia/Sydney">Sydney</option>
    </select>
    <button onclick="convertInput()">Convert Automatically</button>
  </div>

  <div class="section">
    <h2>Upload File</h2>
    <input type="file" id="fileInput" accept=".txt,.csv">
    <button onclick="convertFile()">Convert File</button>
    <button onclick="copyAll()">Copy All Results</button>
  </div>

  <div class="section">
    <h2>Result Log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>
  Technology information system tools for cyber‑security<br>
  Educational & ethical use only
</footer>

<script>
// Log messages
const log = msg=>{
  const l=document.getElementById("log");
  l.innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop=l.scrollHeight;
};

// Copy text to clipboard
function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=>{
    log(`Copied to clipboard: ${text}`);
  }).catch(err=>{
    log(`Copy failed: ${err}`);
  });
}

// Copy all results
function copyAll(){
  const logContent = document.getElementById("log").innerText;
  copyToClipboard(logContent);
}

// Auto-convert single input
function convertInput(){
  const input=document.getElementById("inputField").value.trim();
  const tz=document.getElementById("timezoneSelect").value;
  if(!input){ alert("Enter a timestamp or date"); return; }
  processLine(input, tz);
}

// Process one line (timestamp or date)
function processLine(line, tz){
  let result = "";
  let ts;

  if(/^\d+$/.test(line)){
    // Timestamp
    ts = line.length>10 ? Math.floor(Number(line)/1000) : Number(line); // ms → s
    const date = new Date(ts*1000);
    const options = {timeZone: tz==="local"?"":tz, hour12:false};
    const formatted = date.toLocaleString("en-US", options);
    result = `Unix Timestamp ${line} → Date: ${formatted}`;
  } else {
    // Date
    const date = new Date(line);
    if(isNaN(date.getTime())){
      log(`Invalid line: ${line}`);
      return;
    }
    ts = Math.floor(date.getTime()/1000);
    const tsMs = date.getTime();
    result = `Date "${line}" → Unix Timestamp: ${ts} (s), ${tsMs} (ms)`;
  }

  log(result + ` <button class="copy-btn" onclick='copyToClipboard("${result.replace(/"/g,'\\"')}")'>Copy</button>`);
}

// Convert file
function convertFile(){
  const fileInput = document.getElementById("fileInput");
  const tz = document.getElementById("timezoneSelect").value;

  if(!fileInput.files.length){
    alert("Select a file first");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    const lines = e.target.result.split(/\r?\n/);
    log(`Processing file "${file.name}" (${lines.length} lines)`);
    lines.forEach(line=>{
      if(line.trim()!==""){
        processLine(line.trim(), tz);
      }
    });
    log(`File conversion completed.`);
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
