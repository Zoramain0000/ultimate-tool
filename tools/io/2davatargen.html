    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const avatarInput = document.getElementById('avatarInput');
            const generateBtn = document.getElementById('generateBtn');
            const styleSelect = document.getElementById('styleSelect');
            const avatarOutput = document.getElementById('avatarOutput');
            const downloadBtn = document.getElementById('downloadBtn');
            const shareBtn = document.getElementById('shareBtn');
            const qrcodeContainer = document.getElementById('qrcode');
            const randomStyleBtn = document.getElementById('randomStyleBtn');
            const avatarSize = document.getElementById('avatarSize');

            // Generate Avatar
            function generateAvatar() {
                const seed = avatarInput.value.trim() || 'random';
                const style = styleSelect.value;
                const size = avatarSize.value;
                const apiUrl = `https://api.dicebear.com/6.x/${style}/svg?seed=${seed}&size=${size}`;

                avatarOutput.src = apiUrl;
                avatarOutput.width = size;
                avatarOutput.height = size;
                generateQRCode(apiUrl);
            }

            generateBtn.addEventListener('click', generateAvatar);
            randomStyleBtn.addEventListener('click', () => {
                const styles = Array.from(styleSelect.options).map(opt => opt.value);
                const randomStyle = styles[Math.floor(Math.random() * styles.length)];
                styleSelect.value = randomStyle;
                generateAvatar();
            });

            avatarSize.addEventListener('input', generateAvatar);

            // Generate QR Code
            function generateQRCode(url) {
                qrcodeContainer.innerHTML = '';
                const qr = qrcode(0, 'L');
                qr.addData(url);
                qr.make();
                qrcodeContainer.innerHTML = qr.createImgTag(4);
            }

            // Download Avatar
            downloadBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.href = avatarOutput.src;
                link.download = `${avatarInput.value || 'avatar'}.svg`;
                link.click();
            });

            // Share Avatar
            shareBtn.addEventListener('click', async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'My Avatar',
                            text: 'Check out my avatar!',
                            url: avatarOutput.src,
                        });
                    } catch (err) {
                        console.error('Error sharing:', err);
                    }
                } else {
                    alert('Web Share API not supported in your browser.');
                }
            });

            // Generate a default avatar on load
            window.onload = generateAvatar;
        });
    </script>
