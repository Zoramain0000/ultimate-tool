  function generateRandomString(len) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < len; i++) result += chars.charAt(Math.random() * chars.length);
    return result;
  }

  function generateOID() {
    return generateRandomString(32).match(/.{1,8}/g).join('-').slice(0,36);
  }

  function base64Encode(str) {
    try {
      return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    } catch(e) {
      return generateRandomString(172);
    }
  }

  function generateJWT(countryCode) {
    const header = base64Encode(JSON.stringify({
      "alg": "RS256",
      "typ": "JWT",
      "kid": generateRandomString(12)
    }));
    
    const country = COUNTRIES[countryCode];
    const payloadObj = {
      "aud": "https://graph.microsoft.com",
      "iss": `https://sts.windows.net/${generateRandomString(32)}/`,
      "sub": generateOID(),
      "upn": generateUPN(countryCode),
      "tid": generateRandomString(32),
      "unique_name": generateUPN(countryCode),
      "exp": Math.floor(Date.now()/1000) + (3600 * (Math.random()*24+1)),
      "iat": Math.floor(Date.now()/1000) - 3600,
      "country": country.name,
      "loc": countryCode
    };
    
    const payload = base64Encode(JSON.stringify(payloadObj));
    const signature = generateRandomString(172);
    return `${header}.${payload}.${signature}`;
  }

  function getTimestamp() {
    return new Date().toISOString().slice(0,19).replace('T',' ');

  function createRow(entry) {
    const tr = document.createElement('tr');
    const oidShort = entry.oid.slice(0,8) + '...';
    const expDate = new Date(entry.exp*1000).toLocaleString();
    
    tr.innerHTML = `
      <td class="jwt-token" title="Click to copy full JWT">${entry.token.slice(0,45)}...</td>
      <td>${entry.type}</td>
      <td><span class="country-flag">${entry.flag}</span>${entry.country}</td>
      <td class="highlight">${entry.upn}</td>
      <td>${oidShort}</td>
      <td>${expDate}</td>
      <td style="color: #00ff41; font-weight: bold;">${entry.status}</td>
    `;
    
    tr.onclick = (e) => {
      if (e.target.closest('td')) {
        navigator.clipboard.writeText(entry.token);
        e.target.style.background = '#ff1493';
        setTimeout(() => e.target.style.background = '', 500);
      }
    };
    
    return tr;
  }

  function generateEntry() {
    const countryCode = getCountryCode();
    const country = COUNTRIES[countryCode];
    const token = generateJWT(countryCode);
    
    // Parse payload for display
    try {
      const payload = atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'));
      const payloadObj = JSON.parse(payload);
      return {
        token,
        type: 'Bearer',
        country: country.name,
        flag: country.flag,
        upn: payloadObj.upn || 'N/A',
        oid: payloadObj.sub || payloadObj.oid || generateOID(),
        exp: payloadObj.exp || Math.floor(Date.now()/1000)+7200,
        status: payloadObj.exp - Math.floor(Date.now()/1000) < 1800 ? 'EXP SOON' : 'VALID'
      };
    } catch(e) {
      return {
        token,
        type: 'Bearer',
        country: country.name,
        flag: country.flag,
        upn: generateUPN(countryCode),
        oid: generateOID(),
        exp: Math.floor(Date.now()/1000)+7200,
        status: 'VALID'
      };
    }
  }

  function updateTotalCount() {
    totalCount.textContent = `Total: ${totalLogsGenerated.toLocaleString()}`;
  }

  function loadMoreLogs() {
    if (totalLogsGenerated >= MAX_LOGS) {
      loadingIndicator.textContent = `⚠️ Max ${MAX_LOGS.toLocaleString()} tokens reached`;
      loadingIndicator.hidden = false;
      return;
    }
    loadingIndicator.hidden = false;
    
    requestAnimationFrame(() => {
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < BATCH_SIZE && totalLogsGenerated < MAX_LOGS; i++, totalLogsGenerated++) {
        const entry = generateEntry();
        allEntries.push(entry);
        fragment.appendChild(createRow(entry));
      }
      logBody.appendChild(fragment);
      loadingIndicator.hidden = true;
      updateTotalCount();
      updateAriaRowCount();
    });
  }

  function resetLogs() {
    totalLogsGenerated = 0;
    allEntries = [];
    logBody.innerHTML = '';
    loadingIndicator.hidden = true;
    updateTotalCount();
    updateAriaRowCount();
  }

  function filterLogs() {
    const filter = searchInput.value.toLowerCase();
    if (!filter) {
      [...logBody.children].forEach(tr => tr.style.display = "");
      return;
    }
    [...logBody.children].forEach(tr => {
      const haystack = tr.textContent.toLowerCase();
      tr.style.display = haystack.includes(filter) ? "" : "none";
    });
  }

  function updateAriaRowCount() {
    logBody.parentElement.setAttribute('aria-rowcount', logBody.children.length);
  }

  // Event Listeners
  logContainer.addEventListener('scroll', () => {
    if (loadingIndicator.hidden &&
        logContainer.scrollTop + logContainer.clientHeight >= logContainer.scrollHeight - 100 &&
        !searchInput.value.trim()) {
      loadMoreLogs();
    }
  });

  generateBtn.addEventListener('click', () => {
    currentCountryMode = countryModeEl.value;
    if (currentCountryMode === 'manual' && !searchInput.value.trim()) {
      currentCountryMode = 'random';
    }
    resetLogs();
    loadMoreLogs();
    searchInput.value = '';
  });

  searchInput.addEventListener('input', () => {
    filterLogs();
  });

  downloadBtn.addEventListener('click', () => {
    const csvData = allEntries.map(e => 
      `"${e.token.replace(/"/g,'""')}","${e.type}","${e.country}","${e.upn}","${e.oid}","${e.exp}","${e.status}"`
    ).join('\n');
    
    const csvBlob = new Blob([`JWT,Country,Type,UPN,OID,Expires,Status\n${csvData}`], 
      {type: 'text/csv;charset=utf-8;'});
    
    const csvLink = document.createElement('a');
    csvLink.href = URL.createObjectURL(csvBlob);
    csvLink.download = `jwt_global_${currentCountryMode}_${Date.now()}.csv`;
    csvLink.style.display = 'none';
    document.body.appendChild(csvLink);
    csvLink.click();
    document.body.removeChild(csvLink);
  });

  // Initialize
  updateTotalCount();
  loadMoreLogs();
  
  // Update country list for mixed mode
  setInterval(() => {
    if (currentCountryMode === 'mixed') {
      countryList = shuffleArray(Object.keys(COUNTRIES));
    }
  }, 5000);
