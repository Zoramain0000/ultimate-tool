            background-color: rgba(0,0,0,0.1);
        }

        video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -3;
            opacity: 0.15;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0,255,65,0.1) 0%, transparent 50%),

            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: neonGlow 3s ease-in-out infinite alternate;
        }

            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff41, #ff0040, #00ff41);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0,0,0,0.1);
            letter-spacing: 2px;
        }

        .version {
            color: #ffaa00;
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .input-wrapper {
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            position: relative;
        }

            top: -12px;
            right: 20px;
            background: #ff0040;
            color: #fff;
            padding: 2px 10px;
            font-size: 0.7rem;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            display: none; /* Hidden by default */
            box-shadow: 0 0 10px #ff0040;
        }

            width: 100%;
            background: rgba(0,0,0,0.1);
            border: 2px solid #003300;
            color: #00ff41;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            border-radius: 5px;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }

        .phone-input:focus {
            outline: none;
            border-color: #ff0040;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .scan-btn {
            width: 100%;
            padding: 20px;
            margin-top: 20px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.2), transparent);
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .scan-btn:hover {
            background: #00ff41;
            color: rgba(0,0,0,0.1);
            box-shadow: 0 0 30px #00ff41;
        }

            margin-top: 15px;
            font-family: 'Share Tech Mono', monospace;
            color: #ffaa00;
            text-align: center;
            font-size: 1.1rem;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stats-bar {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 20, 0, 0.1);
            border: 1px solid #ff0040;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #ff0040;
        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

            background: rgba(0, 0, 0, 0.1);

            border-radius: 10px;

            border-color: #00ff41;

            background: linear-gradient(90deg, rgba(0,0,0,0.1), transparent);

            border-bottom: 1px solid #003300;
            display: flex;
            justify-content: space-between;
            align-items: center;

            font-size: 1.1rem;
            color: #fff;

            padding: 20px;

            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px dashed #003300;
            padding-bottom: 5px;

            color: #888;
            font-family: 'Share Tech Mono', monospace;

            font-family: 'Share Tech Mono', monospace;
            text-align: right;
            font-weight: bold;

            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            margin-bottom: 8px;
            text-decoration: none;
            color: #00ff41;
            border-radius: 4px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .osint-link:hover {
            background: #00ff41;
            color: rgba(0,0,0,0.1);
            border-color: #00ff41;
        }

        .osint-name { font-weight: bold; }
        .osint-arrow { font-size: 1.2rem; }

        /* --- ANIMATIONS --- */
        @keyframes neonGlow {
            from { text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41; }
            to { text-shadow: 0 0 20px #ff0040, 0 0 30px #ff0040; }
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }

            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;

        // ==========================================
        // 2. AUTO-DETECTION LOGIC
        // ==========================================

        const phoneInput = document.getElementById('phoneInput');
        const detectedInfo = document.getElementById('detectedInfo');
        const detectBadge = document.getElementById('detectBadge');
        let currentDetectedCode = null;

        // Sort countries by dial code length (descending) to match longest prefixes first
        // This ensures +1242 (Bahamas) is checked before +1 (US)
        const sortedCountries = Object.entries(DIAL_CODES).sort((a, b) => b[1].length - a[1].length);

        phoneInput.addEventListener('input', (e) => {
            let raw = e.target.value.replace(/\D/g, ''); // Remove non-digits
            
            // Handle user typing +
            if(e.target.value.startsWith('+')) raw = raw.substring(1);

            let detected = null;

            // Search for matching prefix
            for (const [code, dialCode] of sortedCountries) {
                const prefix = dialCode.replace('+', '');
                if (raw.startsWith(prefix)) {
                    detected = code;
                    break;
                }
            }

            if (detected && detected !== currentDetectedCode) {
                currentDetectedCode = detected;
                const countryName = COUNTRY_NAMES[detected];
                const capital = CITIES[detected];
                
                // Show detected info
                detectedInfo.style.opacity = '1';
                detectedInfo.innerHTML = `> DETECTED: <span style="color:#fff">${countryName}</span> (${capital})`;
                detectBadge.style.display = 'block';
                
                // Add green glow to input
                phoneInput.style.borderColor = '#00ff41';
            } else if (!detected && currentDetectedCode) {
                // Lost detection
                currentDetectedCode = null;
                detectedInfo.style.opacity = '0';
                detectBadge.style.display = 'none';
                phoneInput.style.borderColor = '#003300';
            }
        });

        // ==========================================
        // 3. SCAN LOGIC
        // ==========================================

        const scanBtn = document.getElementById('scanBtn');
        const resultsDiv = document.getElementById('results');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statsBar = document.getElementById('statsBar');

        scanBtn.addEventListener('click', () => {
            const rawNumber = phoneInput.value.replace(/\D/g, '');
            
            // Re-verify detection
            let detected = null;
            for (const [code, dialCode] of sortedCountries) {
                if (rawNumber.startsWith(dialCode.replace('+', ''))) {
                    detected = code;
                    break;
                }
            }

            if (!detected || rawNumber.length < 5) {
                alert('Could not auto-detect country. Please enter a valid international number (e.g. +1 555...).');
                return;
            }

            // Assemble Data
            const data = {
                code: detected,
                name: COUNTRY_NAMES[detected],
                dialCode: DIAL_CODES[detected],
                city: CITIES[detected],
                location: LOCATIONS[detected],
                street: STREETS[detected] || STREETS['default'],
                region: REGIONS[detected] || REGIONS['default'],
                timezone: TIMEZONES[detected] || TIMEZONES['default'],
                zip: '00000'
            };

            const formattedNumber = `+${rawNumber}`;

            // UI Feedback
            document.getElementById('targetDisplay').textContent = `TARGET: ${formattedNumber} // ${data.name.toUpperCase()}`;
            loadingOverlay.style.display = 'flex';
            resultsDiv.innerHTML = '';

            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                renderResults(formattedNumber, data);
            }, 1000);
        });

        function renderResults(number, data) {
            statsBar.style.display = 'grid';
            document.getElementById('countryNameDisplay').textContent = data.name.toUpperCase();
            document.getElementById('cityDisplay').textContent = data.city;
            document.getElementById('dialCodeDisplay').textContent = data.dialCode;

            const dataCard = document.createElement('div');
            dataCard.className = 'result-card';
            dataCard.innerHTML = `
                <div class="card-header">
                    <span class="card-title">Target Profile (Auto-Detected)</span>
                    <span>📍</span>
                </div>
                <div class="card-body">
                    <div class="data-row"><span class="data-label">Country</span><span class="data-value">${data.name}</span></div>
                    <div class="data-row"><span class="data-label">Capital</span><span class="data-value">${data.city}</span></div>
                    <div class="data-row"><span class="data-label">Location</span><span class="data-value">${data.location}</span></div>
                    <div class="data-row"><span class="data-label">Region</span><span class="data-value">${data.region}</span></div>
                    <div class="data-row"><span class="data-label">Street</span><span class="data-value">${data.street}</span></div>
                    <div class="data-row"><span class="data-label">Timezone</span><span class="data-value">${data.timezone}</span></div>
                </div>
            `;
            resultsDiv.appendChild(dataCard);

            const osintCard = document.createElement('div');
            osintCard.className = 'result-card';

            const links = [
                { name: "Google Search", url: `https://www.google.com/search?q="${number}"` },
                { name: "Google Images", url: `https://www.google.com/search?tbm=isch&q="${number}"` },
                { name: "Bing Search", url: `https://www.bing.com/search?q="${number}"` },
                { name: "Yandex Search", url: `https://yandex.com/search/?text="${number}"` },
                { name: "WhoCallsMe", url: `https://whocallsme.com/Phone-Number.aspx/${number}` },
                { name: "Sync.me", url: `https://sync.me/search?number=${number}` },
                { name: "TrueCaller", url: `https://www.truecaller.com/search/${data.dialCode.replace('+','')}/${number.replace(/\D/g,'')}` },
                { name: "SpamReports", url: `https://spamcalls.net/en/Number-Details/${number}` },
                { name: "Social Mention", url: `https://www.socialmention.com/search?q="${number}"&t=all` },
                { name: "GetContact", url: `https://getcontact.com/en` }
            ];

            let linksHtml = '<div class="osint-links">';
            links.forEach(link => {
                linksHtml += `
                    <a href="${link.url}" target="_blank" class="osint-link">
                        <span class="osint-name">${link.name}</span>
                        <span class="osint-arrow">➔</span>
                    </a>
                `;
            });
            linksHtml += '</div>';

            osintCard.innerHTML = `
                <div class="card-header">
                    <span class="card-title">OSINT Search Vectors</span>
                    <span>🔍</span>
                </div>
                <div class="card-body">
                    <p style="margin-bottom:15px; color:#aaa; font-size:0.9rem;">Global intelligence vectors generated for ${number}</p>
                    ${linksHtml}
                </div>
            `;
            resultsDiv.appendChild(osintCard);
        }

        // ==========================================
        // 4. MATRIX EFFECT
        // ==========================================
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(drawMatrix, 33);

    </script>
