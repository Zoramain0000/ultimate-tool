    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --primary: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --accent: #ec4899; /* Pink */
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Background Video --- */
        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4); /* Darken video for readability */
        }

        /* --- Main Container (Glassmorphism) --- */
        .container {
            width: 100%;
            max-width: 550px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #e879f9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- Form Elements --- */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            align-items: center;
            gap: 5px;
        }

        /* --- Loading Spinner --- */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -10px;
            margin-top: -10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-text {
            transition: opacity 0.2s;
        }
        
        button.loading .btn-text {
            opacity: 0;
        }
        
        button.loading .spinner {
            display: block;
        }

        /* --- Results Section --- */
        .results {
            margin-top: 2rem;
            display: none; /* Hidden by default */
            border-top: 1px solid var(--glass-border);
            padding-top: 1.5rem;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .value {
            font-weight: 600;
            text-align: right;
            color: var(--text-main);
            max-width: 60%;
            word-wrap: break-word;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge.valid {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge.invalid {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .flag-icon {
            font-size: 1.5rem;
            margin-left: 8px;
            vertical-align: middle;
        }

</head>

        class Lookup {
            constructor(phoneNo) {
                this.rawInput = phoneNo;
                this.isValid = false;
                this.data = null;
                this.internationalFormat = '';
                this.parse_phoneNo();
            }

            parse_phoneNo() {
                try {
                    // Normalize input: remove spaces, dashes, parentheses
                    let cleanNumber = this.rawInput.replace(/[\s\-\(\)]/g, '');

                    // Ensure it starts with +
                    if (!cleanNumber.startsWith('+')) {
                        if (cleanNumber.startsWith('00')) {
                            cleanNumber = '+' + cleanNumber.substring(2);
                        } else {
                            // If no prefix provided, we can't reliably look up country
                            throw new Error("Missing Country Code");
                        }
                    }

                    // Extract Country Code (1 to 3 digits usually, max 4 in DB)
                    // Sort keys by length descending to match longest first
                    const sortedCodes = Object.keys(PHONE_DATA).sort((a, b) => b.length - a.length);
                    let matchedCode = null;

                    for (const code of sortedCodes) {
                        if (cleanNumber.substring(1).startsWith(code)) {
                            matchedCode = code;
                            break;
                        }
                    }

                    if (!matchedCode) {
                        throw new Error("Country Code not supported in DB");
                    }

                    this.data = PHONE_DATA[matchedCode];
                    
                    // Basic validation: check length of national number
                    const nationalNumber = cleanNumber.substring(1 + matchedCode.length);
                    if (nationalNumber.length < 4 || nationalNumber.length > 15) {
                         throw new Error("Invalid number length");
                    }

                    this.isValid = true;
                    this.internationalFormat = `+${matchedCode} ${nationalNumber}`;

                } catch (e) {
                    console.error(e);
                    this.isValid = false;
                }
            }

            getResults() {
                if (!this.isValid || !this.data) return null;
                return {
                    valid: true,
                    international: this.internationalFormat,
                    region: this.data.region,
                    country: this.data.country,
                    carrier: this.data.carrier,
                    timezone: this.data.tz.join(', ')
                };
            }
        }

        const submitBtn = document.getElementById('submitBtn');

        // Helper: Get Flag Emoji from Country Name (Approximation)
        function getFlagEmoji(countryName) {
            // Simple mapping for major countries for visual flair
            const map = {
                'USA/Canada': '🇺🇸', 'Russia': '🇷🇺', 'United Kingdom': '🇬🇧',
                'Germany': '🇩🇪', 'France': '🇫🇷', 'Spain': '🇪🇸', 'Italy': '🇮🇹',
                'India': '🇮🇳', 'China': '🇨🇳', 'Japan': '🇯🇵', 'Brazil': '🇧🇷',
                'Australia': '🇦🇺', 'South Korea': '🇰🇷', 'Mexico': '🇲🇽', 'South Africa': '🇿🇦',
                'Egypt': '🇪🇬', 'Turkey': '🇹🇷', 'Thailand': '🇹🇭', 'Vietnam': '🇻🇳'
            };
            return map[countryName] || '🌍'; 
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI Reset
            errorMsg.style.display = 'none';
            resultsArea.style.display = 'none';
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            const inputVal = phoneInput.value.trim();

            if (!inputVal) {
                showError("Please enter a number");
                stopLoading();
                return;
            }

            // Simulate processing time for "Analysis" feel
            setTimeout(() => {
                const lookup = new Lookup(inputVal);
                
                if (lookup.isValid) {
                    const data = lookup.getResults();
                    displayData(data);
                } else {
                    showError("Invalid number or unsupported country code.");
                }
                stopLoading();
            }, 800);
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.style.display = 'flex';
        }

        function stopLoading() {
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
        }

        function displayData(data) {
            const resValid = document.getElementById('resValid');
            const resIntl = document.getElementById('resInternational');
            const resRegion = document.getElementById('resRegion');
            const resCarrier = document.getElementById('resCarrier');
            const resTimezone = document.getElementById('resTimezone');

            // Set Status
            resValid.textContent = "Valid Number";
            resValid.className = "badge valid";

            // Set Details
            resIntl.textContent = data.international;
            
            // Region + Flag
            const flag = getFlagEmoji(data.country);
            resRegion.innerHTML = `${data.country} <span class="flag-icon">${flag}</span>`;
            
            resCarrier.textContent = data.carrier;
            resTimezone.textContent = data.timezone;

            // Show results
            resultsArea.style.display = 'block';
        }

    </script>
</body>
</html>
