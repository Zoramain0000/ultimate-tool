<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERODAYS • Traceroute Visualizer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,sans-serif;color:#d1d1d1;overflow-x:hidden;}

.bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:-2;filter:brightness(0.3);
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:-1;}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;text-align:center;border-bottom:1px solid #1f1f1f;
}
header h1{font-size:26px;letter-spacing:2px;}

.container{
  max-width:980px;margin:30px auto;padding:20px;
  background:rgba(0,0,0,0.65);border-radius:10px;
  box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.section{margin-bottom:25px;}
.section h2{
  font-size:18px;margin-bottom:10px;color:#9f9f9f;
  border-left:4px solid #555;padding-left:10px;
}

input{
  width:100%;padding:12px;border-radius:6px;
  border:1px solid #555;background:black;color:#fff;margin-bottom:10px;
}

button{
  padding:12px 20px;background:black;border:1px solid #333;
  color:white;cursor:pointer;border-radius:6px;transition:.3s;
}
button:hover{background:#111;transform:scale(1.05);}

.traceroute-box{
  background:black;border:1px solid #222;border-radius:6px;
  padding:12px;max-height:320px;overflow:auto;
  font-family:monospace;font-size:13px;
}

.hop{
  padding:6px;border-bottom:1px dashed #222;
  color:#00ff7f;
}

.hop span{color:#888;margin-left:8px;}

.search-box{
  margin-top:10px;
}

.log{
  background:black;padding:12px;border-radius:6px;
  font-family:monospace;font-size:13px;color:#8aff8a;
  max-height:200px;overflow:auto;border:1px solid #222;
}

footer{
  background:rgba(0,0,0,0.7);
  text-align:center;padding:15px;font-size:13px;color:#777;
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERODAYS • TRACEROUTE VISUALIZER</h1>
</header>

<div class="container">

  <div class="section">
    <h2>Target Host</h2>
    <input id="targetInput" placeholder="example.com or 8.8.8.8">
    <button onclick="startTraceroute()">Start Traceroute</button>
    <button onclick="stopTraceroute()">Stop</button>
  </div>

  <div class="section">
    <h2>Traceroute Results (Live)</h2>
    <div id="traceBox" class="traceroute-box"></div>

    <div class="search-box">
      <input id="searchInput" placeholder="Search hop / IP / latency" oninput="filterHops()">
    </div>
  </div>

  <div class="section">
    <h2>Activity Log</h2>
    <div id="log" class="log"></div>
  </div>

</div>

<footer>
  WhatWeb • Advanced Network Visualization Tool<br>
  Educational & ethical use only
</footer>

<script>
let tracerInterval=null;
let hopCount=0;
let hopsData=[];

const log = msg=>{
  const l=document.getElementById("log");
  l.innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop=l.scrollHeight;
};

function randomIP(){
  return `${rand(1,223)}.${rand(0,255)}.${rand(0,255)}.${rand(1,254)}`;
}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function startTraceroute(){
  const target=document.getElementById("targetInput").value.trim();
  if(!target){alert("Enter a target");return;}

  document.getElementById("traceBox").innerHTML="";
  hopsData=[];
  hopCount=0;
  log(`Traceroute started for ${target}`);
  
  tracerInterval=setInterval(()=>{
    hopCount++;
    if(hopCount>99999) return; // infinite-style limit

    const latency=(Math.random()*200+1).toFixed(2);
    const ip=randomIP();
    const hop={hop:hopCount,ip,latency};
    hopsData.push(hop);

    const el=document.createElement("div");
    el.className="hop";
    el.innerHTML=`Hop ${hopCount} → ${ip} <span>${latency} ms</span>`;
    el.dataset.text=`${hopCount} ${ip} ${latency}`;
    document.getElementById("traceBox").appendChild(el);
    document.getElementById("traceBox").scrollTop=999999;

    if(hopCount%10===0){
      log(`Hop ${hopCount} reached`);
    }
  },150);
}

function stopTraceroute(){
  clearInterval(tracerInterval);
  log("Traceroute stopped by user.");
}

function filterHops(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".hop").forEach(h=>{
    h.style.display=h.dataset.text.toLowerCase().includes(q)?"block":"none";
  });
}
</script>

</body>
</html>
