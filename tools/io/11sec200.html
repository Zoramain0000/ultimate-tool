  const VEHICLE_MAKES = [
    'Toyota', 'Ford', 'Honda', 'Chevrolet', 'Nissan', 'Hyundai', 'Kia', 'Volkswagen', 
    'Mercedes-Benz', 'BMW', 'Audi', 'Tesla', 'Subaru', 'Mazda', 'Jeep', 'Ram', 
    'GMC', 'Buick', 'Dodge', 'Chrysler', 'Lexus', 'Volvo', 'Land Rover', 'Jaguar',
    'Porsche', 'Ferrari', 'Lamborghini', 'Maserati', 'Bentley', 'Rolls-Royce', 
    'Aston Martin', 'McLaren', 'Bugatti', 'Pagani', 'Koenigsegg', 'Alfa Romeo', 
    'Fiat', 'Renault', 'Peugeot', 'Citroen', 'Opel', 'Skoda', 'Seat', 'Mini',
    'Smart', 'Suzuki', 'Mitsubishi', 'Daihatsu', 'Mahindra', 'Tata', 'Geely',
    'Chery', 'BYD', 'Great Wall', 'Haval', 'Wuling', 'NIO', 'XPeng', 'Li Auto'
  ];

  const VEHICLE_MODELS = {
    'Toyota': ['Camry', 'Corolla', 'RAV4', 'Highlander', 'Tacoma', 'Prius', 'Supra', 'Land Cruiser'],
    'Ford': ['F-150', 'Mustang', 'Explorer', 'Escape', 'Focus', 'Ranger', 'Bronco'],
    'Honda': ['Civic', 'Accord', 'CR-V', 'Pilot', 'Fit', 'Passport'],
    'Chevrolet': ['Silverado', 'Equinox', 'Malibu', 'Tahoe', 'Suburban', 'Camaro'],
    'Tesla': ['Model S', 'Model 3', 'Model X', 'Model Y', 'Cybertruck'],
    'BMW': ['3 Series', '5 Series', 'X3', 'X5', 'M3', 'M5', 'i8'],
    'Mercedes-Benz': ['C-Class', 'E-Class', 'S-Class', 'GLC', 'GLE', 'G-Wagon'],
    'Audi': ['A4', 'A6', 'Q5', 'Q7', 'R8', 'e-tron'],
    'Volkswagen': ['Golf', 'Passat', 'Tiguan', 'Atlas', 'ID.4'],
    'Nissan': ['Altima', 'Sentra', 'Rogue', 'Pathfinder', '370Z', 'GT-R'],
    'Hyundai': ['Elantra', 'Sonata', 'Tucson', 'Santa Fe', 'Ioniq 5'],
    'Kia': ['Forte', 'K5', 'Sportage', 'Sorento', 'Telluride', 'EV6'],
    'Subaru': ['Outback', 'Forester', 'Impreza', 'WRX', 'Crosstrek'],
    'Mazda': ['Mazda3', 'Mazda6', 'CX-5', 'CX-9', 'MX-5 Miata'],
    'Jeep': ['Wrangler', 'Grand Cherokee', 'Cherokee', 'Gladiator'],
    'Ram': ['1500', '2500', '3500'],
    'Lexus': ['ES', 'RX', 'NX', 'GX', 'LS'],
    'Volvo': ['XC40', 'XC60', 'XC90', 'S60', 'V90'],
    'Land Rover': ['Range Rover', 'Discovery', 'Defender', 'Evoque'],
    'Porsche': ['911', 'Cayenne', 'Macan', 'Taycan', 'Panamera'],
    'Ferrari': ['488', 'F8', 'Roma', 'SF90 Stradale'],
    'Lamborghini': ['Huracan', 'Urus', 'Aventador'],
    'Generic': ['Sedan', 'SUV', 'Truck', 'Hatchback', 'Coupe', 'Van', 'Wagon']
  };

  const VEHICLE_COLORS = [
    'White', 'Black', 'Silver', 'Gray', 'Blue', 'Red', 'Brown', 'Green', 
    'Beige', 'Orange', 'Yellow', 'Gold', 'Purple', 'Bronze'
  ];

  let totalLogsGenerated = 0;
  let currentRegionMode = 'random';
  let allEntries = [];
  let countryList = Object.keys(COUNTRIES);

  function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function getRegionCode() {
    switch(currentRegionMode) {
      case 'manual':
        const manualInput = searchInput.value.toUpperCase().slice(0,2);
        return COUNTRIES[manualInput] ? manualInput : 'US';
      case 'usa': return 'US';
      case 'europe': 
        const euCountries = ['DE','FR','IT','ES','GB','NL','BE','SE','DK','FI','NO','PL','CZ','AT','CH'];
        return euCountries[Math.floor(Math.random() * euCountries.length)];
      case 'asia':
        const asiaCountries = ['JP','CN','IN','KR','SG','HK','MY','TH','VN','ID','PH','TW','AU'];
        return asiaCountries[Math.floor(Math.random() * asiaCountries.length)];
      default: // random global
        return countryList[Math.floor(Math.random() * countryList.length)];
    }
  }

  function generateRandomString(len, charset) {
    charset = charset || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < len; i++) result += charset.charAt(Math.floor(Math.random() * charset.length));
    return result;
  }

  function generateLicensePlate(regionCode) {
    const style = COUNTRIES[regionCode] ? COUNTRIES[regionCode].style : 'alpha';
    
    switch(style) {
      case 'usa':
        // US Format: ABC-1234 or 123-ABC
        return Math.random() > 0.5 
          ? `${generateRandomString(3, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}-${generateRandomString(4, '0123456789')}`
          : `${generateRandomString(3, '0123456789')}-${generateRandomString(3, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}`;
      case 'uk':
        // UK Format: AB12 CDE
        return `${generateRandomString(2, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}${generateRandomString(2, '0123456789')} ${generateRandomString(3, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}`;
      case 'china':
        // CN Format:京A·12345
        const cnCities = ['京','沪','津','渝','冀','豫','云','辽','黑','湘','皖','鲁','新','苏','浙','赣','鄂','桂','甘','晋','蒙','陕','吉','闽','贵','粤','青','藏','川','宁','琼'];
        return `${cnCities[Math.floor(Math.random() * cnCities.length)]}${generateRandomString(1, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}·${generateRandomString(5, '0123456789')}`;
      case 'japan':
        // JP Format: 品川330あ 10-34
        const jpAreas = ['品川','足立','練馬','世田谷','大田','横浜','大阪','名古屋','福岡','札幌','仙台'];
        const jpKana = ['あ','い','う','え','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん'];
        return `${jpAreas[Math.floor(Math.random() * jpAreas.length)]}${generateRandomString(3, '0123456789')}${jpKana[Math.floor(Math.random() * jpKana.length)]}`;
      case 'korea':
        // KR Format: 12가 1234
        const krSyllables = ['가','나','다','라','마','바','사','아','자','차','카','타','파','하'];
        return `${generateRandomString(2, '0123456789')}${krSyllables[Math.floor(Math.random() * krSyllables.length)]} ${generateRandomString(4, '0123456789')}`;
      case 'india':
        // IN Format: MH-01-AB-1234
        const inStates = ['MH','DL','KA','TN','UP','GJ','RJ','WB','KL','PB','HR','CH','MP','BR'];
        return `${inStates[Math.floor(Math.random() * inStates.length)]}-${generateRandomString(2, '0123456789')}-${generateRandomString(2, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}-${generateRandomString(4, '0123456789')}`;
      case 'numeric':
        // Simple numeric for many Middle Eastern/African countries
        return generateRandomString(Math.floor(Math.random() * 3) + 4, '0123456789');
      default: // Alpha-Numeric (Generic EU/LatAm)
        // e.g. AB-123-CD or 123-AB-45
        return Math.random() > 0.5 
          ? `${generateRandomString(2, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}-${generateRandomString(3, '0123456789')}-${generateRandomString(2, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}`
          : `${generateRandomString(3, '0123456789')}-${generateRandomString(3, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ')}-${generateRandomString(2, '0123456789')}`;
    }
  }

  function generateVIN() {
    // VINs are 17 chars, avoiding I, O, Q
    const chars = 'ABCDEFGHJKLMNPRSTUVWXYZ0123456789';
    let vin = generateRandomString(17, chars);
    // Ensure it doesn't start with a number (WMI standard)
    return 'A' + vin.substring(1);
  }

  function getVehicleMakeModel() {
    const make = VEHICLE_MAKES[Math.floor(Math.random() * VEHICLE_MAKES.length)];
    const models = VEHICLE_MODELS[make] || VEHICLE_MODELS['Generic'];
    const model = models[Math.floor(Math.random() * models.length)];
    const year = 2000 + Math.floor(Math.random() * 25);
    return `${year} ${make} ${model}`;
  }

  function getTimestamp() {
    return new Date().toISOString().slice(0,19).replace('T',' ');
  }

  function createRow(entry) {
    const tr = document.createElement('tr');
    const vinShort = entry.vin.slice(0,8) + '...';
    
    tr.innerHTML = `
      <td class="plate-number" title="Click to copy plate">${entry.plate}</td>
      <td style="font-family: monospace; color: #aaa;">${vinShort}</td>
      <td><span class="country-flag">${entry.flag}</span>${entry.country}</td>
      <td class="highlight">${entry.makeModel}</td>
      <td>${entry.color}</td>
      <td style="font-size: 11px;">${entry.timestamp}</td>
      <td style="color: #00ff41; font-weight: bold;">${entry.status}</td>
    `;
    
    tr.onclick = (e) => {
      if (e.target.closest('td')) {
        navigator.clipboard.writeText(entry.plate);
        e.target.style.background = '#ff1493';
        setTimeout(() => e.target.style.background = '', 500);
      }
    };
    
    return tr;
  }

  function generateEntry() {
    const regionCode = getRegionCode();
    const regionData = COUNTRIES[regionCode] || COUNTRIES['US'];
    const plate = generateLicensePlate(regionCode);
    
    return {
      plate: plate,
      vin: generateVIN(),
      country: regionData.name,
      flag: regionData.flag,
      makeModel: getVehicleMakeModel(),
      color: VEHICLE_COLORS[Math.floor(Math.random() * VEHICLE_COLORS.length)],
      timestamp: getTimestamp(),
      status: 'DETECTED' // Can be 'WANTED', 'STOLEN', 'CLEAN' etc.
    };
  }

  function updateTotalCount() {
    totalCount.textContent = `Total: ${totalLogsGenerated.toLocaleString()}`;
  }

  function loadMoreLogs() {
    if (totalLogsGenerated >= MAX_LOGS) {
      loadingIndicator.textContent = `⚠️ Max ${MAX_LOGS.toLocaleString()} records reached`;
      loadingIndicator.hidden = false;
      return;
    }
    loadingIndicator.hidden = false;
    
    requestAnimationFrame(() => {
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < BATCH_SIZE && totalLogsGenerated < MAX_LOGS; i++, totalLogsGenerated++) {
        const entry = generateEntry();
        allEntries.push(entry);
        fragment.appendChild(createRow(entry));
      }
      logBody.appendChild(fragment);
      loadingIndicator.hidden = true;
      updateTotalCount();
      updateAriaRowCount();
    });
  }

  function resetLogs() {
    totalLogsGenerated = 0;
    allEntries = [];
    logBody.innerHTML = '';
    loadingIndicator.hidden = true;
    updateTotalCount();
    updateAriaRowCount();
  }

  function filterLogs() {
    const filter = searchInput.value.toLowerCase();
    if (!filter) {
      [...logBody.children].forEach(tr => tr.style.display = "");
      return;
    }
    [...logBody.children].forEach(tr => {
      const haystack = tr.textContent.toLowerCase();
      tr.style.display = haystack.includes(filter) ? "" : "none";
    });
  }

  function updateAriaRowCount() {
    logBody.parentElement.setAttribute('aria-rowcount', logBody.children.length);
  }

  // Event Listeners
  logContainer.addEventListener('scroll', () => {
    if (loadingIndicator.hidden &&
        logContainer.scrollTop + logContainer.clientHeight >= logContainer.scrollHeight - 100 &&
        !searchInput.value.trim()) {
      loadMoreLogs();
    }
  });

  generateBtn.addEventListener('click', () => {
    currentRegionMode = regionModeEl.value;
    if (currentRegionMode === 'manual' && !searchInput.value.trim()) {
      currentRegionMode = 'random';
    }
    resetLogs();
    loadMoreLogs();
    searchInput.value = '';
  });

  searchInput.addEventListener('input', () => {
    filterLogs();
  });

  downloadBtn.addEventListener('click', () => {
    const csvData = allEntries.map(e => 
      `"${e.plate}","${e.vin}","${e.country}","${e.makeModel}","${e.color}","${e.timestamp}","${e.status}"`
    ).join('\n');
    
    const csvBlob = new Blob([`Plate,VIN,Region,Make/Model,Color,Timestamp,Status\n${csvData}`], 
      {type: 'text/csv;charset=utf-8;'});
    
    const csvLink = document.createElement('a');
    csvLink.href = URL.createObjectURL(csvBlob);
    csvLink.download = `lpr_global_${currentRegionMode}_${Date.now()}.csv`;
    csvLink.style.display = 'none';
    document.body.appendChild(csvLink);
    csvLink.click();
    document.body.removeChild(csvLink);
  });

  // Initialize
  updateTotalCount();
  loadMoreLogs();
  
  // Update country list for random mode
  setInterval(() => {
    if (currentRegionMode === 'random') {
      countryList = shuffleArray(Object.keys(COUNTRIES));
    }
  }, 5000);

})();
