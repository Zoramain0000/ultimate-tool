<script>
// MAP
const map = L.map('map').setView([20,0],2);
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
osm.addTo(map);
let isSat = false;
const cluster = L.markerClusterGroup();
map.addLayer(cluster);

// STATE
let currentText = '', beforeShot = null, afterShot = null;

// SEARCH
async function searchWiki(){
  cluster.clearLayers();
  document.getElementById('results').innerHTML='';
  const q = document.getElementById('query').value;
  const lang = document.getElementById('lang').value;
  if(!q) return;
  const res = await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);
  const data = await res.json();
  data.query.search.forEach(r => addResult(r.title, lang));
}

// ADD RESULT
async function addResult(title, lang){
  const res = await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&prop=extracts|coordinates&exintro&titles=${encodeURIComponent(title)}&format=json&origin=*`);
  const page = Object.values((await res.json()).query.pages)[0];
  if(page.coordinates){
    const {lat, lon} = page.coordinates[0];
    cluster.addLayer(L.marker([lat,lon]).bindPopup(title));
    map.setView([lat,lon],5);
  }
  currentText = page.extract?.replace(/<[^>]+>/g,'')||'';
  summarize(currentText);
  drawEntities(currentText);
  const resultsDiv = document.getElementById('results');
  const div = document.createElement('div');
  div.className = 'result';
  div.innerHTML = `<h3>${title}</h3><p>${currentText.slice(0,300)}...</p>`;
  div.onclick = ()=>{if(page.coordinates){map.setView([page.coordinates[0].lat,page.coordinates[0].lon],6)}};
  resultsDiv.appendChild(div);
}

// MULTI-AI SUMMARY (FRONTEND)
async function summarize(text){
  const panel = document.getElementById('summary');
  panel.innerHTML = 'Analyzing...';

  // Mock frontend AI summarization (real API optional)
  let summary = text.split('.').slice(0,3).join('.') + '.';
  panel.innerHTML = summary || 'No summary available';
}

// ENTITY GRAPH
function drawEntities(text){
  const entities = [...new Set(text.match(/\b[A-Z][a-z]{3,}\b/g))].slice(0,8);
  const svg = entities.map((e,i)=>`<circle cx="${60+i*70}" cy="60" r="22" fill="#38bdf8"/>
    <text x="${60+i*70}" y="65" fill="#000" text-anchor="middle">${e.slice(0,6)}</text>`).join('');
  document.getElementById('entities').innerHTML = `<svg width="100%" height="120">${svg}</svg>`;
}

// DARK-WEB OSINT
function darkWebScan(){
  if(!currentText) return alert('No text to analyze');
  const hits = currentText.match(/\.onion|dark web|tor network|hidden service/gi);
  alert(hits ? `Dark-web references detected:\n${[...new Set(hits)].join(', ')}` : 'No dark-web indicators found');
}

// SATELLITE TOGGLE
function toggleSatellite(){
  if(isSat){ map.removeLayer(sat); osm.addTo(map); }
  else{ map.removeLayer(osm); sat.addTo(map); }
  isSat = !isSat;
}

// SCREENSHOT
function capture(id,name){
  html2canvas(document.getElementById(id),{backgroundColor:null,useCORS:true}).then(c=>{
    const a=document.createElement('a'); a.href=c.toDataURL(); a.download=name; a.click();
  });
}

// TIMELINE
function saveBefore(){html2canvas(document.getElementById('app')).then(c=>beforeShot=c)}
function saveAfter(){html2canvas(document.getElementById('app')).then(c=>afterShot=c)}

// PDF
function makePDF(){
  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF();
  pdf.text("ZeroDays WikiMap Intelligence Report",10,10);
  pdf.text(currentText.slice(0,1000),10,20);
  pdf.save("investigation.pdf");
}
