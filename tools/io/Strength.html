<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays Password Strength Analyzer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  color:#d1d1d1;
  overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.3);
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;
  text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{
  font-size:26px;
  letter-spacing:2px;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
  background:rgba(0,0,0,0.65);
  border-radius:10px;
  box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.section{margin-bottom:25px;}
.section h2{
  font-size:18px;
  margin-bottom:10px;
  color:#9f9f9f;
  border-left:4px solid #555;
  padding-left:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:6px;
  border:1px solid #444;
  background:black;
  color:#fff;
  margin-bottom:10px;
}

button{
  padding:12px 20px;
  background:black;
  border:1px solid #333;
  color:white;
  cursor:pointer;
  border-radius:6px;
  transition:.3s;
}
button:hover{
  background:#111;
  transform:scale(1.05);
}

.data-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  background:rgba(15,15,15,0.85);
  border:1px solid #222;
  border-radius:8px;
  padding:12px;
  font-size:14px;
}
.card span{
  display:block;
  font-size:12px;
  color:#777;
  margin-bottom:4px;
}

.log{
  background:black;
  padding:12px;
  border-radius:6px;
  font-family:monospace;
  font-size:13px;
  color:#8aff8a;
  max-height:180px;
  overflow:auto;
  border:1px solid #222;
}

footer{
  background:rgba(0,0,0,0.7);
  text-align:center;
  padding:15px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • PASSWORD STRENGTH ANALYZER</h1>
</header>

<div class="container">

  <div class="section">
    <h2>Enter Password</h2>
    <input type="password" id="pwd" placeholder="Enter password to analyze">
    <button onclick="analyze()">Analyze Password</button>
  </div>

  <div class="section">
    <h2>Analysis Results</h2>
    <div class="data-grid">
      <div class="card"><span>Strength</span><div id="strength">-</div></div>
      <div class="card"><span>Score</span><div id="score">-</div></div>
      <div class="card"><span>Entropy</span><div id="entropy">-</div></div>
      <div class="card"><span>Crack Time</span><div id="crack">-</div></div>
      <div class="card"><span>Detected Issues</span><div id="issues">-</div></div>
      <div class="card"><span>NIST Verdict</span><div id="nist">-</div></div>
    </div>
  </div>

  <div class="section">
    <h2>Activity Log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>
  Technology information system tools for cyber‑security<br>
  Educational & ethical use only
</footer>

<script>
const weakPatterns=["123","1234","12345","password","admin","qwerty","letmein","welcome","abc","abcd"];
const keyboardWalks=["qwerty","asdf","zxcv","12345","09876"];
const dictionary=["zero","crypto","ghost","secure","vault","cipher","node","hash","dark","quantum"];

const log=msg=>{
  const l=document.getElementById("log");
  l.innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop=l.scrollHeight;
};

function analyze(){
  const p=document.getElementById("pwd").value;
  if(!p){alert("Enter password");return;}

  let score=0;
  let issues=[];

  // Length
  if(p.length>=16) score+=30;
  else if(p.length>=12) score+=20;
  else if(p.length>=8) score+=10;
  else issues.push("Too short");

  // Charset
  let charset=0;
  if(/[a-z]/.test(p)){score+=10;charset+=26;}
  if(/[A-Z]/.test(p)){score+=10;charset+=26;}
  if(/[0-9]/.test(p)){score+=10;charset+=10;}
  if(/[^a-zA-Z0-9]/.test(p)){score+=10;charset+=32;}

  // Entropy
  const entropy=Math.log2(Math.pow(charset||1,p.length));
  score+=Math.min(20,Math.floor(entropy/5));

  // Patterns
  weakPatterns.forEach(w=>{
    if(p.toLowerCase().includes(w)){score-=20;issues.push("Weak pattern");}
  });
  keyboardWalks.forEach(w=>{
    if(p.toLowerCase().includes(w)){score-=25;issues.push("Keyboard walk");}
  });
  dictionary.forEach(w=>{
    if(p.toLowerCase().includes(w)){score-=15;issues.push("Dictionary word");}
  });
  if(/(.)\1{2,}/.test(p)){score-=15;issues.push("Repeated characters");}

  score=Math.max(0,Math.min(100,score));

  let strength="Very Weak";
  if(score>=80) strength="Very Strong";
  else if(score>=60) strength="Strong";
  else if(score>=40) strength="Medium";
  else if(score>=20) strength="Weak";

  const guesses=1e9;
  const seconds=Math.pow(2,entropy)/guesses;
  const crack=seconds>31536000?(seconds/31536000).toFixed(2)+" years":seconds.toFixed(2)+" seconds";

  document.getElementById("strength").textContent=strength;
  document.getElementById("score").textContent=score+"/100";
  document.getElementById("entropy").textContent=entropy.toFixed(2)+" bits";
  document.getElementById("crack").textContent=crack;
  document.getElementById("issues").textContent=issues.join(", ")||"None detected";
  document.getElementById("nist").textContent=score>=60?"Compliant":"Non‑compliant";

  log("Password analyzed → "+strength);
}
</script>

</body>
</html>
