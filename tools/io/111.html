    font-family: monospace;
    font-size: 14px;
    padding: 8px 15px;
    border-radius: 6px;
    border: 1px solid #00ff41;
    outline: none;
    cursor: pointer;
    background: rgba(0,0,0,0.8);
    color: #00ff41;
    transition: all 0.3s;
  }
  
  select {
    min-width: 160px;
  }
  
  input[type=button] {
    background: #00ff41;
    color: #000;
    font-weight: bold;
  }

    font-size: 14px;
    padding: 8px 15px;
    border-radius: 6px;
    border: 1px solid #00ff41;
    outline: none;
    background: rgba(0,0,0,0.8);
    color: #00ff41;
  }

    top: 0;
    z-index: 5;

    text-align: left;
    font-family: monospace;
  }
  
  th {
    color: #00ffff;
    text-transform: uppercase;
    font-weight: bold;
  }
  
  tbody tr {
    cursor: pointer;
    transition: all 0.2s;
  }
  
  tbody tr:hover {
    background: rgba(255,20,147,0.2);

    font-size: 13px;
    font-weight: bold;

    border-radius: 3px;
  }

    text-align: center;
    color: #00ff41;
    font-size: 15px;

  ];

  const CHANNEL_TYPES = [
    'Gaming', 'Vlogs', 'Music', 'Education', 'Tech', 'Cooking', 'Travel', 'Comedy', 'News', 'Sports',
    'Science', 'DIY', 'Lifestyle', 'Beauty', 'Automotive', 'Fitness', 'Film', 'Animation'
  ];

  let totalLogsGenerated = 0;
  let currentRegionMode = 'random';
  let allEntries = [];
  let countryList = Object.keys(COUNTRIES);

  function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function getRegionCode() {
    switch(currentRegionMode) {
      case 'manual':
        const manualInput = searchInput.value.toUpperCase().slice(0,2);
        return COUNTRIES[manualInput] ? manualInput : 'US';
      case 'usa': return 'US';
      case 'europe': 
        const euCountries = ['DE','FR','IT','ES','GB','NL','BE','SE','DK','FI','NO','PL','CZ','AT','CH'];
        return euCountries[Math.floor(Math.random() * euCountries.length)];
      case 'asia':
        const asiaCountries = ['JP','CN','IN','KR','SG','HK','MY','TH','VN','ID','PH','TW','AU'];
        return asiaCountries[Math.floor(Math.random() * asiaCountries.length)];
      default: // random global
        return countryList[Math.floor(Math.random() * countryList.length)];
    }
  }

  function generateRandomString(len, charset) {
    charset = charset || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < len; i++) result += charset.charAt(Math.floor(Math.random() * charset.length));
    return result;
  }

  function generateChannelID() {
    // YouTube Channel IDs are 24 characters, starting with UC
    return 'UC' + generateRandomString(22, 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_');
  }

  function generateHandle(firstName, lastName) {
    const patterns = [
      `@${firstName.toLowerCase()}${lastName.toLowerCase()}`,
      `@${firstName.toLowerCase()}_${lastName.toLowerCase()}`,
      `@${firstName.toLowerCase()}TV`,
      `@${lastName.toLowerCase()}Official`,
      `@${firstName[0].toLowerCase()}${lastName.toLowerCase()}`
    ];
    return patterns[Math.floor(Math.random() * patterns.length)];
  }

  function formatSubscribers() {
    const count = Math.floor(Math.random() * 10000000);
    if (count > 1000000) return (count / 1000000).toFixed(2) + 'M';
    if (count > 1000) return (count / 1000).toFixed(1) + 'K';
    return count.toString();
  }

  function createRow(entry) {
    const tr = document.createElement('tr');
    
    tr.innerHTML = `
      <td class="channel-name" title="Click to copy name">${entry.channelName}</td>
      <td><span class="handle">${entry.handle}</span></td>
      <td style="font-family: monospace; color: #888;">${entry.id}</td>
      <td><span class="country-flag">${entry.flag}</span>${entry.country}</td>
      <td class="highlight">${entry.category}</td>
      <td style="color: #ff0000; font-weight: bold;">${entry.subs}</td>
    `;
    
    tr.onclick = (e) => {
      if (e.target.closest('.channel-name') || e.target.closest('.handle')) {
        const text = e.target.closest('.channel-name') ? entry.channelName : entry.handle;
        navigator.clipboard.writeText(text);
        e.target.style.background = '#ff0000';
        setTimeout(() => e.target.style.background = '', 500);
      }
    };
    
    return tr;
  }

  function generateEntry() {
    const regionCode = getRegionCode();
    const regionData = COUNTRIES[regionCode] || COUNTRIES['US'];
    const first = FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
    const last = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)];
    
    return {
      channelName: `${first} ${last}`,
      handle: generateHandle(first, last),
      id: generateChannelID(),
      country: regionData.name,
      flag: regionData.flag,
      category: CHANNEL_TYPES[Math.floor(Math.random() * CHANNEL_TYPES.length)],
      subs: formatSubscribers()
    };
  }

  function updateTotalCount() {
    totalCount.textContent = `Total: ${totalLogsGenerated.toLocaleString()}`;
  }

  function loadMoreLogs() {
    if (totalLogsGenerated >= MAX_LOGS) {
      loadingIndicator.textContent = `⚠️ Max ${MAX_LOGS.toLocaleString()} records reached`;
      loadingIndicator.hidden = false;
      return;
    }
    loadingIndicator.hidden = false;
    
    requestAnimationFrame(() => {
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < BATCH_SIZE && totalLogsGenerated < MAX_LOGS; i++, totalLogsGenerated++) {
        const entry = generateEntry();
        allEntries.push(entry);
        fragment.appendChild(createRow(entry));
      }
      logBody.appendChild(fragment);
      loadingIndicator.hidden = true;
      updateTotalCount();
      updateAriaRowCount();
    });
  }

  function resetLogs() {
    totalLogsGenerated = 0;
    allEntries = [];
    logBody.innerHTML = '';
    loadingIndicator.hidden = true;
    updateTotalCount();
    updateAriaRowCount();
  }

  function filterLogs() {
    const filter = searchInput.value.toLowerCase();
    if (!filter) {
      [...logBody.children].forEach(tr => tr.style.display = "");
      return;
    }
    [...logBody.children].forEach(tr => {
      const haystack = tr.textContent.toLowerCase();
      tr.style.display = haystack.includes(filter) ? "" : "none";
    });
  }

  function updateAriaRowCount() {
    logBody.parentElement.setAttribute('aria-rowcount', logBody.children.length);
  }

  // Event Listeners
  logContainer.addEventListener('scroll', () => {
    if (loadingIndicator.hidden &&
        logContainer.scrollTop + logContainer.clientHeight >= logContainer.scrollHeight - 100 &&
        !searchInput.value.trim()) {
      loadMoreLogs();
    }
  });

  generateBtn.addEventListener('click', () => {
    currentRegionMode = regionModeEl.value;
    if (currentRegionMode === 'manual' && !searchInput.value.trim()) {
      currentRegionMode = 'random';
    }
    resetLogs();
    loadMoreLogs();
    searchInput.value = '';
  });

  searchInput.addEventListener('input', () => {
    filterLogs();
  });

  downloadBtn.addEventListener('click', () => {
    const csvData = allEntries.map(e => 
      `"${e.channelName}","${e.handle}","${e.id}","${e.country}","${e.category}","${e.subs}"`
    ).join('\n');
    
    const csvBlob = new Blob([`Channel Name,Handle,Channel ID,Region,Category,Subscribers\n${csvData}`], 
      {type: 'text/csv;charset=utf-8;'});
    
    const csvLink = document.createElement('a');
    csvLink.href = URL.createObjectURL(csvBlob);
    csvLink.download = `youtube_creators_${currentRegionMode}_${Date.now()}.csv`;
    csvLink.style.display = 'none';
    document.body.appendChild(csvLink);
    csvLink.click();
    document.body.removeChild(csvLink);
  });

  // Initialize
  updateTotalCount();
  loadMoreLogs();
  
  // Update country list for random mode
  setInterval(() => {
    if (currentRegionMode === 'random') {
      countryList = shuffleArray(Object.keys(COUNTRIES));
    }
  }, 5000);

})();
