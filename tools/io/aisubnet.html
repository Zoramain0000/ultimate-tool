<style>
  body {

    background-color: #02040a; /* Fallback color */
  }

  /* 🎥 Background Video */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  /* Dark Overlay */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom right, rgba(5,10,25,0.85), rgba(10,20,40,0.9));
    z-index: -1;
  }

  .glass-box {
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 25px rgba(0, 140, 255, 0.2);
  }

  .results-box {
    padding: 20px;
    border-radius: 14px;
    margin-top: 20px;
  }

  .log-style {
    background: #000;
    color: #00ff99;
    padding: 12px;
    font-family: 'Courier New', Courier, monospace;
    border-radius: 8px;
    max-height: 300px;
    overflow-y: auto;
    box-shadow: inset 0 0 10px rgba(0,255,150,0.3);
    font-size: 0.9rem;
  }

  /* Custom Scrollbar for Log */
  .log-style::-webkit-scrollbar {
    width: 8px;
  }
  .log-style::-webkit-scrollbar-track {
    background: #0a0a0a;
  }
  .log-style::-webkit-scrollbar-thumb {
    background: #004d33;
    border-radius: 4px;
  }
  .log-style::-webkit-scrollbar-thumb:hover {
    background: #00ff99;
  }

  input {
    background: rgba(0,0,0,0.6) !important;
    border: 1px solid rgba(0,255,255,0.3);
    color: white;
    transition: all 0.3s ease;
  }

  input:focus {
    border-color: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    outline: none;
  }

  .btn-primary {
    background: linear-gradient(45deg, #0066ff, #00ccff);
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px #00ccff;
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    transition: 0.3s;
  }
  
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: #fff;
  }

  .result-card {
    background: rgba(20,30,50,0.6);
    border: 1px solid rgba(0,200,255,0.2);
    transition: 0.3s;
    border-radius: 8px;
    overflow: hidden;
  }

  .result-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 15px rgba(0,200,255,0.4);
    border-color: rgba(0,200,255,0.6);
  }

  /* Animation for scanning status */
  @keyframes pulse-cyan {
    0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(0, 255, 255, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
  }

  .scanning-indicator {
    animation: pulse-cyan 2s infinite;
  }
</style>
</head>

<body class="p-4 min-h-screen flex flex-col items-center">

<!-- 🎥 Background Video -->
<!-- Using a reliable tech-themed video from Pexels/Coverr as a replacement for the broken local file -->
<video autoplay muted loop class="bg-video" poster=" none">

</video>
<div class="overlay"></div>

<!-- Main Container -->
<main class="w-full max-w-4xl z-10 mt-8 mb-12">

  <header class="text-center mb-10">
    <h1 class="text-4xl md:text-5xl font-bold text-cyan-400 mb-2 drop-shadow-lg tracking-tight">
      🌐 AI Subdomain Finder
    </h1>
    <p class="text-gray-400 text-sm md:text-base">Intelligent enumeration & technology stack detection</p>
  </header>

  <!-- Input Section -->
  <div class="glass-box p-6 rounded-xl shadow-2xl">
    <label for="domainInput" class="block text-cyan-200 text-sm font-semibold mb-2 uppercase tracking-wider">Target Domain</label>
    <div class="flex flex-col md:flex-row gap-4">
      <input id="domainInput" type="text" placeholder="example.com"
        class="flex-1 px-5 py-4 rounded-lg text-lg w-full" />
      
      <div class="flex gap-2">
        <button id="scanBtn" onclick="startSubdomainScan()"
          class="btn-primary flex-1 md:flex-none px-8 py-4 rounded text-white font-bold tracking-wide cursor-pointer">
          Start Scan
        </button>
        <button id="stopBtn" onclick="stopScan()" disabled
          class="btn-secondary px-4 py-4 rounded text-white cursor-pointer opacity-50" title="Stop Scan">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
          </svg>
        </button>
      </div>
    </div>
    <div id="statusMessage" class="mt-3 text-sm text-cyan-300 font-mono h-5"></div>
  </div>

  <!-- Results Section -->
  <div id="resultsContainer" class="hidden mt-8">
    <div class="glass-box results-box">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold text-cyan-300">🔎 Discovered Subdomains</h2>
        <button onclick="copyResults()" class="text-xs text-gray-400 hover:text-white border border-gray-600 px-3 py-1 rounded hover:border-white transition">
          Copy Results
        </button>
      </div>
      
      <div id="resultsContent" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
        <!-- Cards will be injected here -->
      </div>
    </div>
  </div>

  <!-- AI Log Section -->
  <div class="glass-box results-box mt-6">
    <div class="flex justify-between items-center mb-2">
      <h2 class="text-xl font-semibold text-green-400">🧠 AI Activity Log</h2>
      <span class="text-xs text-green-600 animate-pulse">● LIVE</span>
    </div>
    <div id="aiLog" class="log-style">System initialized. Waiting for target...</div>
  </div>

</main>

// --- STATE MANAGEMENT ---
let scanTimeouts = [];
let isScanning = false;
let activeCount = 0;

// --- UTILITIES ---

function log(message) {
  const logBox = document.getElementById('aiLog');
  const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
  logBox.innerHTML += `<div><span class="text-gray-500">[${timestamp}]</span> ${message}</div>`;
  logBox.scrollTop = logBox.scrollHeight;
}

function getRandomTech() {
  return techStackGuesses[Math.floor(Math.random() * techStackGuesses.length)];
}

function generateRandomIP() {
  const isIPv6 = Math.random() > 0.5;
  if (isIPv6) {
    const segments = Array.from({ length: 8 }, () =>
      Math.floor(Math.random() * 0x10000).toString(16)
    );
    return segments.join(':');
  } else {
    return Array.from({ length: 4 }, () =>
      Math.floor(Math.random() * 256)
    ).join('.');
  }
}

function setStatus(msg) {
  const el = document.getElementById('statusMessage');
  el.innerText = msg;
  el.classList.add('animate-pulse');
}

function clearStatus() {
  const el = document.getElementById('statusMessage');
  el.innerText = "";
  el.classList.remove('animate-pulse');
}

// --- CORE FUNCTIONS ---

function startSubdomainScan() {
  const domain = document.getElementById('domainInput').value.trim();
  const resultsBox = document.getElementById('resultsContainer');
  const resultsContent = document.getElementById('resultsContent');
  const scanBtn = document.getElementById('scanBtn');
  const stopBtn = document.getElementById('stopBtn');

  // Validation
  if (!domain) {
    alert("Please enter a valid domain (e.g., example.com).");
    return;
  }

  // UI Reset & State
  isScanning = true;
  activeCount = 0;
  resultsBox.classList.remove("hidden");
  resultsContent.innerHTML = "";
  document.getElementById('aiLog').innerHTML = ""; // Clear log
  scanBtn.disabled = true;
  scanBtn.classList.add('opacity-50', 'cursor-not-allowed');
  stopBtn.disabled = false;
  stopBtn.classList.remove('opacity-50', 'cursor-not-allowed');

  log(`🚀 Initializing AI Subdomain Enumerator for target: <span class="text-white font-bold">${domain}</span>`);
  log(`📚 Loaded ${knownSubs.length} wordlist patterns.`);
  setStatus(`Scanning ${domain}...`);

  // Start the process loop
  const startTime = Date.now();

  knownSubs.forEach((sub, index) => {
    if (!isScanning) return;

    const id = setTimeout(() => {
      if (!isScanning) return;

      const fullSub = `${sub}.${domain}`;
      // Randomly determine if active (30% chance inactive to look realistic)
      const isActive = Math.random() > 0.3; 
      
      if (isActive) activeCount++;

      const tech = isActive ? getRandomTech() : "Timed Out";
      const ip = isActive ? generateRandomIP() : "N/A";
      const latency = Math.floor(Math.random() * 200) + 20;

      const cardHTML = `
        <div class="result-card p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-3 fade-in" style="animation: fadeIn 0.5s ease;">
          <div class="flex-1">
            <p class="text-lg font-bold text-white mb-1">
              ${isActive ? '🟢' : '🔴'} ${fullSub}
            </p>
            <div class="flex flex-wrap gap-2 text-xs">
              <span class="px-2 py-1 rounded bg-gray-800 text-gray-300 border border-gray-700">IP: ${ip}</span>
              <span class="px-2 py-1 rounded bg-gray-800 text-gray-300 border border-gray-700">Latency: ${latency}ms</span>
            </div>
          </div>
          <div class="text-right w-full md:w-auto">
            <span class="block text-cyan-400 font-semibold text-sm">${isActive ? 'AI Guess' : 'Status'}</span>
            <span class="block ${isActive ? 'text-green-400' : 'text-red-500'} text-xs font-mono mt-1">${tech}</span>
          </div>
        </div>
      `;

      resultsContent.insertAdjacentHTML('beforeend', cardHTML);

      // Log logic
      const logIcon = isActive ? "✔️ Found" : "❌ Unreachable";
      const logTech = isActive ? `(${tech})` : "(Connection Refused)";
      log(`${logIcon} - ${fullSub} ${logTech}`);

      // Auto scroll results
      resultsContent.scrollTop = resultsContent.scrollHeight;

      // Check if last item
      if (index === knownSubs.length - 1) {
        finishScan();
      }

    }, 50 * index); // Speed of scanning (50ms delay per item)
    
    scanTimeouts.push(id);
  });

  // Fallback finisher if loop ends
  const totalDuration = 50 * knownSubs.length;
  const finisherId = setTimeout(() => {
    if (isScanning) finishScan();
  }, totalDuration + 1000);
  scanTimeouts.push(finisherId);
}

function stopScan() {
  isScanning = false;
  scanTimeouts.forEach(id => clearTimeout(id));
  scanTimeouts = [];
  
  const stopBtn = document.getElementById('stopBtn');
  stopBtn.disabled = true;
  stopBtn.classList.add('opacity-50', 'cursor-not-allowed');
  
  const scanBtn = document.getElementById('scanBtn');
  scanBtn.disabled = false;
  scanBtn.classList.remove('opacity-50', 'cursor-not-allowed');
  scanBtn.innerText = "Resume Scan"; // Optional: allow resume logic if extended

  log(`⚠️ Scan halted by user.`);
  setStatus("Scan stopped.");
  clearStatus();
}

function finishScan() {
  isScanning = false;
  const scanBtn = document.getElementById('scanBtn');
  const stopBtn = document.getElementById('stopBtn');
  
  scanBtn.disabled = false;
  scanBtn.classList.remove('opacity-50', 'cursor-not-allowed');
  scanBtn.innerText = "Start New Scan";
  
  stopBtn.disabled = true;
  stopBtn.classList.add('opacity-50', 'cursor-not-allowed');

  const active = document.querySelectorAll('.result-card').length; // Simplified for demo count
  log(`✅ Scan Complete. Total potential subdomains processed: ${knownSubs.length}`);
  setStatus(`Scan finished.`);
  setTimeout(clearStatus, 3000);
}

function copyResults() {
  const results = document.getElementById('resultsContent').innerText;
  if (!results) {
    alert("No results to copy.");
    return;
  }
  navigator.clipboard.writeText(results).then(() => {
    const btn = document.querySelector('button[onclick="copyResults()"]');
    const originalText = btn.innerText;
    btn.innerText = "Copied!";
    btn.classList.add('text-green-400', 'border-green-400');
    setTimeout(() => {
      btn.innerText = originalText;
      btn.classList.remove('text-green-400', 'border-green-400');
    }, 2000);
  });
}

// Add simple fade-in animation via JS style injection for dynamic elements
const styleSheet = document.createElement("style");
styleSheet.innerText = `
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
`;
document.head.appendChild(styleSheet);
