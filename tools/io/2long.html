<script>
/**
 * ------------------------------------------------------------------
 * MAIN APPLICATION LOGIC
 * ------------------------------------------------------------------
 */
(() => {
const countries = [
    "United States", "Canada", "United Kingdom", "Germany", "France", "Australia", "India",
    "Brazil", "Japan", "Russia", "China", "Mexico", "Italy", "South Korea", "Netherlands",
    "Spain", "Sweden", "Norway", "Poland", "Turkey", "South Africa", "Argentina", "Belgium",
    "Switzerland", "New Zealand", "Singapore", "Malaysia", "Thailand", "Indonesia", "Vietnam",
    "Ireland", "Czech Republic", "Portugal", "Greece", "Finland", "Denmark", "Colombia",
    "Chile", "Egypt", "United Arab Emirates", "Saudi Arabia", "Israel", "Philippines",
    "Hungary", "Romania", "Ukraine", "Pakistan", "Bangladesh", "Morocco", "Algeria", "Angola",
    "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan", "Bahamas", "Bahrain",
    "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia",
    "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso",
    "Burundi", "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic",
    "Chad", "Chile", "Colombia", "Comoros", "Congo", "Costa Rica", "Croatia", "Cuba",
    "Cyprus", "Czech Republic", "Democratic Republic of the Congo", "Denmark", "Djibouti",
    "Dominica", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea",
    "Eritrea", "Estonia", "Eswatini", "Ethiopia", "Fiji", "Finland", "France", "Gabon",
    "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau",
    "Guyana", "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran",
    "Iraq", "Ireland", "Israel", "Italy", "Jamaica", "Japan", "Jordan", "Kazakhstan",
    "Kenya", "Kiribati", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho",
    "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg", "Madagascar", "Malawi",
    "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania", "Mauritius",
    "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco",
    "Mozambique", "Myanmar", "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand",
    "Nicaragua", "Niger", "Nigeria", "North Macedonia", "Norway", "Oman", "Pakistan",
    "Palau", "Palestine", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines",
    "Poland", "Portugal", "Qatar", "Romania", "Russia", "Rwanda", "Saint Kitts and Nevis",
    "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Sao Tome and Principe",
    "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia",
    "Slovenia", "Solomon Islands", "Somalia", "South Africa", "South Korea", "South Sudan",
    "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria", "Tajikistan",
    "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia",
    "Turkey", "Turkmenistan", "Tuvalu", "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom",
    "United States", "Uruguay", "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam",
    "Yemen", "Zambia", "Zimbabwe"
  ];

const categories = {
  network: ["TCP SYN","UDP Packet","DNS Query","ARP Request","ICMP Ping"],
  security: ["LOGIN SUCCESS","LOGIN FAILED","BRUTE FORCE","SQL INJECT","XSS ATTEMPT"],
  firewall: ["DENY TCP","ALLOW UDP","DROP PORT ","BLOCK ","REJECT ICMP"],
  web: ["GET /index.html","POST /login","404 NOT FOUND","500 ERROR","HEAD /api", "200 OK "],
  system: ["USER LOGIN","FILE ACCESS","SERVICE START","PROCESS KILL","DISK FULL"]
};

const elements = {
  countrySelect: document.getElementById('countrySelect'),
  categorySelect: document.getElementById('categorySelect'),
  ipTypeSelect: document.getElementById('ipTypeSelect'),
  portRangeSelect: document.getElementById('portRangeSelect'),
  generateBtn: document.getElementById('generateBtn'),
  searchInput: document.getElementById('searchInput'),
  logBody: document.getElementById('logBody'),
  logContainer: document.getElementById('logContainer'),
  loadingIndicator: document.getElementById('loadingIndicator'),
  downloadBtn: document.getElementById('downloadBtn'),
  
  // Modal Elements
  qrModal: document.getElementById('qrModal'),
  qrImageContainer: document.getElementById('qrImageContainer'),
  qrDiv: document.getElementById('qrcode'), // Target div for Cloudflare lib
  qrDetails: document.getElementById('qrDetails'),
  qrStatus: document.getElementById('qrStatus'),
  qrSizeSelector: document.getElementById('qrSizeSelector'),
  btnHide: document.getElementById('btnHide'),
  btnShow: document.getElementById('btnShow'),
  btnDownloadQR: document.getElementById('btnDownloadQR'),
  btnExit: document.getElementById('btnExit'),
};

let isQRHidden = false;
let qrCounter = 0;
let allEntries = [];
let currentCountry = null;
let currentQRData = null;
let qrCodeObj = null; // Store the qrcode.js instance

function populateCountries() { 
  countries.forEach(c => {
    const o = document.createElement('option'); 
    o.value = c; 
    o.textContent = c; 
    elements.countrySelect.appendChild(o); 
  }); 
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generateAddress(type) {
  switch(type) {
    case 'ipv1': return `${randInt(0,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(0,255)}`; 
    case 'ipv2': return `${randInt(0,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(0,255)}`; 
    case 'ipv3': return `${randInt(0,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(0,255)}`; 
    case 'ipv4': return `${randInt(1,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(1,254)}`;
    case 'ipv5': return `${randInt(1,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(1,254)}:${randInt(0,65535)}`; 
    case 'ipv6': return `${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}`;
    case 'ipv7': return `7::${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}`; 
    case 'ipv8': return `8::${randInt(1000,9999).toString(16)}:${randInt(1000,9999).toString(16)}::${randInt(1,65535)}`; 
    case 'ipv9': return `9::${randInt(100,999)}:${randInt(1000,9999).toString(16)}::${randInt(1,65535)}`; 
    case 'mac': return Array(6).fill().map(() => randInt(0,255).toString(16).padStart(2,'0')).join(':');
    default: return '0.0.0.0';
  }
}

function randomPort() { 
  const range = elements.portRangeSelect.value;
  if (range === 'wellknown') {
    return randInt(1, 1024);
  } else {
    return randInt(1, 65535);
  }
}

function randomDate() { 
  const y = 2024 + randInt(0,2), m = randInt(1,12), d = randInt(1,28); 
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; 
}

function randomTime() { 
  const h = randInt(0,23), m = randInt(0,59), s = randInt(0,59); 
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; 
}

function generateUserAgent() {
  return `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/116.0.0.0 Safari/537.36`;
}

function randomEvent() {
  const cat = elements.categorySelect.value;
  return categories[cat][randInt(0, categories[cat].length - 1)];
}

const BATCH_SIZE = 1000, MAX_LOGS = 99999999999;
let totalLogsGenerated = 0;

function createRow(entry) {
  const tr = document.createElement('tr');
  tr.className = 'clickable';
  tr.dataset.entry = JSON.stringify(entry);
  tr.innerHTML = `
    <td>${entry.primaryAddress}</td>
    <td>${entry.secondaryAddress}</td>
    <td>${entry.mac}</td>
    <td>${entry.port}</td>
    <td>${entry.country}</td>
    <td>${entry.date}</td>
    <td>${entry.time}</td>
    <td>${entry.userAgent}</td>
    <td>${entry.event}</td>
  `;
  return tr;
}

function generateLogEntryForCountry(country) {
  const ipType = elements.ipTypeSelect.value;
  const primaryAddress = generateAddress(ipType);
  const secondaryAddress = ipType === 'mac' ? generateAddress('ipv4') : generateAddress('mac');
  
  return {
    primaryAddress,
    secondaryAddress,
    mac: ipType === 'mac' ? primaryAddress : generateAddress('mac'),
    port: randomPort(),
    country,
    date: randomDate(),
    time: randomTime(),
    userAgent: generateUserAgent(),
    event: randomEvent()
  };
}

function loadMoreLogs() {
  if(totalLogsGenerated >= MAX_LOGS) {
    elements.loadingIndicator.textContent = "End of logs reached.";
    elements.loadingIndicator.hidden = false;
    return;
  }
  elements.loadingIndicator.hidden = false;
  setTimeout(() => {
    const fragment = document.createDocumentFragment();
    for(let i = 0; i < BATCH_SIZE && totalLogsGenerated < MAX_LOGS; i++, totalLogsGenerated++) {
      const entry = generateLogEntryForCountry(currentCountry);
      allEntries.push(entry);
      fragment.appendChild(createRow(entry));
    }
    elements.logBody.appendChild(fragment);
    elements.loadingIndicator.hidden = true;
  }, 100);
}

function resetLogs() {
  totalLogsGenerated = 0;
  allEntries = [];
  elements.logBody.innerHTML = '';
  elements.loadingIndicator.hidden = true;
}

function filterLogs() {
  const filter = elements.searchInput.value.toLowerCase();
  [...elements.logBody.children].forEach(tr => {
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(filter) ? "" : "none";
  });
}

// ✅ CLOUDFLARED QR GENERATION (Using qrcode.js)
function generateQRImage() {
    if (!currentQRData) return;

    qrCounter++;
    const size = parseInt(elements.qrSizeSelector.value);
    
    // Clear previous QR code
    elements.qrDiv.innerHTML = "";
    
    // Update container dimensions to match QR size
    elements.qrImageContainer.style.width = (size + 20) + 'px'; // +20 for padding
    elements.qrImageContainer.style.height = (size + 20) + 'px';
    
    elements.qrStatus.textContent = `Generating Authentic QR #${qrCounter}...`;
    
    try {
        // Create new QR Code using Cloudflare library
        qrCodeObj = new QRCode(elements.qrDiv, {
            text: currentQRData,
            width: size,
            height: size,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
        
        elements.qrStatus.textContent = `✅ Authentic QR #${qrCounter} READY`;
    } catch (e) {
        console.error("QR Generation Error:", e);
        elements.qrStatus.textContent = "❌ Generation Failed";
    }
}

function showQRModal(entry) {
  const timestamp = new Date().toISOString();
  currentQRData = `LogID:${qrCounter+1}\nIP:${entry.primaryAddress}\nMAC:${entry.mac}\nPort:${entry.port}\nCN:${entry.country}\nDT:${entry.date} ${entry.time}\nEV:${entry.event}`;
  
  elements.qrDetails.textContent = currentQRData;
  
  // Show modal
  elements.qrModal.style.display = 'flex';
  setTimeout(() => elements.qrModal.classList.add('active'), 10);
  
  // Reset UI state
  elements.qrModalContent.classList.remove('qr-hidden');
  elements.btnHide.style.display = 'inline-block';
  elements.btnShow.style.display = 'none';
  
  // Generate the QR
  generateQRImage();
}

// ✅ EVENT LISTENERS
elements.generateBtn.onclick = () => {
  currentCountry = elements.countrySelect.value;
  resetLogs();
  loadMoreLogs();
};

elements.logContainer.onscroll = () => {
  if(!elements.loadingIndicator.hidden || elements.searchInput.value.trim()) return;
  if(elements.logContainer.scrollTop + elements.logContainer.clientHeight >= elements.logContainer.scrollHeight - 50) {
    loadMoreLogs();
  }
};

// Table Row Click (Delegation)
elements.logBody.addEventListener('click', (e) => {
  const tr = e.target.closest('tr');
  if (tr && tr.classList.contains('clickable')) {
    try {
      const entry = JSON.parse(tr.dataset.entry);
      showQRModal(entry);
    } catch(err) {
      console.error("Failed to parse entry", err);
    }
  }
});

// Resize Listener
elements.qrSizeSelector.addEventListener('change', () => {
    generateQRImage();
});

// Modal Controls
elements.btnHide.onclick = () => {
  elements.qrModalContent.classList.add('qr-hidden');
  elements.btnHide.style.display = 'none';
  elements.btnShow.style.display = 'inline-block';
};

elements.btnShow.onclick = () => {
  elements.qrModalContent.classList.remove('qr-hidden');
  elements.btnHide.style.display = 'inline-block';
  elements.btnShow.style.display = 'none';
};

elements.btnDownloadQR.onclick = () => {
    // Find the img generated by qrcode.js
    const img = elements.qrDiv.querySelector('img');
    if (img) {
        const link = document.createElement('a');
        link.download = `AUTH-QR-${Date.now()}.png`;
        link.href = img.src;
        link.click();
    } else {
        alert("QR Code image not ready.");
    }
};

function closeModal() {
  elements.qrModal.classList.remove('active');
  setTimeout(() => {
      elements.qrModal.style.display = 'none';
      currentQRData = null;
      // Clear QR code on close to save memory
      elements.qrDiv.innerHTML = "";
  }, 300);
}

elements.btnExit.onclick = closeModal;
elements.qrModal.onclick = (e) => {
  if(e.target === elements.qrModal) closeModal();
};

// Other Listeners
elements.searchInput.oninput = filterLogs;
elements.downloadBtn.onclick = () => {
  const csv = "Primary,Secondary,MAC,Port,Country,Date,Time,User-Agent,Event\n" + 
    allEntries.map(e => `"${e.primaryAddress}","${e.secondaryAddress}","${e.mac}",${e.port},"${e.country}","${e.date}","${e.time}","${e.userAgent}","${e.event}"`).join("\n");
  const link = document.createElement("a");
  link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  link.download = `logs-${Date.now()}.csv`;
  link.click();
};

// Initialize
populateCountries();
elements.countrySelect.value = 'United States';
currentCountry = 'United States';
loadMoreLogs();
})();
</script>
</body>
</html>
