<style>
  /* General styling */
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Consolas', monospace;
    height: 100%;
    color: gray;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Background video */
  #bgVideo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: brightness(0.2);
  }

  header {
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    background: rgba(0,0,0,0.5);
    align-items: center;
    z-index: 2;
  }

  label {
    font-weight: bold;
    font-size: 14px;
  }

  select, input[type=text], input[type=button] {
    font-family: monospace;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 4px;
    border: none;
    outline: none;
  }

  select, input[type=text] {
    background: rgba(0,0,0,0.5);
    color: gray;
  }

  input[type=button] {
    background: gray;
    color: white;
    cursor: pointer;
  }

  input[type=button]:hover {
    background: rgba(0,0,0,0.5);
  }

  #logContainer {
    flex-grow: 1;
    overflow-y: auto;
    background: rgba(0,0,0,0.5);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead tr {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2;
  }

  th, td {
    padding: 8px 12px;
    border-bottom: 1px solid #333;
    white-space: nowrap;
    text-align: left;
  }

  tbody tr:hover {
    background: #333;
  }

  #loadingIndicator {
    padding: 10px 0;
    text-align: center;
    color: gray;
    font-style: italic;
  }

  @media (max-width: 600px) {
    th, td { padding: 6px 8px; font-size: 11px; }
    select, input[type=text], input[type=button] { font-size: 12px; padding: 5px 10px; }
  }
</style>

  "Douglas", "Schneider", "Joseph", "Barrett", "Navarro", "Figueroa", "Keller", "Avila", "Wade", "Molina",
  "Stanley", "Hopkins", "Campos", "Barnett", "Bates", "Chambers", "Caldwell", "Beck", "Lambert", "Miranda",
  "Byrd", "Craig", "Ayala", "Lowe", "Frazier", "Powers", "Neal", "Leonard", "Gregory", "Carrillo",
  "Sutton", "Fleming", "Rhodes", "Shelton", "Schwartz", "Norris", "Jennings", "Watts", "Duran", "Walters",
  "Cohen", "Mcdaniel", "Moran", "Parks", "Steele", "Vaughn", "Becker", "Holt", "Deleon", "Barker",
  "Terry", "Hale", "Leon", "Hail", "Baldwin", "Kirk", "Underwood", "Wilkins", "Gaines", "Madden"
];

  const countrySelect = document.getElementById('countrySelect');
  const typeSelect = document.getElementById('typeSelect');
  const generateBtn = document.getElementById('generateBtn');
  const searchInput = document.getElementById('searchInput');
  const logBody = document.getElementById('logBody');
  const logContainer = document.getElementById('logContainer');
  const loadingIndicator = document.getElementById('loadingIndicator');
  const downloadBtn = document.getElementById('downloadBtn');

  function populateCountries() {
    countries.forEach(c => {
      const option = document.createElement('option');
      option.value = c;
      option.textContent = c;
      countrySelect.appendChild(option);
    });
  }

  function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

  function randomIPv4(){return `${randInt(1,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(1,254)}`;}
  function randomIPv6(){return Array.from({length:8},()=>randInt(0,65535).toString(16)).join(":");}
  function randomMAC(){return Array.from({length:6},()=>randInt(0,255).toString(16).padStart(2,'0')).join(":");}
  function randomFullName(){return `${firstNames[randInt(0,firstNames.length-1)]} ${lastNames[randInt(0,lastNames.length-1)]}`;}
  function randomEmail(){ 
    const first = firstNames[randInt(0, firstNames.length-1)].toLowerCase();
    const last = lastNames[randInt(0, lastNames.length-1)].toLowerCase();
    const provider = ["gmail.com","yahoo.com","outlook.com","protonmail.com"];
    return `${first}.${last}${randInt(1,9999)}@${provider[randInt(0,provider.length-1)]}`;
  }
  function randomDate(){const y=2022,m=randInt(1,12),d=randInt(1,28);return `${y}-${m.toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;}
  function randomTime(){return `${randInt(0,23).toString().padStart(2,'0')}:${randInt(0,59).toString().padStart(2,'0')}:${randInt(0,59).toString().padStart(2,'0')}`;}

  function createRow(entry){
    const tr = document.createElement('tr');
    tr.innerHTML=`<td>${entry.value}</td><td>${entry.country}</td><td>${entry.date}</td><td>${entry.time}</td><td>${entry.details}</td>`;
    return tr;
  }

  const BATCH_SIZE = 50, MAX_LOGS = 1000000;
  let totalLogsGenerated=0, currentCountry=null, allEntries=[];

  function generateLogEntry(type,country){
    let value="", details="";
    switch(type){
      case "ipv4": value=randomIPv4(); details="IPv4 Address"; break;
      case "ipv6": value=randomIPv6(); details="IPv6 Address"; break;
      case "mac": value=randomMAC(); details="MAC Address"; break;
      case "email": value=randomEmail(); details=randomFullName(); break;
    }
    return {value, country, date:randomDate(), time:randomTime(), details};
  }

  function loadMoreLogs(){
    if(totalLogsGenerated>=MAX_LOGS){loadingIndicator.textContent="End of logs reached.";loadingIndicator.hidden=false;return;}
    loadingIndicator.hidden=false;
    setTimeout(()=>{
      const fragment=document.createDocumentFragment();
      for(let i=0;i<BATCH_SIZE && totalLogsGenerated<MAX_LOGS;i++,totalLogsGenerated++){
        const entry=generateLogEntry(typeSelect.value,currentCountry);
        allEntries.push(entry);
        fragment.appendChild(createRow(entry));
      }
      logBody.appendChild(fragment);
      loadingIndicator.hidden=true;
      updateAriaRowCount();
    },50);
  }

  function resetLogs(){totalLogsGenerated=0; allEntries=[]; logBody.innerHTML=''; loadingIndicator.textContent='Loading...'; loadingIndicator.hidden=true; updateAriaRowCount();}

  function filterLogs(){const filter=searchInput.value.toLowerCase(); [...logBody.children].forEach(tr=>{tr.style.display=tr.textContent.toLowerCase().includes(filter)?"":"none";});}
  function updateAriaRowCount(){logBody.parentElement.setAttribute('aria-rowcount',logBody.children.length);}

  logContainer.addEventListener('scroll',()=>{if(loadingIndicator.hidden&&(logContainer.scrollTop+logContainer.clientHeight>=logContainer.scrollHeight-50)&&searchInput.value.trim()==='') loadMoreLogs();});
  generateBtn.addEventListener('click',()=>{const selected=countrySelect.value;if(!selected)return alert('Select a country first.');currentCountry=selected; resetLogs(); loadMoreLogs(); searchInput.value='';});
  searchInput.addEventListener('input',()=>filterLogs());
  downloadBtn.addEventListener('click',()=>{
    const csv="data:text/csv;charset=utf-8,"+"Value,Country,Date,Time,Details\n"+allEntries.map(e=>`${e.value},${e.country},${e.date},${e.time},${e.details}`).join("\n");
    const link=document.createElement("a"); link.setAttribute("href",encodeURI(csv)); link.setAttribute("download","logs.csv");
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  });

  populateCountries(); if(countries.length>0){countrySelect.value=countries[0];currentCountry=countries[0];}
  loadMoreLogs();

})();
</script>

</body>
</html>
