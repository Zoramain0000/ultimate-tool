<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • IPv4 / IPv6 Validator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  color:#d1d1d1;
  overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.3);
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;
  text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{
  letter-spacing:2px;
  font-size:20px;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.9);
}

.section{
  border-left:4px solid #333;
  padding-left:15px;
  margin-bottom:20px;
}

.section h2{
  font-size:16px;
  margin-bottom:10px;
  color:#9f9f9f;
}

input,button{
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:1px solid #333;
  border-radius:6px;
  margin-bottom:10px;
}

button:hover{
  background:#111;
  cursor:pointer;
}

.result{
  background:black;
  padding:12px;
  border-radius:6px;
  font-family:monospace;
  font-size:13px;
  color:#8aff8a;
  border:1px solid #222;
  white-space:pre-wrap;
}
.error{color:#ff6b6b}
.warn{color:#ffd166}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • IPv4 / IPv6 VALIDATOR</h1>
</header>

<div class="container">

<div class="section">
  <h2>IP Address / CIDR Input</h2>
  <input id="ipInput" placeholder="IPv4, IPv6, or CIDR (e.g. 192.168.1.1, 2001:db8::/32)">
  <button onclick="validateIP()">Validate</button>
</div>

<div class="section">
  <h2>Validation Result</h2>
  <div id="output" class="result">Waiting for input…</div>
</div>

</div>

<script>
function validateIP(){
  const input = document.getElementById("ipInput").value.trim();
  const out = document.getElementById("output");
  if(!input){ out.textContent="No input"; return; }

  const result = [];
  const [ip, cidr] = input.split("/");

  function isIPv4(ip){
    const parts = ip.split(".");
    if(parts.length!==4) return false;
    return parts.every(n=> /^\d+$/.test(n) && Number(n)>=0 && Number(n)<=255 );
  }

  function isIPv6(ip){
    // simple check, allows compressed forms
    const blocks = ip.split(":");
    if(blocks.length<3 || blocks.length>8) return false;
    return blocks.every(b=>b==="" || /^[0-9a-f]{1,4}$/i.test(b));
  }

  /* IPv4 CIDR check */
  if(isIPv4(ip) && cidr!==undefined){
    const n=parseInt(cidr);
    if(n>=0 && n<=32){
      result.push("✔ Valid IPv4 CIDR");
      classifyIPv4(ip,result);
    } else{
      out.innerHTML="<span class='error'>✖ Invalid IPv4 CIDR prefix</span>";
      return;
    }
  }
  /* IPv6 CIDR check */
  else if(isIPv6(ip) && cidr!==undefined){
    const n=parseInt(cidr);
    if(n>=0 && n<=128){
      result.push("✔ Valid IPv6 CIDR");
      classifyIPv6(ip,result);
    } else{
      out.innerHTML="<span class='error'>✖ Invalid IPv6 CIDR prefix</span>";
      return;
    }
  }
  /* Plain IPv4 */
  else if(isIPv4(ip)){
    result.push("✔ Valid IPv4");
    classifyIPv4(ip,result);
  }
  /* Plain IPv6 */
  else if(isIPv6(ip)){
    result.push("✔ Valid IPv6");
    classifyIPv6(ip,result);
  }
  else{
    out.innerHTML="<span class='error'>✖ Invalid IP format</span>";
    return;
  }

  out.innerHTML=result.join("\n");
}

function classifyIPv4(ip,result){
  const oct = ip.split(".").map(Number);
  if(oct[0]===10 || (oct[0]===192 && oct[1]===168) || (oct[0]===172 && oct[1]>=16 && oct[1]<=31))
    result.push("⚠ Private IPv4");
  if(oct[0]===127) result.push("⚠ Loopback IPv4");
  if(oct[0]>=224 && oct[0]<=239) result.push("⚠ Multicast IPv4");
}

function classifyIPv6(ip,result){
  if(ip==="::1") result.push("⚠ Loopback IPv6");
  if(ip.toLowerCase().startsWith("fe80")) result.push("⚠ Link-local IPv6");
  if(ip.toLowerCase().startsWith("fc") || ip.toLowerCase().startsWith("fd")) result.push("⚠ Unique Local IPv6");
}
</script>

</body>
</html>
