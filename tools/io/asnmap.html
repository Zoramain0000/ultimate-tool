<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays •  ASN Map Viewer</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,sans-serif;color:#d1d1d1;overflow:hidden}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:-2;filter:brightness(0.3);
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:-1;}

header{
  background:rgba(0,0,0,0.7);padding:18px;text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{letter-spacing:2px;font-size:20px;}

.container{
  max-width:1200px;margin:25px auto;padding:20px;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);
  border-radius:12px;box-shadow:0 0 30px rgba(0,0,0,0.9);
}

.section{border-left:4px solid #333;padding-left:15px;margin-bottom:20px}
.section h2{font-size:16px;color:#9f9f9f;margin-bottom:10px}

input,button{
  width:100%;padding:12px;margin-bottom:10px;
  background:black;color:white;border:1px solid #333;border-radius:6px;
}
button:hover{background:#111;cursor:pointer}

.result{
  background:black;padding:12px;border-radius:6px;
  font-family:monospace;font-size:13px;color:#8aff8a;
  border:1px solid #222;white-space:pre-wrap;max-height:200px;overflow:auto;
}

#map{width:100%;height:500px;border:1px solid #222;border-radius:6px;margin-top:10px;}
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS •  Autonomous System Map Viewer</h1>
</header>

<div class="container">

<div class="section">
  <h2>Enter ASN or IP</h2>
  <input id="asnInput" placeholder="e.g., AS15169 or 8.8.8.8">
  <button onclick="lookupASN()">Lookup & Map</button>
</div>

<div class="section">
  <h2>ASN Info</h2>
  <div id="output" class="result">Awaiting input…</div>
</div>

<div class="section">
  <h2>Map</h2>
  <div id="map"></div>
</div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20,0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];

async function lookupASN(){
  const input = document.getElementById("asnInput").value.trim();
  const out = document.getElementById("output");
  
  // clear previous markers
  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  if(!input){ out.textContent="Enter ASN or IP"; return;}
  out.textContent="Fetching AS data…";

  let url = "";
  if(/^AS/i.test(input)){
    // remove AS prefix for ipwho.org
    url = `https://ipwho.is/${input.replace(/^AS/i,"")}`;
  } else {
    url = `https://ipwho.is/${input}`;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();

    if(!data.success){ out.textContent="Lookup failed"; return;}

    const asn = data.asn ? data.asn : "N/A";
    const org = data.org ? data.org : "N/A";
    const country = data.country ? data.country : "N/A";
    const lat = data.latitude || 20;
    const lon = data.longitude || 0;

    out.textContent = `AS Number: ${asn}\nOrg: ${org}\nCountry: ${country}\nIP: ${data.ip}`;

    // add main marker
    const mainMarker = L.marker([lat, lon]).addTo(map)
      .bindPopup(`AS${asn}: ${org}`);
    markers.push(mainMarker);
    map.setView([lat, lon], 3);

    // optional: if peers were available, you could draw lines here

  } catch(err){
    out.textContent = "Error: "+err.message;
  }
}
</script>

</body>
</html>
