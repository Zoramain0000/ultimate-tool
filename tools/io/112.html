    'Salazar','Fox','Warren','Mills','Meyer','Rice','Schmidt','Garza','Daniels','Ferguson'
  ];

  let totalLogsGenerated = 0;
  let currentRegionMode = 'random';
  let allEntries = [];
  let countryList = Object.keys(COUNTRIES);

  function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function getRegionCode() {
    switch(currentRegionMode) {
      case 'manual':
        const manualInput = searchInput.value.toUpperCase().slice(0,2);
        return COUNTRIES[manualInput] ? manualInput : 'US';
      case 'usa': return 'US';
      case 'europe': 
        const euCountries = ['DE','FR','IT','ES','GB','NL','BE','SE','DK','FI','NO','PL','CZ','AT','CH'];
        return euCountries[Math.floor(Math.random() * euCountries.length)];
      case 'asia':
        const asiaCountries = ['JP','CN','IN','KR','SG','HK','MY','TH','VN','ID','PH','TW','AU'];
        return asiaCountries[Math.floor(Math.random() * asiaCountries.length)];
      default: // random global
        return countryList[Math.floor(Math.random() * countryList.length)];
    }
  }

  function generateRandomString(len, charset) {
    charset = charset || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < len; i++) result += charset.charAt(Math.floor(Math.random() * charset.length));
    return result;
  }

  function generateUsername(firstName, lastName, regionCode) {
    const cleanFirst = firstName.toLowerCase().replace(/[^a-z]/g, '');
    const cleanLast = lastName.toLowerCase().replace(/[^a-z]/g, '');
    const numbers = generateRandomString(2, '0123456789');
    
    const patterns = [
      `${cleanFirst}${cleanLast}${numbers}`,
      `${cleanFirst}.${cleanLast}${numbers}`,
      `${cleanFirst}${numbers}${cleanLast}`,
      `${cleanLast}${cleanFirst}${numbers}`,
      `${cleanFirst}_${cleanLast}`,
      `${cleanLast}_${numbers}`,
      `${cleanFirst}${numbers}`
    ];
    
    return patterns[Math.floor(Math.random() * patterns.length)];
  }

  function generateEmail(firstName, lastName, regionCode) {
    const domains = [
      'gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com', 'icloud.com',
      'protonmail.com', 'aol.com', 'live.com', 'msn.com', 'me.com'
    ];
    const cleanFirst = firstName.toLowerCase().replace(/[^a-z]/g, '');
    const cleanLast = lastName.toLowerCase().replace(/[^a-z]/g, '');
    const numbers = generateRandomString(2, '0123456789');
    return `${cleanFirst}.${cleanLast}${numbers}@${domains[Math.floor(Math.random() * domains.length)]}`;
  }

  function generatePhone(regionCode) {
    const formats = {
      'US': '(###) ###-####',
      'GB': '07### ######',
      'DE': '+49 ### ######',
      'FR': '+33 # ## ## ## ##',
      'JP': '+81 ###-####-####',
      'CN': '+86 ###-####-####',
      'IN': '+91 #######',
      'BR': '+55 ## ######',
      'default': '+### ### ### ###'
    };
    
    const format = formats[regionCode] || formats['default'];
    return format.replace(/#/g, () => Math.floor(Math.random() * 10));
  }

  function getTimestamp() {
    return new Date().toISOString().slice(0,19).replace('T',' ');
  }

  function createRow(entry) {
    const tr = document.createElement('tr');
    
    tr.innerHTML = `
      <td class="highlight" title="Click to copy name">${entry.fullName}</td>
      <td class="username" title="Click to copy username">${entry.username}</td>
      <td><span class="country-flag">${entry.flag}</span>${entry.country}</td>
      <td style="font-family: monospace; color: #aaa; font-size: 11px;">${entry.email}</td>
      <td style="font-size: 11px;">${entry.phone}</td>
      <td style="font-size: 11px;">${entry.timestamp}</td>
      <td style="color: #00ff41; font-weight: bold;">${entry.status}</td>
    `;
    
    tr.onclick = (e) => {
      if (e.target.closest('.username')) {
        navigator.clipboard.writeText(entry.username);
        e.target.style.background = '#ff1493';
        setTimeout(() => e.target.style.background = '', 500);
      } else if (e.target.closest('td')) {
        navigator.clipboard.writeText(entry.fullName);
        e.target.style.background = '#ff1493';
        setTimeout(() => e.target.style.background = '', 500);
      }
    };
    
    return tr;
  }

  function generateEntry() {
    const regionCode = getRegionCode();
    const regionData = COUNTRIES[regionCode] || COUNTRIES['US'];
    const firstName = FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
    const lastName = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)];
    const fullName = `${firstName} ${lastName}`;
    const username = generateUsername(firstName, lastName, regionCode);
    
    return {
      fullName: fullName,
      username: username,
      country: regionData.name,
      flag: regionData.flag,
      email: generateEmail(firstName, lastName, regionCode),
      phone: generatePhone(regionCode),
      timestamp: getTimestamp(),
      status: 'ACTIVE'
    };
  }

  function updateTotalCount() {
    totalCount.textContent = `Total: ${totalLogsGenerated.toLocaleString()}`;
  }

  function loadMoreLogs() {
    if (totalLogsGenerated >= MAX_LOGS) {
      loadingIndicator.textContent = `⚠️ Max ${MAX_LOGS.toLocaleString()} records reached`;
      loadingIndicator.hidden = false;
      return;
    }
    loadingIndicator.hidden = false;
    
    requestAnimationFrame(() => {
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < BATCH_SIZE && totalLogsGenerated < MAX_LOGS; i++, totalLogsGenerated++) {
        const entry = generateEntry();
        allEntries.push(entry);
        fragment.appendChild(createRow(entry));
      }
      logBody.appendChild(fragment);
      loadingIndicator.hidden = true;
      updateTotalCount();
      updateAriaRowCount();
    });
  }

  function resetLogs() {
    totalLogsGenerated = 0;
    allEntries = [];
    logBody.innerHTML = '';
    loadingIndicator.hidden = true;
    updateTotalCount();
    updateAriaRowCount();
  }

  function filterLogs() {
    const filter = searchInput.value.toLowerCase();
    if (!filter) {
      [...logBody.children].forEach(tr => tr.style.display = "");
      return;
    }
    [...logBody.children].forEach(tr => {
      const haystack = tr.textContent.toLowerCase();
      tr.style.display = haystack.includes(filter) ? "" : "none";
    });
  }

  function updateAriaRowCount() {
    logBody.parentElement.setAttribute('aria-rowcount', logBody.children.length);
  }

  // Event Listeners
  logContainer.addEventListener('scroll', () => {
    if (loadingIndicator.hidden &&
        logContainer.scrollTop + logContainer.clientHeight >= logContainer.scrollHeight - 100 &&
        !searchInput.value.trim()) {
      loadMoreLogs();
    }
  });

  generateBtn.addEventListener('click', () => {
    currentRegionMode = regionModeEl.value;
    if (currentRegionMode === 'manual' && !searchInput.value.trim()) {
      currentRegionMode = 'random';
    }
    resetLogs();
    loadMoreLogs();
    searchInput.value = '';
  });

  searchInput.addEventListener('input', () => {
    filterLogs();
  });

  downloadBtn.addEventListener('click', () => {
    const csvData = allEntries.map(e => 
      `"${e.fullName}","${e.username}","${e.country}","${e.email}","${e.phone}","${e.timestamp}","${e.status}"`
    ).join('\n');
    
    const csvBlob = new Blob([`FullName,Username,Region,Email,Phone,Timestamp,Status\n${csvData}`], 
      {type: 'text/csv;charset=utf-8;'});
    
    const csvLink = document.createElement('a');
    csvLink.href = URL.createObjectURL(csvBlob);
    csvLink.download = `facebook_profiles_${currentRegionMode}_${Date.now()}.csv`;
    csvLink.style.display = 'none';
    document.body.appendChild(csvLink);
    csvLink.click();
    document.body.removeChild(csvLink);
  });

  // Initialize
  updateTotalCount();
  loadMoreLogs();
  
  // Update country list for random mode
  setInterval(() => {
    if (currentRegionMode === 'random') {
      countryList = shuffleArray(Object.keys(COUNTRIES));
    }
  }, 5000);

})();
