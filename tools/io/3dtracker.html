<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MapLibre Advanced 3D Map + IP Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: black;
}
#map {
  width: 100%;
  height: 100%;
}

.marker {
  background: red;
  border-radius: 50%;
  width: 12px;
  height: 12px;
  border: 2px solid white;
}

/* 🔍 IP INPUT UI */
#control {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 10;
  background: rgba(0,0,0,0.75);
  padding: 12px;
  border-radius: 8px;
  color: white;
  font-family: Arial, sans-serif;
}
#control input {
  width: 180px;
  padding: 6px;
  border-radius: 4px;
  border: none;
  outline: none;
}
#control button {
  margin-top: 6px;
  width: 100%;
  padding: 6px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}
#control button:hover {
  background: #1e40af;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="control">
  <div><strong>IP Location Tracker</strong></div>
  <input id="ipInput" placeholder="Enter IP address" />
  <button onclick="trackIP()">Track Target</button>
</div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://demotiles.maplibre.org/style.json',
  center: [0, 20],
  zoom: 1.5,
  pitch: 0,
  bearing: 0,
  antialias: true
});

map.addControl(new maplibregl.NavigationControl());

let targetMarker = null;

map.on('load', () => {

  /* 🌄 TERRAIN */
  map.addSource('terrain', {
    type: 'raster-dem',
    url: 'https://demotiles.maplibre.org/terrain.json',
    tileSize: 256
  });
  map.setTerrain({ source: 'terrain', exaggeration: 1.5 });

  /* ☁️ SKY */
  map.addLayer({
    id: 'sky',
    type: 'sky',
    paint: {
      'sky-type': 'atmosphere',
      'sky-atmosphere-sun': [0,0],
      'sky-atmosphere-sun-intensity': 15
    }
  });

  /* 🌫️ FOG */
  map.setFog({
    range: [1, 12],
    color: '#dbeafe',
    'horizon-blend': 0.3,
    'high-color': '#add8e6',
    'space-color': '#000',
    'star-intensity': 0.2
  });

  /* 🏙️ 3D BUILDINGS */
  map.addLayer({
    id: '3d-buildings',
    source: 'openmaptiles',
    'source-layer': 'building',
    type: 'fill-extrusion',
    minzoom: 14,
    paint: {
      'fill-extrusion-color': '#bdbdbd',
      'fill-extrusion-height': [
        'interpolate', ['linear'], ['zoom'],
        14, 0,
        16, ['get', 'render_height']
      ],
      'fill-extrusion-base': ['get', 'render_min_height'],
      'fill-extrusion-opacity': 0.9
    }
  });

  /* 🎥 START FLY */
  map.flyTo({
    center: [121.0437, 14.6760],
    zoom: 16,
    pitch: 75,
    bearing: 180,
    speed: 0.3,
    curve: 1.8
  });

  /* 🧭 ORBIT */
  let bearing = 180;
  function orbit() {
    bearing += 0.015;
    map.easeTo({ bearing, duration: 60, easing: t => t });
    requestAnimationFrame(orbit);
  }
  setTimeout(orbit, 7000);
});

/* 🌐 TRACK TARGET IP (NO API KEY) */
function trackIP() {
  const ip = document.getElementById('ipInput').value.trim();
  if (!ip) return alert('Enter an IP address');

  const services = [
    `http://ip-api.com/json/${ip}`,
    `https://ipwhois.app/json/${ip}`,
    `https://ipapi.co/${ip}/json/`,
    `https://freegeoip.app/json/${ip}`,
    `https://geolocation-db.com/json/${ip}&position=true`,
    `https://ipinfo.io/${ip}/json`
  ];

  let resolved = false;

  services.forEach(url => {
    if (resolved) return;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        let lat, lon;

        if (data.loc) [lat, lon] = data.loc.split(',').map(Number);
        else if (data.latitude) { lat = data.latitude; lon = data.longitude; }
        else if (data.lat && data.lon) { lat = data.lat; lon = data.lon; }
        else return;

        resolved = true;

        if (targetMarker) targetMarker.remove();

        const el = document.createElement('div');
        el.className = 'marker';

        targetMarker = new maplibregl.Marker(el)
          .setLngLat([lon, lat])
          .setPopup(new maplibregl.Popup().setHTML(
            `<strong>IP:</strong> ${ip}<br>
             <strong>City:</strong> ${data.city || 'Unknown'}<br>
             <strong>Country:</strong> ${data.country || ''}`
          ))
          .addTo(map);

        map.flyTo({
          center: [lon, lat],
          zoom: 7,
          pitch: 65,
          bearing: 180,
          speed: 0.4,
          curve: 1.6
        });
      })
      .catch(() => {});
  });
}
</script>

</body>
</html>
