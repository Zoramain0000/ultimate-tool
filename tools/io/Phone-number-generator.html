html,body{

}

/* BACKGROUND */
.bg-video{

}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:-1;}

header{

.container{

  color:#9f9f9f;
  border-left:4px solid #555;
  padding-left:10px;
}

input,select{

  padding:10px;
  margin-bottom:10px;
  background:#0a0a0a;
  border:1px solid #333;
  color:#fff;
  border-radius:6px;
}

button{
  padding:12px 18px;
  background:black;
  border:1px solid #333;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
  transition:.3s;
}
button:hover{background:#111;transform:scale(1.05)}

.generated{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  background:#0d0d0d;
  padding:12px;
  border-radius:8px;
  border:1px solid #222;
  font-family:monospace;
  text-align:center;
  cursor:pointer;
}
.card:hover{background:#111}

.log{

  padding:12px;
  border-radius:6px;
  font-family:monospace;
  font-size:13px;
  color:#8aff8a;
  max-height:200px;
  overflow:auto;
  border:1px solid #222;
}

footer{
  background:rgba(0,0,0,.7);
  padding:15px;
  text-align:center;
  font-size:13px;
  color:#777;
}

const countrySelect=document.getElementById("country");
countries.forEach((x,i)=>{
  const o=document.createElement("option");
  o.value=i;
  o.textContent=`${x.n} (${x.c})`;
  countrySelect.appendChild(o);
});

/* === NUMBER GENERATION === */
function randDigits(len){
  let s="";
  for(let i=0;i<len;i++) s+=Math.floor(Math.random()*10);
  return s;
}

function generateNumbers(){
  const count=parseInt(document.getElementById("count").value);
  const c=countries[countrySelect.value];
  if(!count||count<1) return alert("Invalid amount");

  out.innerHTML="";
  log(`Generating ${count} numbers for ${c.n}`);

  for(let i=0;i<count;i++){
    const number=`${c.c}${randDigits(9)}`;
    const d=document.createElement("div");
    d.className="card";
    d.textContent=number;
    d.onclick=()=>navigator.clipboard.writeText(number);
    out.appendChild(d);
  }
  log("Generation completed");
}

function copyAll(){
  const nums=[...document.querySelectorAll(".card")].map(x=>x.textContent).join("\n");
  if(nums){
    navigator.clipboard.writeText(nums);
    log("All numbers copied to clipboard");
  }
}
