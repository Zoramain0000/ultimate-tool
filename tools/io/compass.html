<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • Manual Website Comparison</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Segoe UI,Arial,sans-serif;color:#d6d6d6;overflow-x:hidden;}

.bg-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:-1;}

header{padding:20px;text-align:center;background:rgba(255,255,255,0.0);
border-bottom:1px solid rgba(255,255,255,0.1);text-shadow:0 0 6px #000;}
header h1{letter-spacing:3px;font-size:28px;}
header span{color:#00ff88;font-size:12px;text-shadow:0 0 6px #000;}

.container{max-width:1100px;margin:30px auto;padding:20px;background:rgba(255,255,255,0.0);}
.section{margin-bottom:30px}
.section h2{
  font-size:18px;margin-bottom:12px;border-left:4px solid #00ff88;
  padding-left:10px;color:#bfbfbf;text-shadow:0 0 6px #000;
}

input{width:100%;padding:12px;background:rgba(0,0,0,0.1);
border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;margin-bottom:12px;font-size:14px;}

button{padding:12px 22px;background:rgba(0,0,0,0.1);
border:1px solid #00ff88;color:#00ff88;border-radius:6px;cursor:pointer;transition:.3s;margin-bottom:6px;}
button:hover{background:#00ff88;color:black;transform:scale(1.05);}

iframe{width:100%;height:500px;border:2px solid #00ff88;border-radius:6px;margin-top:10px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.log{background:rgba(0,0,0,0.05);border:1px solid rgba(255,255,255,0.05);
border-radius:6px;padding:12px;font-family:monospace;font-size:13px;
max-height:220px;overflow:auto;color:#8aff8a;text-shadow:0 0 4px #000;}

footer{text-align:center;padding:15px;font-size:12px;color:#777;background:rgba(255,255,255,0.0);
border-top:1px solid rgba(255,255,255,0.1);text-shadow:0 0 6px #000;}
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • Manual Website Comparison</h1>
  <span>View two websites side by side without any API</span>
</header>

<div class="container">

  <div class="section">
    <h2>Enter Website URLs</h2>
    <input id="url1" placeholder="Website 1 (https://...)">
    <input id="url2" placeholder="Website 2 (https://...)">
    <button onclick="compareWebsites()">Compare</button>
  </div>

  <div class="section">
    <h2>Comparison View</h2>
    <div class="grid">
      <iframe id="iframe1" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      <iframe id="iframe2" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
  </div>

  <div class="section">
    <h2>Activity Log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>
  Educational & ethical tool • Fully manual • No API required
</footer>

<script>
const log = msg=>{
  const l=document.getElementById("log");
  l.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  l.scrollTop = l.scrollHeight;
};

function compareWebsites(){
  const url1 = document.getElementById("url1").value.trim();
  const url2 = document.getElementById("url2").value.trim();
  const iframe1 = document.getElementById("iframe1");
  const iframe2 = document.getElementById("iframe2");

  if(!url1 || !url2){alert("Enter both URLs"); return;}
  
  log("Loading Website 1: " + url1);
  log("Loading Website 2: " + url2);

  iframe1.src = url1;
  iframe2.src = url2;
}

// Optional: drag & drop URLs
document.addEventListener("dragover", e=>e.preventDefault());
document.addEventListener("drop", e=>{
  e.preventDefault();
  if(e.dataTransfer.items){
    let urls=[];
    for(let i=0;i<e.dataTransfer.items.length;i++){
      if(e.dataTransfer.items[i].kind==="string"){
        e.dataTransfer.items[i].getAsString(str=>{
          urls.push(str.trim());
          if(urls.length===2){
            document.getElementById("url1").value=urls[0];
            document.getElementById("url2").value=urls[1];
            compareWebsites();
          }
        });
      }
    }
  }
});
</script>

</body>
</html>
