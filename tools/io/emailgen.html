.section button:hover{background:#0ea5e9}

// ----------------- UTILITY -----------------
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ----------------- GENERATED EMAILS STORAGE -----------------
let emailHistory = [];

// ----------------- GENERATE EMAIL -----------------
function generateEmail(){
  const first = rand(firstNames).toLowerCase();
  const last = rand(lastNames).toLowerCase();
  const domain = rand(domains);
  
  // Random email format
  const formats = [
    `${first}.${last}@${domain}`,
    `${first}${last}@${domain}`,
    `${first[0]}${last}@${domain}`,
    `${first}${last[0]}@${domain}`,
    `${last}.${first}@${domain}`
  ];
  
  const email = rand(formats);
  emailHistory.push(email);
  displayEmails();
}

// ----------------- DISPLAY -----------------
function displayEmails(){
  const container = document.getElementById('emails');
  container.innerHTML = "";
  emailHistory.forEach(email=>{
    const div = document.createElement('div');
    div.className = "entry";
    div.innerHTML = `<span class="value">${email}</span>`;
    container.appendChild(div);
  });
}

// ----------------- COPY TO CLIPBOARD -----------------
function copyEmails(){
  if(emailHistory.length===0) return alert("No emails to copy");
  navigator.clipboard.writeText(emailHistory.join("\n")).then(()=>alert("Copied to clipboard!"));
}

// ----------------- DOWNLOAD AS TXT -----------------
function downloadEmails(){
  if(emailHistory.length===0) return alert("No emails to download");
  const blob = new Blob([emailHistory.join("\n")], {type:"text/plain"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "emails.txt";
  a.click();
}

// ----------------- CLEAR EMAILS -----------------
function clearEmails(){
  emailHistory = [];
  displayEmails();
}
