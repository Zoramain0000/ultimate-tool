<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Finder • OSINT Web Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

body{
  background:#000;
  color:#00ffe1;
  height:100vh;
  overflow:hidden;
}

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.35) contrast(1.2);
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,rgba(0,255,225,.15),rgba(0,0,0,.9));
  z-index:-1;
}

.app{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px;
}

h1{
  font-size:2.2rem;
  letter-spacing:2px;
  margin-bottom:10px;
}

.tagline{
  color:#9ff;
  opacity:.8;
  margin-bottom:25px;
}

.search-box{
  display:flex;
  gap:10px;
  width:100%;
  max-width:600px;
}

input{
  flex:1;
  padding:14px;
  background:#000;
  border:1px solid #00ffe1;
  color:#00ffe1;
  font-size:1rem;
  outline:none;
}

button{
  padding:14px 22px;
  background:#00ffe1;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00c9b2;
}

.results{
  margin-top:25px;
  width:100%;
  max-width:900px;
  overflow-y:auto;
  padding-right:6px;
}

.card{
  background:rgba(0,0,0,.75);
  border:1px solid #00ffe1;
  padding:18px;
  margin-bottom:15px;
  animation:fade .3s ease;
}

.card h3{
  margin-bottom:6px;
  color:#00ffe1;
}

.card a{
  color:#7ff;
  word-break:break-all;
}

.card p{
  color:#ccc;
  margin-top:8px;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:none}
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="app">
  <h1>WEBSITE FINDER</h1>
  <div class="tagline">Real OSINT Web Discovery • No Fake Data</div>

  <div class="search-box">
    <input id="query" placeholder="Enter website name, brand or keyword">
    <button onclick="search()">SEARCH</button>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
async function search(){
  const q = document.getElementById('query').value.trim();
  const box = document.getElementById('results');
  box.innerHTML = '';
  if(!q) return;

  // DuckDuckGo Instant Answer API
  const ddgURL = `https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_redirect=1&no_html=1`;

  const res = await fetch(ddgURL);
  const data = await res.json();

  if(data.AbstractURL){
    addCard(
      data.Heading || q,
      data.AbstractURL,
      data.AbstractText || 'Official website information'
    );
  }

  if(data.RelatedTopics){
    data.RelatedTopics.forEach(item=>{
      if(item.FirstURL){
        addCard(
          item.Text?.split(' - ')[0] || 'Related Site',
          item.FirstURL,
          item.Text || ''
        );
      }
    });
  }

  // Wikipedia search
  const wikiURL = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`;
  const w = await fetch(wikiURL);
  if(w.ok){
    const wiki = await w.json();
    if(wiki.content_urls){
      addCard(
        'Wikipedia',
        wiki.content_urls.desktop.page,
        wiki.extract
      );
    }
  }
}

function addCard(title,url,desc){
  const box = document.getElementById('results');
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <h3>${title}</h3>
    <a href="${url}" target="_blank">${url}</a>
    <p>${desc}</p>
  `;
  box.appendChild(div);
}
</script>

</body>
</html>
