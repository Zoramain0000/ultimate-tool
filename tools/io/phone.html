<title>📞 Phone Number Info Lookup</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: gray;
    height: 100vh;
    overflow: hidden;
  }

  /* Background video */
  .bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: brightness(0.25) grayscale(0.4); /* dark gray/black effect */
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35); /* subtle overlay */
    z-index: -1;
  }

  .container {
    position: relative;
    max-width: 600px;
    margin: 50px auto;
    background: rgba(0, 0, 0, 0.5);
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  h1 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid gray;
    box-sizing: border-box;
  }
  button {
    margin-top: 15px;
    padding: 12px 20px;
    width: 100%;
    background-color: gray;
    border: none;
    color: rgb(0, 0, 0);
    font-weight: bold;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
  }
  button:hover {
    background-color: blue;
  }
  pre {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 8px;
    overflow-x: auto;
    margin-top: 20px;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .error {
    color: gray;
    font-weight: bold;
    margin-top: 20px;
    text-align: center;
  }
</style>
</head>

function lookupNumber() {
  const input = document.getElementById('phoneInput').value.trim();
  output.textContent = '';
  errorDiv.textContent = '';

  if (!input) {
    errorDiv.textContent = 'Please enter a phone number.';
    return;
  }

  // Extract country code from input manually (max 3 digits)
  let cc = '';
  for(let i=1;i<=3;i++){
    let code = input.substring(0,i);
    if(countryCodes[code]) { cc = code; break; }
  }

  if(!cc) {
    errorDiv.textContent = 'Unknown or unsupported country code.';
    return;
  }

  const numberWithoutCC = input.replace(cc,'').trim();
  const country = countryCodes[cc];

  const info = {
    "creator": "Zerodays",
    "status": "Success",
    "Country": country.name,
    "ISO": country.iso,
    "Flag": country.flag,
    "Currency": country.currency,
    "Valid Number": numberWithoutCC.length > 0,
    "Original Input": input,
    "Country Calling Code": cc,
    "Timezone": tzMap[country.iso] ? tzMap[country.iso].join(', ') : "Unknown",
    "Number": numberWithoutCC
  };

  output.textContent = JSON.stringify(info,null,4);
}
