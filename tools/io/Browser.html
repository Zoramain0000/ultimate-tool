<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroDays • Background Service Activity Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  color:#d1d1d1;
  overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.3);
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

header{
  background:rgba(0,0,0,0.7);
  padding:18px;
  text-align:center;
  border-bottom:1px solid #1f1f1f;
}
header h1{
  letter-spacing:2px;
  font-size:20px;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.9);
}

button{
  width:100%;
  padding:12px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  border:1px solid #333;
  border-radius:6px;
  margin-bottom:10px;
  cursor:pointer;
}
button:hover{background:rgba(20,20,20,0.8)}

.status{
  font-size:13px;
  color:#aaa;
  margin-top:8px;
}

.log{
  background:rgba(0,0,0,0.75);
  border:1px solid #222;
  padding:12px;
  max-height:360px;
  overflow:auto;
  font-family:monospace;
  font-size:13px;
}

.entry{
  border-bottom:1px solid #222;
  padding:8px 0;
}

.key{color:#6ecbff}
.value{color:#8aff8a;word-break:break-all}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="ca63eccfcf11bcd02c1a900196de630f_720w.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <h1>ZERO DAYS • BACKGROUND SERVICE ACTIVITY TRACKER</h1>
</header>

<div class="container">

  <button onclick="scanBackground()">🔍 Scan Background Activity</button>
  <div class="status" id="status">Idle – waiting for scan</div>

  <div class="log" id="output"></div>

  <button onclick="exportTXT()">Export TXT</button>
  <button onclick="exportJSON()">Export JSON</button>
  <button onclick="clearAll()">Clear</button>

</div>

<script>
let report = {};

function log(key, value){
  report[key] = value;
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `<span class="key">${key}</span>: <span class="value">${value}</span>`;
  output.appendChild(div);
}

async function scanBackground(){
  output.innerHTML='';
  report = {};
  status.textContent = 'Scanning real background activity…';

  // Page Visibility
  log('Page Visibility', document.visibilityState);

  // Service Worker
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    log('Service Workers', regs.length ? `${regs.length} active` : 'None detected');
  } else {
    log('Service Workers', 'Not supported');
  }

  // Background Sync
  log('Background Sync', 'sync' in (navigator.serviceWorker || {}) ? 'Supported' : 'Not available');

  // Push API
  log('Push Capability', 'PushManager' in window ? 'Supported' : 'Not supported');

  // Wake Lock
  log('Wake Lock API', 'wakeLock' in navigator ? 'Available' : 'Not supported');

  // Media Activity
  const media = document.querySelectorAll('audio,video');
  log('Active Media Elements', media.length);

  // Network Info
  const conn = navigator.connection || {};
  log('Network Type', conn.effectiveType || 'Unknown');
  log('Downlink', conn.downlink ? `${conn.downlink} Mbps` : 'Unknown');

  // Long Task Detection
  if ('PerformanceObserver' in window) {
    let longTasks = 0;
    const obs = new PerformanceObserver(list => {
      longTasks += list.getEntries().length;
    });
    obs.observe({entryTypes:['longtask']});
    setTimeout(() => {
      obs.disconnect();
      log('Long Tasks Detected', longTasks);
    }, 1000);
  } else {
    log('Long Task Monitor', 'Not supported');
  }

  // Memory (Chrome only)
  if (performance.memory) {
    log('JS Heap Used', Math.round(performance.memory.usedJSHeapSize / 1048576) + ' MB');
    log('JS Heap Limit', Math.round(performance.memory.jsHeapSizeLimit / 1048576) + ' MB');
  }

  // Background Execution Indicator
  log('Hidden Execution Risk', document.hidden ? 'Page running hidden' : 'Visible');

  status.textContent = 'Scan complete – real browser background activity captured';
}

function exportTXT(){
  let txt='BACKGROUND SERVICE ACTIVITY REPORT\n\n';
  for(const k in report) txt+=`${k}: ${report[k]}\n`;
  download(txt,'background-activity.txt');
}

function exportJSON(){
  download(JSON.stringify(report,null,2),'background-activity.json');
}

function download(data,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data]));
  a.download=name;
  a.click();
}

function clearAll(){
  output.innerHTML='';
  report={};
  status.textContent='Idle – waiting for scan';
}
</script>

</body>
</html>
